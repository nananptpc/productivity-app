<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teaching · Schedule</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #fff5f7;
            --text: #4a3f44;
            --card: #ffffff;
            --shadow: 0 4px 16px rgba(232, 162, 182, 0.2);
            --border: #f8d7e0;
            --accent: #f7a1b5;
            --accent2: #fbc4d0;
            --font: 'American Typewriter', 'Courier New', monospace;
            --radius: 8px;
            --transition: 0.3s ease;
            --completed-opacity: 0.4;
        }
        body.dark {
            --bg: #2d2428;
            --text: #f5e6ea;
            --card: #3d3238;
            --shadow: 0 4px 16px rgba(0,0,0,0.4);
            --border: #5a454c;
            --accent: #d47b92;
            --accent2: #a06275;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 14px;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
        }
        .table-wrap::-webkit-scrollbar,
        .dropdown-body.open::-webkit-scrollbar {
            height: 10px;
            width: 10px;
        }
        .table-wrap::-webkit-scrollbar-thumb,
        .dropdown-body.open::-webkit-scrollbar-thumb {
            background: var(--accent2);
            border: 2px solid var(--bg);
            border-radius: 999px;
        }
        * {
            font-family: var(--font);
        }
        .container {
            max-width: 1320px;
            width: 100%;
            margin: 0 auto;
            overflow-x: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 14px 18px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            transition: background var(--transition);
        }
        header h1 {
            font-size: 26px;
            letter-spacing: 1px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-actions button,
        .header-actions a {
            padding: 8px 18px;
            border: none;
            border-radius: 40px;
            background: var(--accent2);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            cursor: pointer;
            transition: background var(--transition), transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .header-actions button:hover,
        .header-actions a:hover {
            background: var(--accent);
            transform: scale(1.02);
        }
        .theme-toggle {
            background: transparent;
            border: 2px solid var(--accent);
            border-radius: 40px;
            padding: 6px 16px;
            font-family: var(--font);
            cursor: pointer;
            color: var(--text);
            transition: 0.3s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
        }

        .main-layout {
            display: grid;
            grid-template-columns: minmax(210px, 250px) minmax(0, 1fr);
            gap: 16px;
            align-items: start;
            min-width: 0;
        }
        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }

        .calendar-section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 12px 14px;
            box-shadow: var(--shadow);
            transition: background var(--transition);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 4px;
            flex-wrap: nowrap;
        }
        .calendar-header button {
            padding: 2px 10px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .calendar-header button:hover {
            background: var(--accent2);
        }
        .calendar-header .month-label {
            font-weight: bold;
            font-size: 16px;
            white-space: nowrap;
            flex: 1;
            text-align: center;
            letter-spacing: 0.3px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .calendar-grid .day-name {
            text-align: center;
            font-size: 10px;
            opacity: 0.6;
            padding: 2px 0;
        }
        .calendar-grid .day-cell {
            text-align: center;
            padding: 4px 2px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            border: 2px solid transparent;
            min-height: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .calendar-grid .day-cell:hover {
            background: var(--accent2);
        }
        .calendar-grid .day-cell.today {
            border-color: var(--accent);
            background: var(--accent2);
        }
        .calendar-grid .day-cell.selected {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .calendar-grid .day-cell.other-month {
            opacity: 0.3;
        }
        .calendar-grid .day-cell .day-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: 1px;
        }

        .day-lessons-section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 12px 14px;
            box-shadow: var(--shadow);
            transition: background var(--transition);
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
        }
        .day-lessons-section .day-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .day-lessons-section .day-lesson-item {
            font-size: 13px;
            padding: 10px 12px;
            background: var(--bg);
            border-radius: 6px;
            margin: 10px 0;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
        }
        .day-lessons-section .day-lesson-item .cls-code {
            font-weight: bold;
        }
        .day-lessons-section .day-lesson-item .lesson-notes {
            font-size: 11px;
            opacity: 0.7;
        }
        .day-lessons-section .day-lesson-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .day-lessons-section .day-lesson-actions button {
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 11px;
            padding: 2px 8px;
        }
        .day-lessons-section .no-lessons {
            font-size: 13px;
            opacity: 0.6;
            text-align: center;
            padding: 16px 0;
        }

        .middle-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
            max-width: 100%;
            overflow: hidden;
        }

        .section {
            background: var(--card);
            padding: 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: background var(--transition);
            min-width: 0;
            max-width: 100%;
            overflow: hidden;
        }
        .section h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .form-row {
            align-items: start;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
            min-width: 0;
        }
        .form-row input,
        .form-row select {
            flex: 1 1 160px;
            padding: 7px 12px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            min-width: 0;
            transition: border 0.3s;
        }
        .form-row #lessonClass {
            flex-basis: 190px;
        }
        .form-row #lessonName {
            flex: 2 1 240px;
        }
        .form-row #lessonDate,
        .form-row #lessonOtherLinks {
            flex-basis: 160px;
        }
        .form-row input:focus,
        .form-row select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-row button {
            flex: 0 0 auto;
            padding: 7px 18px;
            border: none;
            border-radius: 40px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .form-row button:hover {
            opacity: 0.85;
        }
        .form-row textarea {
            flex: 1 1 100%;
            padding: 7px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            min-height: 74px;
            resize: vertical;
            transition: border 0.3s;
        }
        .form-row textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .edit-cancel-btn {
            display: none;
            background: var(--accent2) !important;
            color: var(--text) !important;
        }
        .edit-cancel-btn.show {
            display: inline-block;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
            min-width: 0;
        }
        .filter-bar .bulk-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-left: auto;
        }
        .filter-bar .bulk-actions button {
            padding: 6px 14px;
            border: none;
            border-radius: 40px;
            background: var(--accent2);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-bar .bulk-actions button:hover {
            background: var(--accent);
        }
        .filter-bar .bulk-actions .danger {
            background: #e74c6f;
            color: #fff;
        }
        .filter-bar .bulk-actions .danger:hover {
            background: #c0392b;
        }
        .filter-bar .bulk-actions .success {
            background: #2ecc71;
            color: #fff;
        }

        .table-wrap {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-height: min(52vh, 560px);
            max-width: 100%;
            resize: vertical;
            min-height: 260px;
            width: 100%;
            overflow: auto;
            overscroll-behavior: contain;
        }
        table {
            min-width: 100%;
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            table-layout: fixed;
        }
        th,
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            min-width: 0;
            overflow: hidden;
            overflow-wrap: anywhere;
            vertical-align: top;
        }
        th:first-child,
        td:first-child {
            width: 42px;
            min-width: 42px;
        }
        th:nth-child(2),
        td:nth-child(2) {
            width: var(--lesson-col-class, 96px);
        }
        th:nth-child(3),
        td:nth-child(3) {
            width: var(--lesson-col-lesson, 220px);
        }
        th:nth-child(4),
        td:nth-child(4) {
            width: var(--lesson-col-date, 104px);
        }
        th:nth-child(5),
        td:nth-child(5) {
            width: var(--lesson-col-status, 104px);
        }
        th:nth-child(6),
        td:nth-child(6) {
            width: var(--lesson-col-checks, 126px);
        }
        th:nth-child(7),
        td:nth-child(7) {
            width: var(--lesson-col-links, 112px);
        }
        th:nth-child(8),
        td:nth-child(8) {
            width: var(--lesson-col-note, 180px);
        }
        th:last-child,
        td:last-child {
            width: 82px;
            min-width: 82px;
        }
        th {
            background: var(--bg);
            font-weight: normal;
            opacity: 0.8;
            position: sticky;
            top: 0;
            z-index: 3;
            white-space: nowrap;
        }
        th.resizable {
            position: sticky;
        }
        .col-resizer {
            bottom: 0;
            cursor: col-resize;
            position: absolute;
            right: -3px;
            top: 0;
            width: 8px;
            z-index: 4;
        }
        .col-resizer:hover {
            background: color-mix(in srgb, var(--accent), transparent 55%);
        }
        .row-resizable {
            min-height: 34px;
            overflow: visible;
            resize: none;
        }
        td .del {
            color: #e74c6f;
            cursor: pointer;
            font-weight: bold;
        }
        td input[type="checkbox"] {
            accent-color: var(--accent);
            width: 13px;
            height: 13px;
            min-width: 13px;
            padding: 0;
            cursor: pointer;
        }
        td .lesson-notes {
            font-size: 12px;
            opacity: 0.7;
            display: block;
            max-width: 460px;
            white-space: normal;
            overflow-wrap: anywhere;
            line-height: 1.5;
        }
        .lesson-check-row {
            align-items: center;
            display: flex;
            flex: 1 1 100%;
            flex-wrap: wrap;
            gap: 8px 14px;
        }
        .lesson-check-row label,
        .lesson-check-badge {
            align-items: center;
            color: var(--text);
            display: inline-flex;
            font-size: 12px;
            gap: 6px;
            line-height: 1.2;
            opacity: 0.78;
            white-space: nowrap;
        }
        .lesson-mini-check {
            flex: 0 0 auto;
        }
        #lessonTableBody td {
            vertical-align: top;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: normal;
        }
        #lessonTableBody td:nth-child(3),
        #lessonTableBody td:nth-child(6) {
            min-width: 0;
        }
        #lessonTableBody td:last-child {
            white-space: nowrap;
            overflow-wrap: normal;
        }
        #lessonTableBody td:last-child button {
            white-space: nowrap;
            display: inline-block;
            line-height: 1.2;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }

        .dropdown-wrapper {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: background var(--transition);
            min-width: 0;
            max-width: 100%;
        }
        .dropdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            transition: 0.3s;
            user-select: none;
        }
        .dropdown-header:hover {
            background: var(--accent2);
        }
        .dropdown-header .title {
            font-size: 17px;
            font-weight: bold;
        }
        .dropdown-header .arrow {
            font-size: 16px;
            transition: transform 0.3s;
            opacity: 0.5;
        }
        .dropdown-header .arrow.open {
            transform: rotate(180deg);
        }
        .dropdown-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .dropdown-body.open {
            max-height: calc(100vh - 170px);
            overflow-y: auto;
            overflow-x: hidden;
        }
        .dropdown-body-inner {
            padding: 0 18px 18px 18px;
            min-width: 0;
            max-width: 100%;
            overflow-x: hidden;
        }

        .class-link-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            font-size: 12px;
            margin: -4px 0 12px;
            opacity: 0.8;
        }
        .class-link-preview a {
            color: var(--accent);
            text-decoration: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3px 8px;
            background: var(--bg);
        }
        .class-link-preview a:hover {
            border-color: var(--accent);
        }

        .class-form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .class-form-row input {
            padding: 5px 10px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 12px;
            flex: 1 1 96px;
            min-width: 0;
            transition: border 0.3s;
        }
        .class-form-row input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .class-form-row button {
            padding: 5px 12px;
            border: none;
            border-radius: 40px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .class-form-row button:hover {
            opacity: 0.85;
        }

        .class-bulk-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            align-items: center;
        }
        .class-bulk-actions button {
            padding: 4px 10px;
            border: none;
            border-radius: 40px;
            background: var(--accent2);
            color: var(--text);
            font-family: var(--font);
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }
        .class-bulk-actions button:hover {
            background: var(--accent);
        }
        .class-bulk-actions .danger {
            background: #e74c6f;
            color: #fff;
        }
        .class-bulk-actions .danger:hover {
            background: #c0392b;
        }

        .class-list {
            max-height: 180px;
            overflow-y: auto;
        }
        .class-item {
            background: var(--bg);
            padding: 8px 10px;
            border-radius: var(--radius);
            border: 2px solid var(--border);
            margin-bottom: 6px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .class-item:hover {
            border-color: var(--accent);
            transform: translateX(2px);
        }
        .class-item.active {
            border-color: var(--accent);
            background: var(--accent2);
        }
        .class-item .class-code {
            font-weight: bold;
            font-size: 13px;
        }
        .class-item .class-meta {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 2px;
        }
        .class-item .class-links {
            font-size: 10px;
            margin-top: 2px;
        }
        .class-item .class-links a {
            color: var(--accent);
            text-decoration: none;
            margin-right: 6px;
        }
        .class-item .class-links a:hover {
            text-decoration: underline;
        }
        .class-item .del {
            position: absolute;
            top: 6px;
            right: 10px;
            color: #e74c6f;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }
        .class-item .class-check-wrapper {
            margin-top: 4px;
        }
        .class-item input[type="checkbox"] {
            accent-color: var(--accent);
            width: 12px;
            height: 12px;
            cursor: pointer;
        }

        .left-panel .dropdown-wrapper {
            box-shadow: var(--shadow);
        }
        .left-panel .dropdown-header {
            padding: 10px 14px;
        }
        .left-panel .dropdown-header .title {
            font-size: 14px;
        }
        .left-panel .dropdown-body.open {
            max-height: 360px;
        }
        .left-panel .dropdown-body-inner {
            padding: 0 12px 12px;
        }

        /* TODO */
        .todo-form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
        .todo-form-row input,
        .todo-form-row select {
            padding: 6px 12px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            flex: 1 1 100px;
            transition: border 0.3s;
        }
        .todo-form-row input:focus,
        .todo-form-row select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .todo-form-row button {
            padding: 6px 16px;
            border: none;
            border-radius: 40px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .todo-form-row button:hover {
            opacity: 0.85;
        }
        .todo-form-row .custom-class-input {
            display: none;
            flex: 1 1 100px;
        }
        .todo-form-row .custom-class-input.show {
            display: block;
        }
        .todo-form-row .shortcut-hint {
            font-size: 10px;
            opacity: 0.4;
            padding: 4px 8px;
            font-family: var(--font);
            border: 1px dashed var(--border);
            border-radius: 20px;
        }

        .todo-bulk-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            align-items: center;
        }
        .todo-bulk-actions button {
            padding: 4px 12px;
            border: none;
            border-radius: 40px;
            background: var(--accent2);
            color: var(--text);
            font-family: var(--font);
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .todo-bulk-actions button:hover {
            background: var(--accent);
        }
        .todo-bulk-actions .danger {
            background: #e74c6f;
            color: #fff;
        }
        .todo-bulk-actions .danger:hover {
            background: #c0392b;
        }
        .todo-bulk-actions .success {
            background: #2ecc71;
            color: #fff;
        }
        .todo-bulk-actions .success:hover {
            background: #27ae60;
        }

        .todo-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;

    <script>
        // ============================================================
        // THEME
        // ============================================================
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('teachingTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('teachingTheme') === 'dark') document.body.classList.add('dark');

        // ============================================================
        // DATA
        // ============================================================
        function getData() {
            try {
                return normalizeData(JSON.parse(localStorage.getItem('teachingData')));
            } catch { return { classes: [], lessons: [], todos: [] }; }
        }

        function normalizeData(data) {
            return {
                classes: Array.isArray(data?.classes) ? data.classes.map(c => ({
                    ...c,
                    salaryRate: parseMoney(c.salaryRate ?? c.rate ?? c.fee ?? 0)
                })) : [],
                lessons: Array.isArray(data?.lessons) ? data.lessons.map(l => ({
                    ...l,
                    otherLinks: l.otherLinks || l.notes || '',
                    note: l.note || '',
                    completed: l.completed === true || l.completed === 'true' || l.completed === '1' || l.completed === 'yes',
                    attendanceChecked: l.attendanceChecked === true || l.attendanceChecked === 'true' || l.attendanceChecked === '1' || l.attendanceChecked === 'yes',
                    videoUploaded: l.videoUploaded === true || l.videoUploaded === 'true' || l.videoUploaded === '1' || l.videoUploaded === 'yes' || l.lessonUploaded === true || l.lessonUploaded === 'true' || l.lessonUploaded === '1' || l.lessonUploaded === 'yes',
                    homeworkUploaded: l.homeworkUploaded === true || l.homeworkUploaded === 'true' || l.homeworkUploaded === '1' || l.homeworkUploaded === 'yes',
                    fee: Number(l.fee) || 200000
                })) : [],
                todos: Array.isArray(data?.todos) ? data.todos : []
            };
        }

        function saveData(d) {
            const normalized = normalizeData(d);
            localStorage.setItem('teachingData', JSON.stringify(normalized));
            syncCompletedLessonsToPayroll(normalized);
        }

        function normalizeLessonDateForPayroll(value) {
            const text = String(value || '').trim();
            const match = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (match) return `${match[3]}-${match[2].padStart(2, '0')}-${match[1].padStart(2, '0')}`;
            if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        function parseMoney(value) {
            const clean = String(value || '').replace(/[^\d.-]/g, '');
            return Number(clean) || 0;
        }

        function formatMoney(value) {
            return `${Math.round(Number(value) || 0).toLocaleString('en-US')} VND`;
        }

        function syncCompletedLessonsToPayroll(teachingData = getData()) {
            let payrollRows;
            try {
                payrollRows = JSON.parse(localStorage.getItem('teachingPayroll_v1')) || [];
            } catch {
                payrollRows = [];
            }
            payrollRows = Array.isArray(payrollRows) ? payrollRows : [];
            const classMap = Object.fromEntries(teachingData.classes.map(item => [item.id, item]));
            const completedLessonIds = new Set(teachingData.lessons.filter(lesson => lesson.completed).map(lesson => lesson.id));

            payrollRows = payrollRows.filter(row => {
                if (!row.sourceLessonId || !row.autoManaged) return true;
                if (completedLessonIds.has(row.sourceLessonId)) return true;
                return row.payStatus === 'Paid' || row.received === 'Yes';
            });

            teachingData.lessons.filter(lesson => lesson.completed).forEach(lesson => {
                const cls = classMap[lesson.classId];
                const existing = payrollRows.find(row => row.sourceLessonId === lesson.id);
                const mapped = {
                    sourceLessonId: lesson.id,
                    autoManaged: true,
                    date: normalizeLessonDateForPayroll(lesson.date),
                    className: cls?.code || '',
                    detail: lesson.name || '',
                    fee: parseMoney(cls?.salaryRate) || parseMoney(lesson.fee) || 200000,
                    lessonStatus: 'Completed',
                    note: lesson.note || ''
                };
                if (existing) {
                    Object.assign(existing, mapped);
                    existing.payStatus = existing.payStatus || 'Unpaid';
                    existing.received = existing.received || 'No';
                } else {
                    payrollRows.push({
                        id: Date.now() + '_' + Math.random().toString(16).slice(2),
                        ...mapped,
                        payStatus: 'Unpaid',
                        received: 'No'
                    });
                }
            });
            localStorage.setItem('teachingPayroll_v1', JSON.stringify(payrollRows));
        }

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function escapeAttr(value) {
            return escapeHTML(value);
        }

        function formatDateParts(day, month, year) {
            return `${String(day).padStart(2, '0')}/${String(month).padStart(2, '0')}/${year}`;
        }

        function parseLessonDate(date) {
            if (!/^\d{2}\/\d{2}\/\d{4}$/.test(date)) return null;
            const [day, month, year] = date.split('/').map(Number);
            const parsed = new Date(year, month - 1, day);
            if (
                parsed.getFullYear() !== year ||
                parsed.getMonth() !== month - 1 ||
                parsed.getDate() !== day
            ) return null;
            return parsed;
        }

        function dateInputToDisplay(value) {
            if (!value) return '';
            const [year, month, day] = value.split('-').map(Number);
            if (!year || !month || !day) return '';
            return formatDateParts(day, month, year);
        }

        function safeLink(url) {
            let trimmed = String(url ?? '').trim();
            if (!trimmed) return '';
            if (!/^[a-z][a-z0-9+.-]*:\/\//i.test(trimmed) && trimmed.includes('.')) {
                trimmed = `https://${trimmed}`;
            }
            try {
                const parsed = new URL(trimmed, window.location.href);
                if (!['http:', 'https:'].includes(parsed.protocol)) return '';
                return parsed.href;
            } catch {
                return '';
            }
        }

        function escapeICS(value) {
            return String(value ?? '')
                .replace(/\\/g, '\\\\')
                .replace(/\n/g, '\\n')
                .replace(/,/g, '\\,')
                .replace(/;/g, '\\;');
        }

        function formatICSDateTime(date) {
            return `${date.getFullYear()}${String(date.getMonth() + 1).padStart(2, '0')}${String(date.getDate()).padStart(2, '0')}T${String(date.getHours()).padStart(2, '0')}${String(date.getMinutes()).padStart(2, '0')}${String(date.getSeconds()).padStart(2, '0')}`;
        }

        function parseClassTime(time) {
            const match = String(time || '').match(/(\d{1,2})(?:(?::|h)(\d{2}))?\s*[-–—]\s*(\d{1,2})(?:(?::|h)(\d{2}))?/i);
            if (!match) {
                return { startHour: 14, startMin: 0, endHour: 16, endMin: 0 };
            }

            const startHour = Number(match[1]);
            const startMin = Number(match[2] || 0);
            const endHour = Number(match[3]);
            const endMin = Number(match[4] || 0);

            if (
                startHour < 0 || startHour > 23 ||
                endHour < 0 || endHour > 23 ||
                startMin < 0 || startMin > 59 ||
                endMin < 0 || endMin > 59
            ) {
                return { startHour: 14, startMin: 0, endHour: 16, endMin: 0 };
            }

            return { startHour, startMin, endHour, endMin };
        }

        function parseCSV(text) {
            const firstLine = String(text || '').split(/\r?\n/)[0] || '';
            if (firstLine.includes('\t')) {
                return String(text || '').replace(/^\uFEFF/, '').split(/\r?\n/).filter(line => line.trim()).map(line => line.split('\t').map(cell => cell.trim()));
            }
            const rows = [];
            let row = [];
            let cell = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const next = text[i + 1];

                if (char === '"' && inQuotes && next === '"') {
                    cell += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    row.push(cell);
                    cell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && next === '\n') i++;
                    row.push(cell);
                    if (row.some(value => value.trim())) rows.push(row);
                    row = [];
                    cell = '';
                } else {
                    cell += char;
                }
            }

            row.push(cell);
            if (row.some(value => value.trim())) rows.push(row);
            return rows;
        }

        function syncTeachingTodosToPlanner() {
            const teaching = getData();
            let planner;
            try {
                planner = JSON.parse(localStorage.getItem('plannerData')) || { tasks: [] };
            } catch {
                planner = { tasks: [] };
            }
            planner.tasks = Array.isArray(planner.tasks) ? planner.tasks : [];

            const originalTeachingTodos = teaching.todos.filter(t => !t.linkedPlannerTaskId);
            const teachingIds = new Set(originalTeachingTodos.map(t => t.id));
            planner.tasks = planner.tasks.filter(t => !t.linkedTeachingTodoId || teachingIds.has(t.linkedTeachingTodoId));

            originalTeachingTodos.forEach(todo => {
                const existing = planner.tasks.find(t => t.linkedTeachingTodoId === todo.id);
                const mapped = {
                    id: existing?.id || `teaching_${todo.id}`,
                    linkedTeachingTodoId: todo.id,
                    title: todo.title,
                    category: todo.classLabel || 'Teaching',
                    status: todo.done ? 'done' : 'todo',
                    date: todo.date || '',
                    desc: 'From Teaching to-do'
                };
                if (existing) Object.assign(existing, mapped);
                else planner.tasks.push(mapped);
            });

            localStorage.setItem('plannerData', JSON.stringify(planner));
        }

        let selectedClassId = null;
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedDate = null;
        let classesOpen = true;
        let lessonsOpen = true;
        let todosOpen = true;
        let editingClassId = null;
        let editingLessonId = null;
        let lessonColumnSizes = JSON.parse(localStorage.getItem('teachingLessonColumnSizes_v1') || '{}');
        const lessonColumnLimits = {
            class: [78, 150],
            lesson: [150, 340],
            date: [90, 140],
            status: [86, 140],
            checks: [112, 190],
            links: [88, 160],
            note: [120, 300]
        };

        function clampLessonColumn(key, value) {
            const [min, max] = lessonColumnLimits[key] || [70, 260];
            return Math.max(min, Math.min(max, Number(value) || min));
        }

        // ============================================================
        // CLASSES
        // ============================================================
        function toggleClasses() {
            classesOpen = !classesOpen;
            document.getElementById('classesBody').classList.toggle('open');
            document.getElementById('classesArrow').classList.toggle('open');
        }

        function toggleLessons() {
            lessonsOpen = !lessonsOpen;
            document.getElementById('lessonsBody').classList.toggle('open');
            document.getElementById('lessonsArrow').classList.toggle('open');
        }

        function toggleTodos() {
            todosOpen = !todosOpen;
            document.getElementById('todosBody').classList.toggle('open');
            document.getElementById('todosArrow').classList.toggle('open');
        }

        function selectLessonClass(id) {
            selectedClassId = id || null;
            updateLessonClassLinks();
            renderAll();
        }

        function updateLessonClassLinks() {
            const data = getData();
            const cls = data.classes.find(c => c.id === selectedClassId);
            const container = document.getElementById('lessonClassLinks');
            if (!container) return;
            if (!cls) {
                container.innerHTML = 'Choose a class to auto-fill Canva/SHUB links.';
                return;
            }
            const links = [];
            const canva = safeLink(cls.canva);
            const shub = safeLink(cls.shub);
            if (canva) links.push(`<a href="${escapeAttr(canva)}" target="_blank" rel="noopener">Canva</a>`);
            if (shub) links.push(`<a href="${escapeAttr(shub)}" target="_blank" rel="noopener">SHUB</a>`);
            container.innerHTML = `<span>${escapeHTML(cls.code)} links:</span> ${links.length ? links.join(' ') : '<span>No Canva/SHUB links saved for this class.</span>'}`;
        }

        function toggleCustomClass() {
            const val = document.getElementById('todoClass').value;
            const customInput = document.getElementById('todoCustomClass');
            if (val === 'custom') {
                customInput.classList.add('show');
                customInput.focus();
            } else {
                customInput.classList.remove('show');
            }
        }

        function saveClass() {
            const code = document.getElementById('classCode').value.trim();
            const time = document.getElementById('classTime').value.trim();
            const salaryRate = parseMoney(document.getElementById('classSalaryRate').value);
            const canva = document.getElementById('classCanva').value.trim();
            const shub = document.getElementById('classShub').value.trim();
            if (!code) return alert('Please enter class code');
            const data = getData();
            if (editingClassId) {
                const cls = data.classes.find(item => item.id === editingClassId);
                if (!cls) return cancelClassEdit();
                Object.assign(cls, { code, time, salaryRate, canva, shub });
                selectedClassId = cls.id;

        function lessonDateToISO(value) {
            const text = String(value || '').trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
            const match = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            return match ? `${match[3]}-${match[2].padStart(2, '0')}-${match[1].padStart(2, '0')}` : '';
        }

        function filterLessonsByTime(list) {
            const mode = document.getElementById('lessonTimeFilter')?.value || 'all';
            if (mode !== 'custom') return list;
            const from = document.getElementById('lessonFromDate')?.value || '';
            const to = document.getElementById('lessonToDate')?.value || '';
            return list.filter(lesson => {
                const date = lessonDateToISO(lesson.date);
                return (!from || date >= from) && (!to || date <= to);
            });
        }

        function applyLessonColumnSizes() {
            Object.entries(lessonColumnSizes || {}).forEach(([key, value]) => {
                const width = clampLessonColumn(key, value);

                document.documentElement.style.setProperty(`--lesson-col-${key}`, `${width}px`);
            });
            localStorage.setItem('teachingLessonColumnSizes_v1', JSON.stringify(lessonColumnSizes));
        }

        function initLessonColumnResize() {
            applyLessonColumnSizes();
            document.querySelectorAll('.col-resizer').forEach(handle => {
                handle.addEventListener('mousedown', event => {
                    event.preventDefault();
                    event.stopPropagation();
                    const key = handle.dataset.col;
                    const th = handle.closest('th');
                    const startX = event.clientX;
                    const startWidth = th.getBoundingClientRect().width;
                    function move(moveEvent) {
                        const width = clampLessonColumn(key, startWidth + moveEvent.clientX - startX);
                        lessonColumnSizes[key] = Math.round(width);
                        document.documentElement.style.setProperty(`--lesson-col-${key}`, `${width}px`);
                    }
                    function stop() {
                        localStorage.setItem('teachingLessonColumnSizes_v1', JSON.stringify(lessonColumnSizes));
                        document.removeEventListener('mousemove', move);
                        document.removeEventListener('mouseup', stop);
                    }
                    document.addEventListener('mousemove', move);
                    document.addEventListener('mouseup', stop);
                });
            });
        }

        // ============================================================

        // ============================================================
        function exportICS() {
            const data = getData();
            const clsMap = Object.fromEntries(data.classes.map(c => [c.id, c]));
            const lessons = data.lessons.filter(l => clsMap[l.classId]);
            if (!lessons.length) return alert('No lessons to export');

        }

        function exportICSData(lessons, clsMap) {
            const nowStamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Teaching Calendar//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n';
            let eventCount = 0;

            lessons.forEach(l => {
                const cls = clsMap[l.classId];
                if (!cls) return;

                const dateObj = parseLessonDate(l.date);
                if (!dateObj) return;

                const { startHour, startMin, endHour, endMin } = parseClassTime(cls.time);

                const startDate = new Date(dateObj);
                startDate.setHours(startHour, startMin, 0, 0);
                const endDate = new Date(dateObj);
                endDate.setHours(endHour, endMin, 0, 0);

                if (endDate <= startDate) {
                    endDate.setTime(startDate.getTime() + 90 * 60 * 1000);
                }

                const summary = `${cls.code} - ${l.name}`;
                const desc = `Class: ${cls.code}\nTime: ${cls.time || ''}\nOther links: ${l.otherLinks || l.notes || ''}\nNote: ${l.note || ''}\nCanva: ${cls.canva || ''}\nSHUB: ${cls.shub || ''}`;

                ics += `BEGIN:VEVENT\r\n`;
                ics += `UID:${escapeICS(l.id || `${cls.id}-${l.name}-${l.date}`)}@teaching\r\n`;
                ics += `DTSTAMP:${nowStamp}\r\n`;
                ics += `SUMMARY:${escapeICS(summary)}\r\n`;
                ics += `DTSTART:${formatICSDateTime(startDate)}\r\n`;
                ics += `DTEND:${formatICSDateTime(endDate)}\r\n`;
                ics += `DESCRIPTION:${escapeICS(desc)}\r\n`;
                ics += `END:VEVENT\r\n`;
                eventCount++;
            });

            ics += 'END:VCALENDAR\r\n';
            if (!eventCount) return alert('No valid lessons with dates were found to export.');

            const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `teaching_${new Date().toISOString().slice(0,10)}.ics`;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                URL.revokeObjectURL(link.href);
                link.remove();
            }, 0);
        }

        // ============================================================
        // CALENDAR
        // ============================================================
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0;
                currentYear++; }
            if (currentMonth < 0) { currentMonth = 11;
                currentYear--; }
            renderCalendar();
        }

        function goToToday() {
            const now = new Date();
            currentMonth = now.getMonth();
            currentYear = now.getFullYear();
            const todayStr = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
            selectedDate = todayStr;
            renderCalendar();
            updateDayLessons(todayStr);
        }

        function renderCalendar() {
            const data = getData();
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'
            ];
            document.getElementById('monthLabel').textContent = `${monthNames[currentMonth]} ${currentYear}`;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

            const grid = document.getElementById('calendarGrid');
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            let html = dayNames.map(d => `<div class="day-name">${d}</div>`).join('');

            const today = new Date();
            const todayStr = `${String(today.getDate()).padStart(2, '0')}/${String(today.getMonth() + 1).padStart(2, '0')}/${today.getFullYear()}`;

            const startOffset = firstDay;
            const prevMonthIndex = currentMonth === 0 ? 11 : currentMonth - 1;
            const prevMonthNumber = prevMonthIndex + 1;
            const prevYear = currentMonth === 0 ? currentYear - 1 : currentYear;
            for (let i = startOffset - 1; i >= 0; i--) {
                const d = daysInPrevMonth - i;
                const dateStr = formatDateParts(d, prevMonthNumber, prevYear);
                html += `<div class="day-cell other-month" data-date="${dateStr}" onclick="selectDate('${dateStr}', ${prevMonthIndex}, ${prevYear})">${d}</div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = formatDateParts(d, currentMonth + 1, currentYear);
                const isToday = dateStr === todayStr ? 'today' : '';
                const isSelected = dateStr === selectedDate ? 'selected' : '';

                const count = data.lessons.filter(l => l.date === dateStr).length;
                const dotHtml = count > 0 ? `<span class="day-dot"></span>` : '';

                html += `<div class="day-cell ${isToday} ${isSelected}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">
                        ${d}
                        ${dotHtml}
                    </div>`;
            }

            const remaining = (7 - ((startOffset + daysInMonth) % 7)) % 7;
            const nextMonthIndex = currentMonth === 11 ? 0 : currentMonth + 1;
            const nextMonthNumber = nextMonthIndex + 1;
            const nextYear = currentMonth === 11 ? currentYear + 1 : currentYear;
            for (let d = 1; d <= remaining; d++) {
                const dateStr = formatDateParts(d, nextMonthNumber, nextYear);
                html += `<div class="day-cell other-month" data-date="${dateStr}" onclick="selectDate('${dateStr}', ${nextMonthIndex}, ${nextYear})">${d}</div>`;
            }

            grid.innerHTML = html;

            if (selectedDate) {
                updateDayLessons(selectedDate);
            }
        }

        function selectDate(dateStr, monthIndex = currentMonth, year = currentYear) {
            selectedDate = dateStr;
            currentMonth = monthIndex;
            currentYear = year;
            renderCalendar();
            updateDayLessons(dateStr);
        }

        function updateDayLessons(dateStr) {
            const data = getData();
            const container = document.getElementById('dayLessons');

            const [d, m, y] = dateStr.split('/').map(Number);
            const dateObj = new Date(y, m - 1, d);
            const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

            const lessons = data.lessons.filter(l => l.date === dateStr);
            const clsMap = Object.fromEntries(data.classes.map(c => [c.id, c]));

            let html = `<div class="day-title">📅 ${dayNames[dateObj.getDay()]}, ${dateStr}</div>`;

            if (lessons.length === 0) {
                html += `<div class="no-lessons">No lessons on this day</div>`;
            } else {
                lessons.forEach(l => {
                    const cls = clsMap[l.classId];
                    const details = l.otherLinks || l.notes || '';
                    html += `<div class="day-lesson-item">
                            <div><span class="cls-code">${cls ? escapeHTML(cls.code) : 'Unknown'}</span> - ${escapeHTML(l.name)}</div>
                            <div class="lesson-notes">${l.completed ? 'Payroll status: Done' : 'Payroll status: Not done'}</div>
                            <div class="lesson-notes">Attendance: ${l.attendanceChecked ? 'Done' : 'Not yet'} · Video: ${l.videoUploaded ? 'Done' : 'Not yet'} · Homework: ${l.homeworkUploaded ? 'Done' : 'Not yet'}</div>
                            ${details ? `<div class="lesson-notes">🔗 ${escapeHTML(details)}</div>` : ''}
                            ${l.note ? `<div class="lesson-notes">📝 ${escapeHTML(l.note)}</div>` : ''}
                            <div class="day-lesson-actions"><button onclick="toggleLessonCompleted('${l.id}')">${l.completed ? 'Undo done' : 'Mark done'}</button><button onclick="editLesson('${l.id}')">Change</button></div>
                        </div>`;
                });
            }

            container.innerHTML = html;
        }

        // ============================================================
        // TO-DO TASKS - with checkbox, ENTER+CMD fixed
        // ============================================================
        function addTodo() {
            const title = document.getElementById('todoTitle').value.trim();
            const classId = document.getElementById('todoClass').value;
            const customClass = document.getElementById('todoCustomClass').value.trim();
            const date = document.getElementById('todoDate').value;

            if (!title) {
                alert('Please enter a task title.');
                document.getElementById('todoTitle').focus();
                return;
            }

            let classLabel = '';
            if (classId === 'custom' && customClass) {
                classLabel = customClass;
            } else if (classId === 'custom') {
                alert('Please enter a custom class name, or choose None.');
                document.getElementById('todoCustomClass').focus();
                return;
            } else if (classId && classId !== 'custom') {
                const data = getData();
                const cls = data.classes.find(c => c.id === classId);
                classLabel = cls ? cls.code : '';
            }

            const data = getData();
            const newTodo = {
                id: Date.now() + '_todo',
                title: title,
                classId: classId === 'custom' ? null : classId,
                classLabel: classLabel,
                date: date || null,
                done: false
            };

            data.todos.push(newTodo);
            saveData(data);
            syncTeachingTodosToPlanner();

            // Clear form
            document.getElementById('todoTitle').value = '';
            document.getElementById('todoCustomClass').value = '';
            document.getElementById('todoDate').value = new Date().toISOString().slice(0, 10);

            renderAll();
            document.getElementById('todoTitle').focus();
        }

        // Keyboard shortcut: Cmd+Enter / Ctrl+Enter
        document.addEventListener('keydown', function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                const active = document.activeElement;
                if (active && ['todoTitle', 'todoClass', 'todoCustomClass', 'todoDate'].includes(active.id)) {
                    e.preventDefault();
                    addTodo();
                }
            }
        });

        function deleteTodo(id) {
            if (!confirm('Delete this task?')) return;
            const data = getData();
            data.todos = data.todos.filter(t => t.id !== id);
            saveData(data);
            syncTeachingTodosToPlanner();
            renderAll();
        }

        function toggleTodoStatus(id) {
            const data = getData();
            const todo = data.todos.find(t => t.id === id);
            if (todo) {
                todo.done = !todo.done;
                saveData(data);
                syncTeachingTodosToPlanner();
                renderAll();
            }
        }

        function renderTodos() {
            const data = getData();
            const container = document.getElementById('todoList');

            const sorted = [...data.todos].sort((a, b) => {
                if (a.done === b.done) return 0;
                return a.done ? 1 : -1;
            });

            let html = '';

            sorted.forEach(t => {
                const isDone = Boolean(t.done);
                const displayDate = dateInputToDisplay(t.date) || t.date;
                html += `<div class="todo-item ${isDone ? 'done' : ''}">
                        <input type="checkbox" class="todo-select" value="${t.id}" aria-label="Select task" />
                        <input type="checkbox" class="todo-done" ${isDone ? 'checked' : ''} onchange="toggleTodoStatus('${t.id}')" aria-label="Mark task done" />
                        <div class="todo-content">
                            <span class="todo-title ${isDone ? 'done' : ''}">${escapeHTML(t.title)}</span>
                            ${t.classLabel ? `<span class="todo-class">${escapeHTML(t.classLabel)}</span>` : ''}
                            ${displayDate ? `<span class="todo-date">📅 ${escapeHTML(displayDate)}</span>` : ''}
                        </div>
                        <span class="todo-del" onclick="deleteTodo('${t.id}')">✕</span>
                    </div>`;
            });

            if (!html) {
                html = `<div class="todo-empty">No tasks yet. Add one above!</div>`;
            }

            container.innerHTML = html;
            document.getElementById('selectAllTodos').checked = false;
        }

        // ============================================================
        // BULK TODO ACTIONS
        // ============================================================
        function toggleAllTodos() {
            const checked = document.getElementById('selectAllTodos').checked;
            document.querySelectorAll('.todo-select').forEach(cb => {
                cb.checked = checked;
            });
        }

        function getSelectedTodoIds() {
            return Array.from(document.querySelectorAll('.todo-select:checked')).map(cb => cb.value);
        }

        function getSelectedTodos() {
            const data = getData();
            const ids = getSelectedTodoIds();
            return data.todos.filter(t => ids.includes(t.id));
        }

        function bulkDeleteTodos() {
            const ids = getSelectedTodoIds();
            if (!ids.length) return alert('Select at least one task');
            if (!confirm(`Delete ${ids.length} task(s)?`)) return;
            const data = getData();
            data.todos = data.todos.filter(t => !ids.includes(t.id));
            saveData(data);
            syncTeachingTodosToPlanner();
            renderAll();
        }

        function bulkExportTodos() {
            const list = getSelectedTodos();
            if (!list.length) return alert('Select at least one task');
            const headers = ['id', 'title', 'classLabel', 'date', 'done'];
            const rows = list.map(t => headers.map(h => `"${(t[h] || '').toString().replace(/"/g, '""')}"`).join(','));
            downloadCSV(headers.join(',') + '\n' + rows.join('\n'), 'todos');
        }

        // ============================================================
        // IMPORT CSV
        // ============================================================
        function importCSV(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const text = ev.target.result;
                    const rows = parseCSV(text);
                    if (!rows.length) {
                        alert('CSV file is empty.');
                        return;
                    }
                    const data = getData();
                    let imported = 0;

                    const header = rows[0].join(',').toLowerCase();
                    if (header.includes('code')) {
                        const headers = rows[0].map(h => h.trim());
                        for (let i = 1; i < rows.length; i++) {
                            const vals = rows[i].map(v => v.trim());
                            const cls = {};
                            headers.forEach((h, idx) => cls[h] = vals[idx] || '');
                            if (cls.id && cls.code) {
                                if (!data.classes.some(c => c.id === cls.id)) {
                                    data.classes.push(cls);
                                    imported++;
                                }
                            }
                        }
                    } else if (header.includes('classid') && header.includes('name')) {
                        const headers = rows[0].map(h => h.trim());
                        for (let i = 1; i < rows.length; i++) {
                            const vals = rows[i].map(v => v.trim());
                            const lesson = {};
                            headers.forEach((h, idx) => lesson[h] = vals[idx] || '');
                            lesson.otherLinks = lesson.otherLinks || lesson.notes || '';
                            lesson.note = lesson.note || '';
                            lesson.attendanceChecked = lesson.attendanceChecked === 'true' || lesson.attendanceChecked === '1' || lesson.attendanceChecked === 'yes';
                            lesson.videoUploaded = lesson.videoUploaded === 'true' || lesson.videoUploaded === '1' || lesson.videoUploaded === 'yes' || lesson.lessonUploaded === 'true' || lesson.lessonUploaded === '1' || lesson.lessonUploaded === 'yes';
                            lesson.homeworkUploaded = lesson.homeworkUploaded === 'true' || lesson.homeworkUploaded === '1' || lesson.homeworkUploaded === 'yes';
                            if (lesson.id && lesson.classId && lesson.name) {
                                if (!data.lessons.some(l => l.id === lesson.id)) {
                                    data.lessons.push(lesson);
                                    imported++;
                                }
                            }
                        }
                    } else if (header.includes('title') && header.includes('classlabel')) {
                        const headers = rows[0].map(h => h.trim());
                        for (let i = 1; i < rows.length; i++) {
                            const vals = rows[i].map(v => v.trim());
                            const todo = {};
                            headers.forEach((h, idx) => todo[h] = vals[idx] || '');
                            todo.done = todo.done === 'true' || todo.done === '1';
                            if (todo.id && todo.title) {
                                if (!data.todos.some(t => t.id === todo.id)) {
                                    data.todos.push(todo);
                                    imported++;
                                }
                            }
                        }
                    } else {
                        alert('Unknown CSV format.');
                        return;
                    }

                    saveData(data);
                    renderAll();
                    alert(`Imported ${imported} item(s) successfully!`);
                } catch (err) {
                    alert('Import error: ' + err.message);
                }
            };
            reader.readAsText(file, 'UTF-8');
            e.target.value = '';
        }

        // ============================================================
        // UTILITY
        // ============================================================
        function downloadCSV(csv, name) {
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${name}_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        // ============================================================
        // RENDER ALL
        // ============================================================
        function renderAll() {
            renderClasses();
            renderLessons();
            renderTodos();
            renderCalendar();

            if (!selectedClassId) {
                const data = getData();
                if (data.classes.length) {
                    selectedClassId = data.classes[0].id;
                    renderClasses();
                    renderLessons();
                }
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            currentMonth = now.getMonth();
            currentYear = now.getFullYear();
            const todayStr = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
            selectedDate = todayStr;
            renderAll();
            initLessonColumnResize();
            updateDayLessons(todayStr);

            document.getElementById('todoDate').value = now.toISOString().slice(0, 10);

            document.getElementById('classesBody').classList.add('open');
            document.getElementById('classesArrow').classList.add('open');
            document.getElementById('lessonsBody').classList.add('open');
            document.getElementById('lessonsArrow').classList.add('open');
            document.getElementById('todosBody').classList.add('open');
            document.getElementById('todosArrow').classList.add('open');

            document.getElementById('todoTitle').focus();
        });
    </script>
</body>
