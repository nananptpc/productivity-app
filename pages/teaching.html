<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teaching</title>
    <link rel="stylesheet" href="../shared.css" />
    <style>
        .class-list {
            display: grid;
            gap: 8px;
        }

        .class-card {
            background: var(--light);
            padding: 12px;
            border-bottom: 1px solid var(--border-soft);
        }

        .class-name {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .class-info {
            font-size: 11px;
            opacity: 0.7;
            line-height: 1.4;
        }

        .class-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .class-actions button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 11px;
        }

        .class-actions button:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Teaching</h1>
            <div class="nav">
                <a href="../index.html">← Home</a>
                <button onclick="toggleTheme()">🌓</button>
                <a href="../settings.html">⚙️</a>
            </div>
        </header>

        <div class="tabs">
            <button class="active" onclick="switchTab('classes')">Classes</button>
            <button onclick="switchTab('lessons')">Lessons</button>
        </div>

        <!-- Classes Tab -->
        <div id="classes" class="tab-content active">
            <div class="card">
                <h2>Add Class</h2>
                <div class="form-group">
                    <label>Class Name</label>
                    <input type="text" id="class-name" placeholder="e.g., English 101">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Day</label>
                        <select id="class-day">
                            <option>Monday</option>
                            <option>Tuesday</option>
                            <option>Wednesday</option>
                            <option>Thursday</option>
                            <option>Friday</option>
                            <option>Saturday</option>
                            <option>Sunday</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" id="class-time">
                    </div>
                </div>
                <button onclick="addClass()" class="primary">Add Class</button>
            </div>

            <div class="card">
                <h2>Classes</h2>
                <div id="classes-list" class="class-list">
                    <div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">
                        No classes yet
                    </div>
                </div>
            </div>
        </div>

        <!-- Lessons Tab -->
        <div id="lessons" class="tab-content">
            <div class="card">
                <h2>Add Lesson</h2>
                <div class="form-group">
                    <label>Topic</label>
                    <input type="text" id="lesson-topic" placeholder="e.g., Verb Conjugation">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Class</label>
                        <input type="text" id="lesson-class" placeholder="e.g., English 101">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="lesson-date">
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="lesson-notes" placeholder="Optional notes..." style="height: 80px;"></textarea>
                </div>
                <button onclick="addLesson()" class="primary">Add Lesson</button>
            </div>

            <div class="card">
                <h2>Upcoming Lessons</h2>
                <div id="lessons-list" class="class-list">
                    <div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">
                        No lessons yet
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../shared-layout.js"></script>
    <script>
        const CLASSES_KEY = 'teaching-classes';
        const LESSONS_KEY = 'teaching-lessons';

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function getClasses() {
            return JSON.parse(localStorage.getItem(CLASSES_KEY) || '[]');
        }

        function getLessons() {
            return JSON.parse(localStorage.getItem(LESSONS_KEY) || '[]');
        }

        function addClass() {
            const name = document.getElementById('class-name').value.trim();
            const day = document.getElementById('class-day').value;
            const time = document.getElementById('class-time').value;

            if (!name || !time) {
                alert('Please fill in all fields');
                return;
            }

            const classes = getClasses();
            classes.push({
                id: Date.now(),
                name,
                day,
                time,
                created: new Date().toISOString()
            });

            localStorage.setItem(CLASSES_KEY, JSON.stringify(classes));
            document.getElementById('class-name').value = '';
            document.getElementById('class-time').value = '';
            renderClasses();
        }

        function deleteClass(id) {
            if (confirm('Delete this class?')) {
                const classes = getClasses().filter(c => c.id !== id);
                localStorage.setItem(CLASSES_KEY, JSON.stringify(classes));
                renderClasses();
            }
        }

        function renderClasses() {
            const classes = getClasses();
            const container = document.getElementById('classes-list');

            if (classes.length === 0) {
                container.innerHTML = '<div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">No classes yet</div>';
                return;
            }

            container.innerHTML = classes.map(c => `
                <div class="class-card">
                    <div class="class-name">${escapeHtml(c.name)}</div>
                    <div class="class-info">
                        📅 ${c.day} at ${c.time}
                    </div>
                    <div class="class-actions">
                        <button onclick="deleteClass(${c.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function addLesson() {
            const topic = document.getElementById('lesson-topic').value.trim();
            const className = document.getElementById('lesson-class').value.trim();
            const date = document.getElementById('lesson-date').value;
            const notes = document.getElementById('lesson-notes').value.trim();

            if (!topic || !className || !date) {
                alert('Please fill in required fields');
                return;
            }

            const lessons = getLessons();
            lessons.push({
                id: Date.now(),
                topic,
                className,
                date,
                notes,
                created: new Date().toISOString()
            });

            localStorage.setItem(LESSONS_KEY, JSON.stringify(lessons));
            document.getElementById('lesson-topic').value = '';
            document.getElementById('lesson-class').value = '';
            document.getElementById('lesson-date').value = '';
            document.getElementById('lesson-notes').value = '';
            renderLessons();
        }

        function deleteLesson(id) {
            if (confirm('Delete this lesson?')) {
                const lessons = getLessons().filter(l => l.id !== id);
                localStorage.setItem(LESSONS_KEY, JSON.stringify(lessons));
                renderLessons();
            }
        }

        function renderLessons() {
            const lessons = getLessons();
            const container = document.getElementById('lessons-list');

            if (lessons.length === 0) {
                container.innerHTML = '<div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">No lessons yet</div>';
                return;
            }

            container.innerHTML = lessons.map(l => `
                <div class="class-card">
                    <div class="class-name">${escapeHtml(l.topic)}</div>
                    <div class="class-info">
                        📚 ${escapeHtml(l.className)}<br>
                        📅 ${l.date}<br>
                        ${l.notes ? `📝 ${escapeHtml(l.notes)}` : ''}
                    </div>
                    <div class="class-actions">
                        <button onclick="deleteLesson(${l.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderClasses();
            renderLessons();
        });
    </script>
</body>
</html>
