        // ============================================================
        function setHeatmapRange(range) {
            heatmapRange = range;
            document.querySelectorAll('.heatmap-controls button').forEach(b => b.classList.remove('active'));
            const map = {
                'week': 'hmWeek',
                'month': 'hmMonth',
                'quarter': 'hmQuarter',
                'year': 'hmYear'
            };
            document.getElementById(map[range]).classList.add('active');
            renderHeatmap();
        }

        function renderHeatmap() {
            const data = getData();
            const now = new Date();
            let start = new Date(now);
            let days = 7;

            if (heatmapRange === 'week') {
                start.setDate(now.getDate() - 6);
                days = 7;
            } else if (heatmapRange === 'month') {
                start.setDate(now.getDate() - 29);
                days = 30;
            } else if (heatmapRange === 'quarter') {
                start.setDate(now.getDate() - 89);
                days = 90;
            } else {
                start.setDate(now.getDate() - 364);
                days = 365;
            }

            const grid = document.getElementById('heatmapGrid');
            let html = '';

            const taskCounts = {};
            data.tasks.forEach(t => {
                if (t.date && t.status !== 'cancel') {
                    taskCounts[t.date] = (taskCounts[t.date] || 0) + 1;
                }
            });

            for (let i = 0; i < days; i++) {
                const d = new Date(start);
                d.setDate(start.getDate() + i);
                const dateStr = formatDate(d.getFullYear(), d.getMonth() + 1, d.getDate());
                const count = taskCounts[dateStr] || 0;

                let level = 0;
                if (count >= 4) level = 4;
                else if (count >= 3) level = 3;
                else if (count >= 2) level = 2;
                else if (count >= 1) level = 1;

                const isToday = dateStr === todayDate();
                html += `<div class="heatmap-cell level-${level}" style="${isToday ? 'border:2px solid var(--accent);' : ''}" 
                            onclick="selectDate('${dateStr}')" title="${dateStr}: ${count} tasks"></div>`;
            }

            grid.innerHTML = html;
        }

        // ============================================================
        // MENSTRUAL CYCLE
        // ============================================================
        function parseDateInput(value) {
            if (!value) return null;
            const parts = value.split('-').map(Number);
            if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
            return new Date(parts[0], parts[1] - 1, parts[2]);
        }

        function daysBetween(start, end) {
            const dayMs = 24 * 60 * 60 * 1000;
            return Math.floor((end.setHours(0, 0, 0, 0) - start.setHours(0, 0, 0, 0)) / dayMs);
        }

        function updateCycle() {
            const startStr = document.getElementById('cycleStart').value;
            const endStr = document.getElementById('cycleEnd').value;
            const length = parseInt(document.getElementById('cycleLength').value) || 28;
            const summary = document.getElementById('cycleSummary');

            localStorage.setItem('plannerCycle_v1', JSON.stringify({
                start: startStr,
                end: endStr,
                length
            }));

            if (!startStr) {
                summary.textContent = 'Set a start date.';
                return;
            }

            const start = parseDateInput(startStr);
            const end = parseDateInput(endStr);
            const today = new Date();
            const elapsed = daysBetween(new Date(start), today);
            const cycleDay = ((elapsed % length) + length) % length + 1;

            if (end) {
                const periodLength = daysBetween(new Date(start), new Date(end)) + 1;
                if (periodLength < 1) {
                    summary.textContent = 'End date is before start date.';
                    return;
                }
                summary.textContent = `Period: ${periodLength} day(s) · Cycle day ${cycleDay}`;
            } else {
                summary.textContent = `No end date yet · Cycle day ${cycleDay}`;
            }
        }

        document.getElementById('cycleStart').addEventListener('change', updateCycle);
        document.getElementById('cycleEnd').addEventListener('change', updateCycle);
        document.getElementById('cycleLength').addEventListener('change', updateCycle);

        // ============================================================
        // CSV IMPORT / EXPORT
        // ============================================================
        function exportCSV() {
            const data = getData();
            if (!data.tasks.length) return alert('No tasks to export');
            const headers = ['id', 'title', 'category', 'status', 'date', 'startDate', 'endDate', 'desc', 'priority', 'starred', 'subtasks'];
            const rows = data.tasks.map(t => headers.map(h => `"${exportTaskField(t, h).replace(/"/g, '""')}"`).join(','));
            downloadCSV(headers.join(',') + '\n' + rows.join('\n'), 'planner');
        }

        function exportTaskField(task, key) {
            if (key === 'subtasks') {
                return (task.subtasks || []).map(item => {
                    const dateParts = [item.startDate, item.endDate].filter(Boolean);
                    return `${item.done ? '[x]' : '[ ]'} ${item.title}${dateParts.length ? ` | ${dateParts.join(' | ')}` : ''}`;
                }).join('\n');
            }
            if (key === 'priority') return '';
            if (key === 'starred') return task.starred ? 'true' : 'false';
            return String(task[key] || '');
        }

        function exportICS() {
            const data = getData();
            const tasks = data.tasks.filter(t => taskDateRange(t).start);
            if (!tasks.length) return alert('No dated tasks to export');
            exportICSData(tasks, 'planner');
        }

        function exportICSData(tasks, name) {
            const datedTasks = tasks.filter(t => formatICSDate(taskDateRange(t).start));
            if (!datedTasks.length) return alert('No dated tasks to export');

            const nowStamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            let ics = 'BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Productivity Planner//EN\nCALSCALE:GREGORIAN\n';

            datedTasks.forEach(task => {
                const range = taskDateRange(task);
                const start = formatICSDate(range.start);
                const endDate = new Date(`${range.end || range.start}T00:00:00`);
                endDate.setDate(endDate.getDate() + 1);
                const end = formatDate(endDate.getFullYear(), endDate.getMonth() + 1, endDate.getDate()).replace(/-/g, '');
                const statusLabel = STATUS_META[task.status] || task.status || 'Task';
                const description = `Category: ${task.category || ''}\nStatus: ${statusLabel}\nDescription: ${task.desc || ''}`;

                ics += 'BEGIN:VEVENT\n';
                ics += `UID:${escapeICS(task.id || `${task.title}-${range.start}`)}@planner\n`;
                ics += `DTSTAMP:${nowStamp}\n`;
                ics += `DTSTART;VALUE=DATE:${start}\n`;
                ics += `DTEND;VALUE=DATE:${end}\n`;
                ics += `SUMMARY:${escapeICS(task.title)}\n`;
                ics += `DESCRIPTION:${escapeICS(description)}\n`;
                ics += `CATEGORIES:${escapeICS(task.category || 'Planner')}\n`;
                ics += 'END:VEVENT\n';
            });

            ics += 'END:VCALENDAR';
            downloadICS(ics, name);
        }

        function downloadICS(ics, name) {
            const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${name}_${new Date().toISOString().slice(0,10)}.ics`;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                URL.revokeObjectURL(link.href);
                link.remove();
            }, 0);
        }

        function downloadCSV(csv, name) {
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${name}_${new Date().toISOString().slice(0,10)}.csv`;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                URL.revokeObjectURL(link.href);
                link.remove();
            }, 0);
        }

        function importCSV(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const text = ev.target.result;
                    const rows = parseCSV(text);
                    if (!rows.length) {
                        alert('CSV file is empty.');
                        return;
                    }
                    const headers = rows[0].map(h => h.trim());
                    const data = getData();
                    let imported = 0;
                    for (let i = 1; i < rows.length; i++) {
                        const vals = rows[i].map(v => v.trim());
                        const task = {};
                        headers.forEach((h, idx) => task[h] = vals[idx] || '');
                        task.startDate = task.startDate || task.date || task.deadline || todayDate();
                        task.endDate = task.endDate || task.startDate;
                        task.date = task.startDate;
                        task.category = task.category || 'Other';
                        task.status = ['todo', 'doing', 'done', 'cancel'].includes(task.status) ? task.status : 'todo';
                        task.starred = ['true', 'yes', '1', 'starred'].includes(String(task.starred || '').toLowerCase());
                        if (task.starred) {
                            data.tasks.forEach(existing => existing.starred = false);
                        }
                        if (task.id && task.title) {
                            if (!data.tasks.some(t => t.id === task.id)) {
                                data.tasks.push(task);
                                imported++;
                            }
                        }
                    }
                    saveData(data);
                    renderAll();
                    alert(`Imported ${imported} task(s) successfully!`);
                } catch (err) {
                    alert('Import error: ' + err.message);
                }
            };
            reader.readAsText(file, 'UTF-8');
            e.target.value = '';
        }

        // ============================================================
        // RENDER ALL
        // ============================================================
        function renderAll() {
            renderTasks();
            renderCalendar();
            renderHeatmap();
            updateCycle();

            if (!selectedDate) {
                const today = todayDate();
                selectedDate = today;
                document.getElementById('filterDate').value = today;
                document.getElementById('taskStartDate').value = today;
                document.getElementById('taskEndDate').value = today;
                renderCalendar();
                updateDayTasks(today);
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            currentMonth = now.getMonth();
            currentYear = now.getFullYear();
            const todayStr = todayDate();
            selectedDate = todayStr;
            document.getElementById('filterDate').value = todayStr;
            document.getElementById('taskStartDate').value = todayStr;
            document.getElementById('taskEndDate').value = todayStr;
            document.getElementById('filterTime').value = focusScope;
            document.getElementById('focusScope').value = focusScope;
            document.getElementById('compactModeToggle').checked = localStorage.getItem('plannerCompactMode') === 'true';
            toggleCompactMode(document.getElementById('compactModeToggle').checked);
            const savedCycle = JSON.parse(localStorage.getItem('plannerCycle_v1') || '{}');
            document.getElementById('cycleStart').value = savedCycle.start || todayStr;
            document.getElementById('cycleEnd').value = savedCycle.end || '';
            document.getElementById('cycleLength').value = savedCycle.length || 28;
            updateCycle();
            renderAll();
            updateDayTasks(todayStr);

            document.getElementById('dayTasksBody').classList.add('open');
            document.getElementById('dayTasksArrow').classList.add('open');
            document.getElementById('taskTitle').focus();
        });
    </script>
</body>
</html>
