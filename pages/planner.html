<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planner</title>
    <link rel="stylesheet" href="../shared.css" />
    <style>
        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .add-task {
            display: grid;
            grid-template-columns: 1fr 80px;
            gap: 8px;
        }

        .task-list {
            display: grid;
            gap: 6px;
        }

        .task-item {
            display: grid;
            grid-template-columns: 20px 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 8px;
            background: var(--light);
            border-bottom: 1px solid var(--border-soft);
        }

        .task-item input[type="checkbox"] {
            accent-color: var(--accent);
        }

        .task-text {
            word-break: break-word;
        }

        .task-text.done {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .task-delete {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
        }

        .task-delete:hover {
            color: var(--accent);
        }

        .empty-state {
            padding: 20px;
            text-align: center;
            opacity: 0.6;
            font-size: 12px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Planner</h1>
            <div class="nav">
                <a href="../index.html">← Home</a>
                <button onclick="toggleTheme()">🌓</button>
                <a href="../settings.html">⚙️ Settings</a>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <span class="stat-number" id="total-tasks">0</span>
                <span>Total</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="completed-tasks">0</span>
                <span>Done</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="remaining-tasks">0</span>
                <span>Left</span>
            </div>
        </div>

        <div class="card">
            <h2>Add Task</h2>
            <div class="add-task">
                <input type="text" id="task-input" placeholder="Type a new task...">
                <button onclick="addTask()" class="primary">Add</button>
            </div>
        </div>

        <div class="card">
            <h2>Tasks</h2>
            <div id="task-list" class="task-list">
                <div class="empty-state">No tasks yet. Add one above!</div>
            </div>
        </div>
    </div>

    <script src="../shared-layout.js"></script>
    <script>
        const STORAGE_KEY = 'planner-tasks';

        function getTasks() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function saveTasks(tasks) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            renderTasks();
            updateStats();
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            if (!text) return;

            const tasks = getTasks();
            tasks.push({
                id: Date.now(),
                text: text,
                done: false,
                created: new Date().toISOString()
            });

            saveTasks(tasks);
            input.value = '';
            input.focus();
        }

        function toggleTask(id) {
            const tasks = getTasks();
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.done = !task.done;
                saveTasks(tasks);
            }
        }

        function deleteTask(id) {
            if (confirm('Delete this task?')) {
                const tasks = getTasks().filter(t => t.id !== id);
                saveTasks(tasks);
            }
        }

        function renderTasks() {
            const tasks = getTasks();
            const container = document.getElementById('task-list');

            if (tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">No tasks yet. Add one above!</div>';
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="task-item">
                    <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${task.id})">
                    <span class="task-text ${task.done ? 'done' : ''}">${escapeHtml(task.text)}</span>
                    <button class="task-delete" onclick="deleteTask(${task.id})">✕</button>
                </div>
            `).join('');
        }

        function updateStats() {
            const tasks = getTasks();
            const completed = tasks.filter(t => t.done).length;
            const remaining = tasks.length - completed;

            document.getElementById('total-tasks').textContent = tasks.length;
            document.getElementById('completed-tasks').textContent = completed;
            document.getElementById('remaining-tasks').textContent = remaining;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to add task
        document.getElementById('task-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTasks();
            updateStats();
        });
    </script>
</body>
</html>
