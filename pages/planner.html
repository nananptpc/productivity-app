<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planner - Task Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #fff5f7;
            --text: #4a3f44;
            --card: #ffffff;
            --shadow: 0 4px 16px rgba(232, 162, 182, 0.2);
            --border: #f8d7e0;
            --accent: #f7a1b5;
            --accent2: #fbc4d0;
            --font: 'American Typewriter', 'Courier New', monospace;
            --radius: 8px;
            --transition: 0.3s ease;
            --completed-opacity: 0.4;
        }
        body.dark {
            --bg: #2d2428;
            --text: #f5e6ea;
            --card: #3d3238;
            --shadow: 0 4px 16px rgba(0,0,0,0.4);
            --border: #5a454c;
            --accent: #d47b92;
            --accent2: #a06275;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 14px;
            transition: background var(--transition), color var(--transition);
        }
        * {
            font-family: var(--font);
        }
        .container {
            max-width: 1320px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 14px 18px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            transition: background var(--transition);
        }
        header h1 {
            font-size: 26px;
            letter-spacing: 1px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-actions button,
        .header-actions a {
            padding: 8px 18px;
            border: none;
            border-radius: 40px;
            background: var(--accent2);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            cursor: pointer;
            transition: background var(--transition), transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .header-actions button:hover,
        .header-actions a:hover {
            background: var(--accent);
            transform: scale(1.02);
        }
        .theme-toggle {
            background: transparent;
            border: 2px solid var(--accent);
            border-radius: 40px;
            padding: 6px 16px;
            font-family: var(--font);
            cursor: pointer;
            color: var(--text);
            transition: 0.3s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 250px minmax(0, 1fr);
            gap: 16px;
        }
        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* LEFT PANEL */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* CALENDAR */
        .calendar-section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow);
            transition: background var(--transition);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .calendar-header .month-year-label {
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .calendar-nav {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .calendar-nav button {
            padding: 4px 12px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .calendar-nav button:hover {
            background: var(--accent2);
        }
        .calendar-nav .today-btn {
            font-size: 12px;
            padding: 4px 12px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-grid .day-name {
            text-align: center;
            font-size: 11px;
            opacity: 0.6;
            padding: 4px 0;
            font-weight: bold;
        }
        .calendar-grid .day-cell {
            text-align: center;
            padding: 6px 2px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            border: 2px solid transparent;
            min-height: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .calendar-grid .day-cell:hover {
            background: var(--accent2);
        }
        .calendar-grid .day-cell.today {
            border-color: var(--accent);
            background: var(--accent2);
        }
        .calendar-grid .day-cell.selected {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .calendar-grid .day-cell.other-month {
            opacity: 0.3;
        }
        .calendar-grid .day-cell .day-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: 1px;
        }

        /* DAY TASKS - dropdown */
        .day-tasks-section {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: background var(--transition);
        }
        .day-tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: 0.3s;
            user-select: none;
        }
        .day-tasks-header:hover {
            background: var(--accent2);
        }
        .day-tasks-header .day-title {
            font-weight: bold;
            font-size: 14px;
        }
        .day-tasks-header .arrow {
            font-size: 14px;
            transition: transform 0.3s;
            opacity: 0.5;
        }
        .day-tasks-header .arrow.open {
            transform: rotate(180deg);
        }
        .day-tasks-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .day-tasks-body.open {
            max-height: 400px;
        }
        .day-tasks-body-inner {
            padding: 0 16px 16px 16px;
        }
        .day-task-item {
            font-size: 13px;
            padding: 8px 10px;
            background: var(--bg);
            border-radius: 6px;
            margin: 3px 0;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: 16px minmax(0, 1fr) auto;
            align-items: start;
            gap: 8px;
            width: 100%;
            overflow: hidden;
        }
        .day-task-item input[type="checkbox"] {
            accent-color: var(--accent);
            width: 13px;
            height: 13px;
            min-width: 13px;
            cursor: pointer;
            flex-shrink: 0;
            padding: 0;
        }
        .day-task-item .task-title.done {
            text-decoration: line-through;
            opacity: var(--completed-opacity);
        }
        .day-task-item .task-title {
            min-width: 0;
            overflow-wrap: anywhere;
            line-height: 1.35;
        }
        .day-task-item .task-category {
            font-size: 10px;
            padding: 1px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            opacity: 0.8;
            justify-self: start;
            max-width: 100%;
            overflow-wrap: anywhere;
        }
        .day-task-item .task-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid currentColor;
            background: transparent;
            justify-self: start;
            white-space: nowrap;
        }
        .day-task-main {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-width: 0;
        }
        .day-task-item .task-status.todo {
            color: #b46d00;
        }
        .day-task-item .task-status.doing {
            color: #2176a8;
        }
        .day-task-item .task-status.done {
            color: #208a4d;
        }
        .day-task-item .task-status.cancel {
            color: #c73b5a;
        }
        .day-tasks-body .no-tasks {
            font-size: 13px;
            opacity: 0.6;
            text-align: center;
            padding: 16px 0;
        }

        /* HEATMAP */
        .heatmap-section {
            background: var(--card);
            padding: 14px 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: background var(--transition);
        }
        .heatmap-section h3 {
            font-size: 15px;
            margin-bottom: 8px;
        }
        .heatmap-controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .heatmap-controls button {
            padding: 3px 12px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }
        .heatmap-controls button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .heatmap-controls button:hover {
            background: var(--accent2);
        }
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            background: var(--border);
            transition: 0.2s;
            cursor: pointer;
        }
        .heatmap-cell:hover {
            transform: scale(1.1);
        }
        .heatmap-cell.level-0 {
            background: var(--border);
        }
        .heatmap-cell.level-1 {
            background: #f8d7e0;
        }
        .heatmap-cell.level-2 {
            background: #f5b7c1;
        }
        .heatmap-cell.level-3 {
            background: #f1948a;
        }
        .heatmap-cell.level-4 {
            background: #e74c6f;
        }
        .heatmap-legend {
            display: flex;
            gap: 10px;
            font-size: 10px;
            opacity: 0.6;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .heatmap-legend .dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
        }

        /* MENSTRUAL CYCLE */
        .cycle-section {
            background: var(--card);
            padding: 14px 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: background var(--transition);
        }
        .cycle-section h3 {
            font-size: 15px;
            margin-bottom: 8px;
        }
        .cycle-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .cycle-row input,
        .cycle-row select {
            padding: 5px 10px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 12px;
        }
        .cycle-row .day-display {
            font-size: 22px;
            font-weight: bold;
            color: var(--accent);
            padding: 0 6px;
        }

        /* RIGHT PANEL - TASKS */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section {
            background: var(--card);
            padding: 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: background var(--transition);
        }
        .section h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        .form-row input,
        .form-row select,
        .form-row textarea {
            padding: 7px 12px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            flex: 1 1 140px;
            transition: border 0.3s;
        }
        .form-row input:focus,
        .form-row select:focus,
        .form-row textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-row textarea {
            flex: 1 1 200px;
            border-radius: 16px;
            min-height: 40px;
            resize: vertical;
        }
        .form-row button {
            padding: 7px 18px;
            border: none;
            border-radius: 40px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .form-row button:hover {
            opacity: 0.85;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }
        .filter-bar select,
        .filter-bar input {
            padding: 6px 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
        }
        .filter-bar .bulk-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-left: auto;
        }
        .filter-bar .bulk-actions button {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            background: var(--accent2);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-bar .bulk-actions button:hover {
            background: var(--accent);
        }
        .filter-bar .bulk-actions .danger {
            background: #e74c6f;
            color: #fff;
        }
        .filter-bar .bulk-actions .danger:hover {
            background: #c0392b;
        }
        .filter-bar .bulk-actions .success {
            background: #2ecc71;
            color: #fff;
        }
        .filter-bar .bulk-actions .success:hover {
            background: #27ae60;
        }

        .view-shell {
            margin-top: 8px;
        }

        .focus-panel {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            display: grid;
            gap: 10px;
            margin-bottom: 12px;
            padding: 12px;
        }
        .focus-top {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: space-between;
        }
        .focus-title {
            font-size: 16px;
            font-weight: 800;
        }
        .focus-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .focus-controls select,
        .focus-controls label {
            font-size: 12px;
        }
        .progress-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 999px;
            height: 12px;
            overflow: hidden;
        }
        .progress-fill {
            background: var(--accent);
            height: 100%;
            transition: width 0.25s ease;
        }
        .focus-stats {
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }
        .focus-stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px;
        }
        .focus-stat span {
            display: block;
            font-size: 11px;
            opacity: 0.65;
        }
        .focus-stat strong {
            font-size: 18px;
        }
        .focus-list {
            display: grid;
            gap: 6px;
        }
        .focus-item {
            align-items: center;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: grid;
            gap: 8px;
            grid-template-columns: 14px minmax(0, 1fr) auto;
            padding: 7px 8px;
        }
        .focus-item input[type="checkbox"] {
            height: 13px;
            min-width: 13px;
            padding: 0;
            width: 13px;
        }
        .priority-badge {
            border: 1px solid currentColor;
            border-radius: 6px;
            display: inline-block;
            font-size: 10px;
            padding: 1px 6px;
            white-space: nowrap;
        }
        .priority-high { color: #c73b5a; }
        .priority-medium { color: #b46d00; }
        .priority-low { color: #2176a8; }
        .subtask-toggle {
            margin-top: 6px;
        }
        .subtask-toggle summary {
            cursor: pointer;
            font-size: 11px;
            opacity: 0.75;
        }
        .subtask-list {
            display: grid;
            gap: 4px;
            margin-top: 6px;
        }
        .subtask-item {
            align-items: start;
            display: grid;
            gap: 6px;
            grid-template-columns: 13px minmax(0, 1fr);
            font-size: 12px;
            line-height: 1.35;
        }
        .subtask-item input {
            height: 12px;
            min-width: 12px;
            padding: 0;
            width: 12px;
        }
        .subtask-item.done span {
            opacity: 0.5;
            text-decoration: line-through;
        }
        body.compact-mode {
            font-size: 14px;
        }
        body.compact-mode .section,
        body.compact-mode .calendar-section,
        body.compact-mode .day-tasks-section,
        body.compact-mode .heatmap-section,
        body.compact-mode .cycle-section {
            padding: 12px;
        }
        body.compact-mode .task-table th,
        body.compact-mode .task-table td {
            padding: 7px 8px;
        }
        body.compact-mode .left-panel {
            gap: 10px;
        }

        .table-wrap {
            min-height: 260px;
            max-height: min(54vh, 620px);
            max-width: 100%;
            width: 100%;
            overflow: auto;
            resize: both;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
        }
        .task-table {
            width: max-content;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 720px;
            table-layout: fixed;
        }
        .task-table th,
        .task-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }
        .task-table td {
            min-width: 120px;
            max-width: 300px;
            overflow: auto;
            resize: horizontal;
            overflow-wrap: anywhere;
        }
        .task-table th:first-child,
        .task-table td:first-child {
            width: 34px;
            min-width: 34px;
            max-width: 34px;
            padding: 8px 6px;
            text-align: center;
        }
        .task-table td:first-child {
            overflow: visible;
            resize: none;
        }
        .task-table th:last-child,
        .task-table td:last-child {
            width: 96px;
            min-width: 96px;
            max-width: 112px;
            padding: 8px 6px;
        }
        .task-table td:last-child {
            overflow: visible;
            resize: none;
        }
        .task-table th {
            background: var(--card);
            font-weight: bold;
            white-space: nowrap;
        }
        .task-table tr:last-child td {
            border-bottom: none;
        }
        .task-table input[type="checkbox"] {
            accent-color: var(--accent);
            width: 13px;
            height: 13px;
            min-width: 13px;
            cursor: pointer;
            padding: 0;
        }
        .task-table .table-task-title.done {
            text-decoration: line-through;
            opacity: var(--completed-opacity);
        }
        .task-table .table-description {
            opacity: 0.75;
            max-width: 280px;
        }
        .status-badge,
        .category-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid currentColor;
            background: transparent;
            white-space: nowrap;
            font-size: 11px;
        }
        .category-badge {
            color: var(--text);
            border-color: var(--border);
        }
        .status-badge.todo {
            color: #b46d00;
        }
        .status-badge.doing {
            color: #2176a8;
        }
        .status-badge.done {
            color: #208a4d;
        }
        .status-badge.cancel {
            color: #c73b5a;
        }
        .view-empty {
            text-align: center;
            font-size: 13px;
            opacity: 0.55;
            padding: 28px 16px;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            background: var(--bg);
        }

        .calendar-task-view,
        .dashboard-grid {
            display: grid;
            gap: 12px;
        }
        .calendar-day-group,
        .dashboard-card {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
        }
        .calendar-day-group h4,
        .dashboard-card h4 {
            font-size: 14px;
            margin-bottom: 8px;
        }
        .calendar-task-row,
        .dashboard-task-row {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 7px 0;
            border-top: 1px solid var(--border);
            font-size: 13px;
        }
        .calendar-task-row:first-of-type,
        .dashboard-task-row:first-of-type {
            border-top: none;
        }
        .dashboard-grid {
            grid-template-columns: repeat(4, 1fr);
        }
        .dashboard-card .big-number {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        /* KANBAN BOARD */
        .kanban-board {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }
        @media (max-width: 1000px) {
            .kanban-board {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 600px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
        }

        .kanban-column {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 12px;
            border: 2px solid var(--border);
            min-height: 150px;
        }
        .kanban-column .col-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .kanban-column .col-title .count {
            font-size: 12px;
            opacity: 0.5;
            font-weight: normal;
        }
        .kanban-column .col-title .status-dot {

        }
        .kanban-column .status-dot.todo {

        .kanban-column .status-dot.doing {

        .kanban-column .status-dot.done {

        .kanban-item {

            border-radius: 8px;

            border: 1px solid var(--border);
            cursor: pointer;

        .kanban-item:hover {

        .kanban-item input[type="checkbox"] {

            width: 13px;

        .kanban-item .item-title {

    <script>
        // ============================================================
        // THEME
        // ============================================================
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('plannerTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('plannerTheme') === 'dark') document.body.classList.add('dark');

        // ============================================================
        // DATA
        // ============================================================
        function getData() {
            try {
                return normalizeData(JSON.parse(localStorage.getItem('plannerData')));
            } catch { return { tasks: [] }; }
        }

        function saveData(d) {
            localStorage.setItem('plannerData', JSON.stringify(normalizeData(d)));
        }

        function normalizeData(data) {
            const tasks = Array.isArray(data?.tasks) ? data.tasks : [];
            return {
                tasks: tasks.map(t => ({
                    id: t.id || Date.now() + '_task',
                    title: t.title || t.task || '',
                    category: t.category || 'Other',
                    status: ['todo', 'doing', 'done', 'cancel'].includes(t.status) ? t.status : 'todo',
                    date: t.date || t.deadline || '',
                    desc: t.desc || t.description || '',
                    priority: ['low', 'medium', 'high'].includes(t.priority) ? t.priority : 'medium',
                    subtasks: normalizeSubtasks(t.subtasks)
                })).filter(t => t.title)
            };
        }

        function normalizeSubtasks(subtasks) {
            if (Array.isArray(subtasks)) {
                return subtasks.map(item => ({
                    id: item.id || Date.now() + '_sub_' + Math.random().toString(16).slice(2),
                    title: item.title || item.text || '',
                    done: Boolean(item.done)
                })).filter(item => item.title);
            }
            if (typeof subtasks === 'string') {
                return subtasks.split(/\r?\n|\s\|\s/).map(line => line.trim()).filter(Boolean).map(line => {
                    const done = /^\[x\]/i.test(line);
                    const title = cleanTaskLine(line.replace(/^\[(x|\s)\]\s*/i, '').trim());
                    return {
                        id: Date.now() + '_sub_' + Math.random().toString(16).slice(2),
                        title,
                        done
                    };
                }).filter(item => item.title);
            }
            return [];
        }

        function cleanTaskLine(value) {
            return String(value || '').replace(/^[-*•]\s*/, '').replace(/^\d+[.)]\s*/, '').trim();
        }

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function formatDate(year, month, day) {
            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function displayDate(dateStr) {
            const [y, m, d] = String(dateStr).split('-').map(Number);
            if (!y || !m || !d) return '';
            return `${String(d).padStart(2, '0')}/${String(m).padStart(2, '0')}/${y}`;
        }

        function todayDate() {
            const now = new Date();
            return formatDate(now.getFullYear(), now.getMonth() + 1, now.getDate());
        }

        function escapeICS(value) {
            return String(value ?? '')
                .replace(/\\/g, '\\\\')
                .replace(/\n/g, '\\n')
                .replace(/,/g, '\\,')
                .replace(/;/g, '\\;');
        }

        function formatICSDate(dateStr) {
            const [year, month, day] = String(dateStr || '').split('-').map(Number);
            if (!year || !month || !day) return '';
            return `${year}${String(month).padStart(2, '0')}${String(day).padStart(2, '0')}`;
        }

        function syncPlannerTasksToTeachingTodos() {
            const planner = getData();
            let teaching;
            try {
                teaching = JSON.parse(localStorage.getItem('teachingData')) || { classes: [], lessons: [], todos: [] };
            } catch {
                teaching = { classes: [], lessons: [], todos: [] };
            }
            teaching.classes = Array.isArray(teaching.classes) ? teaching.classes : [];
            teaching.lessons = Array.isArray(teaching.lessons) ? teaching.lessons : [];
            teaching.todos = Array.isArray(teaching.todos) ? teaching.todos : [];

            const originalPlannerTasks = planner.tasks.filter(t => !t.linkedTeachingTodoId);
            const plannerIds = new Set(originalPlannerTasks.map(t => t.id));
            teaching.todos = teaching.todos.filter(t => !t.linkedPlannerTaskId || plannerIds.has(t.linkedPlannerTaskId));

            originalPlannerTasks.forEach(task => {
                const existing = teaching.todos.find(t => t.linkedPlannerTaskId === task.id);
                const mapped = {
                    id: existing?.id || `planner_${task.id}`,
                    linkedPlannerTaskId: task.id,
                    title: task.title,
                    classId: null,
                    classLabel: task.category || 'Planner',
                    date: task.date || null,
                    done: task.status === 'done' || task.status === 'cancel'
                };
                if (existing) Object.assign(existing, mapped);
                else teaching.todos.push(mapped);
            });

            localStorage.setItem('teachingData', JSON.stringify(teaching));
        }

        function parseCSV(text) {
            const firstLine = String(text || '').split(/\r?\n/)[0] || '';
            if (firstLine.includes('\t')) {
                return String(text || '').replace(/^\uFEFF/, '').split(/\r?\n/).filter(line => line.trim()).map(line => line.split('\t').map(cell => cell.trim()));
            }
            const rows = [];
            let row = [];
            let cell = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const next = text[i + 1];
                if (char === '"' && inQuotes && next === '"') {
                    cell += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    row.push(cell);
                    cell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && next === '\n') i++;
                    row.push(cell);
                    if (row.some(value => value.trim())) rows.push(row);
                    row = [];
                    cell = '';
                } else {
                    cell += char;
                }
            }

            row.push(cell);
            if (row.some(value => value.trim())) rows.push(row);
            return rows;
        }

        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedDate = null;
        let heatmapRange = 'week';
        let dayTasksOpen = true;
        let currentView = 'table';
        let editingTaskId = null;
        let focusScope = localStorage.getItem('plannerFocusScope') || 'day';

        const STATUS_ORDER = ['todo', 'doing', 'done', 'cancel'];
        const STATUS_META = {
            todo: '⏳ To-do',
            doing: '🔄 Doing',
            done: '✅ Done',
            cancel: '❌ Cancel'
        };

        function statusRank(status) {
            const rank = STATUS_ORDER.indexOf(status);
            return rank === -1 ? STATUS_ORDER.length : rank;
        }

        function sortTasks(tasks) {
            return [...tasks].sort((a, b) => {
                const statusDiff = statusRank(a.status) - statusRank(b.status);
                if (statusDiff) return statusDiff;
                const priorityDiff = priorityRank(b.priority) - priorityRank(a.priority);
                if (priorityDiff) return priorityDiff;
                const dateDiff = String(a.date || '').localeCompare(String(b.date || ''));
                if (dateDiff) return dateDiff;
                return String(a.title || '').localeCompare(String(b.title || ''));
            });
        }

        function priorityRank(priority) {
            return { low: 1, medium: 2, high: 3 }[priority] || 2;
        }

        function priorityBadge(priority) {
            const key = ['low', 'medium', 'high'].includes(priority) ? priority : 'medium';
            return `<span class="priority-badge priority-${key}">${key}</span>`;
        }

        function parseLocalDate(dateStr) {
            const [year, month, day] = String(dateStr || '').split('-').map(Number);
            if (!year || !month || !day) return null;
            return new Date(year, month - 1, day);
        }

        function addDays(date, days) {
            const next = new Date(date);
            next.setDate(next.getDate() + days);
            return next;
        }

        function scopeRange(scope, baseDateStr = selectedDate || todayDate()) {
            const base = parseLocalDate(baseDateStr) || new Date();
            let start = new Date(base);
            let end = new Date(base);
            if (scope === 'week') {
                start = addDays(base, -base.getDay());
                end = addDays(start, 6);
            } else if (scope === 'month') {
                start = new Date(base.getFullYear(), base.getMonth(), 1);
                end = new Date(base.getFullYear(), base.getMonth() + 1, 0);
            } else if (scope === 'quarter') {
                const quarterStart = Math.floor(base.getMonth() / 3) * 3;
                start = new Date(base.getFullYear(), quarterStart, 1);
                end = new Date(base.getFullYear(), quarterStart + 3, 0);
            } else if (scope === 'year') {
                start = new Date(base.getFullYear(), 0, 1);
                end = new Date(base.getFullYear(), 11, 31);
            }
            return {
                start: formatDate(start.getFullYear(), start.getMonth() + 1, start.getDate()),
                end: formatDate(end.getFullYear(), end.getMonth() + 1, end.getDate())
            };
        }

        function tasksInScope(tasks, scope) {
            if (scope === 'all') return tasks;
            const range = scopeRange(scope);
            return tasks.filter(task => {
                const date = String(task.date || '');
                return date && date >= range.start && date <= range.end;
            });
        }

        function taskProgress(task) {
            const subtasks = Array.isArray(task.subtasks) ? task.subtasks : [];
            if (subtasks.length) {
                return subtasks.filter(item => item.done).length / subtasks.length;
            }
            return task.status === 'done' || task.status === 'cancel' ? 1 : 0;
        }

        function completionPercent(tasks) {
            if (!tasks.length) return 0;
            const total = tasks.reduce((sum, task) => sum + taskProgress(task), 0);
            return Math.round((total / tasks.length) * 100);
        }

        function statusBadge(status) {
            const key = STATUS_ORDER.includes(status) ? status : 'todo';
            return `<span class="status-badge ${key}">${STATUS_META[key]}</span>`;
        }

        function categoryBadge(category) {
            return category ? `<span class="category-badge">${escapeHTML(category)}</span>` : '';
        }

        function subtaskSummary(task) {
            const subtasks = task.subtasks || [];
            if (!subtasks.length) return '';
            const done = subtasks.filter(item => item.done).length;
            return `${done}/${subtasks.length}`;
        }

        function renderSubtasks(task) {
            const subtasks = task.subtasks || [];
            if (!subtasks.length) return '';
            return `<details class="subtask-toggle">
                <summary>Subtasks ${subtaskSummary(task)}</summary>
                <div class="subtask-list">
                    ${subtasks.map(item => `
                        <label class="subtask-item ${item.done ? 'done' : ''}">
                            <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleSubtask('${task.id}', '${item.id}')" />
                            <span>${escapeHTML(item.title)}</span>
                        </label>
                    `).join('')}
                </div>
            </details>`;
        }

        function setViewMode(view) {
            currentView = ['table', 'calendar', 'dashboard', 'board'].includes(view) ? view : 'table';
            document.getElementById('viewMode').value = currentView;
            renderTasks();
        }

        function setFocusScope(scope) {
            focusScope = ['day', 'week', 'month', 'quarter', 'year'].includes(scope) ? scope : 'day';
            localStorage.setItem('plannerFocusScope', focusScope);
            document.getElementById('filterTime').value = focusScope;
            renderTasks();
        }

        function toggleCompactMode(enabled) {
            document.body.classList.toggle('compact-mode', enabled);
            localStorage.setItem('plannerCompactMode', enabled ? 'true' : 'false');
        }

        function renderFocusPanel(tasks) {
            const scoped = sortTasks(tasksInScope(tasks, focusScope));
            const active = scoped.filter(task => task.status !== 'cancel');
            const done = active.filter(task => task.status === 'done').length;
            const doing = active.filter(task => task.status === 'doing').length;
            const percent = completionPercent(active);
            const labels = { day: 'Today', week: 'This Week', month: 'This Month', quarter: 'This Quarter', year: 'This Year' };
            const range = scopeRange(focusScope);

            document.getElementById('focusScope').value = focusScope;
            document.getElementById('focusTitle').textContent = labels[focusScope] || 'Focus';
            document.getElementById('focusRangeLabel').textContent = `${displayDate(range.start)} - ${displayDate(range.end)}`;
            document.getElementById('focusTotal').textContent = active.length;
            document.getElementById('focusDone').textContent = done;
            document.getElementById('focusDoing').textContent = doing;
            document.getElementById('focusPercent').textContent = `${percent}%`;
            document.getElementById('focusProgress').style.width = `${percent}%`;

            const visible = active.filter(task => task.status !== 'done').slice(0, 6);
            document.getElementById('focusList').innerHTML = visible.length ? visible.map(task => `
                <div class="focus-item">
                    <input type="checkbox" ${task.status === 'done' ? 'checked' : ''} onchange="toggleTaskStatus('${task.id}')" />
                    <span>${escapeHTML(task.title)}</span>
                    ${priorityBadge(task.priority)}
                </div>
            `).join('') : `<div class="view-empty" style="padding:12px;">Nothing active in this range.</div>`;
        }

        // ============================================================
        // TASKS
        // ============================================================
        function saveTask() {
            const title = cleanTaskLine(document.getElementById('taskTitle').value.trim());
            const category = document.getElementById('taskCategory').value;
            const status = document.getElementById('taskStatus').value;
            const desc = document.getElementById('taskDesc').value.trim();
            const priority = document.getElementById('taskPriority').value;
            const rawSubtasks = document.getElementById('taskSubtasks').value;
            const subtasks = normalizeSubtasks(rawSubtasks);

            if (!selectedDate) goToToday();

            const data = getData();
            if (!title && subtasks.length) {
                const [mainTask, ...childTasks] = subtasks;
                data.tasks.push({
                    id: Date.now() + '_task_' + Math.random().toString(16).slice(2),
                    title: mainTask.title,
                    category,
                    status,
                    date: selectedDate,
                    desc,
                    priority,
                    subtasks: childTasks.map(item => ({
                        ...item,
                        done: false
                    }))
                });
                saveData(data);
                syncPlannerTasksToTeachingTodos();
                resetTaskForm();
                renderAll();
                document.getElementById('taskTitle').focus();
                return;
            }

            if (!title) return alert('Please enter task title');
            if (editingTaskId) {
                const task = data.tasks.find(t => t.id === editingTaskId);
                if (!task) {
                    resetTaskForm();
                    alert('This task no longer exists.');
                    return;
                }
                const existingSubtasks = Array.isArray(task.subtasks) ? task.subtasks : [];
                const mergedSubtasks = subtasks.map(item => {
                    const old = existingSubtasks.find(sub => sub.title === item.title);
                    return old ? { ...item, id: old.id, done: old.done } : item;
                });
                Object.assign(task, { title, category, status, date: selectedDate, desc, priority, subtasks: mergedSubtasks });
            } else {
                data.tasks.push({
                    id: Date.now() + '_task',
                    title,
                    category,
                    status,
                    date: selectedDate,
                    desc,
                    priority,
                    subtasks
                });
            }
            saveData(data);
            syncPlannerTasksToTeachingTodos();
            resetTaskForm();
            renderAll();
            document.getElementById('taskTitle').focus();
        }

        function addTask() {
            saveTask();
        }

        function resetTaskForm() {
            editingTaskId = null;
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskSubtasks').value = '';
            document.getElementById('taskSubmitBtn').textContent = '➕ Add';
            document.getElementById('taskCancelEditBtn').classList.remove('show');
        }

        function cancelTaskEdit() {
            resetTaskForm();
        }

        function editTask(id) {
            const data = getData();
            const task = data.tasks.find(t => t.id === id);
            if (!task) return alert('This task no longer exists.');

            editingTaskId = id;
            selectedDate = task.date || selectedDate || todayDate();
            renderCalendar();
            updateDayTasks(selectedDate);

            document.getElementById('taskTitle').value = task.title || '';
            document.getElementById('taskCategory').value = task.category || 'Other';
            document.getElementById('taskStatus').value = STATUS_ORDER.includes(task.status) ? task.status : 'todo';
            document.getElementById('taskDesc').value = task.desc || '';
            document.getElementById('taskPriority').value = task.priority || 'medium';
            document.getElementById('taskSubtasks').value = (task.subtasks || []).map(item => item.title).join('\n');
            document.getElementById('filterDate').value = selectedDate;
            document.getElementById('taskSubmitBtn').textContent = '💾 Save';
            document.getElementById('taskCancelEditBtn').classList.add('show');
            document.getElementById('taskTitle').focus();
        }

        function taskActions(id) {
            return `<span class="item-actions">
                    <button type="button" class="item-change" onclick="editTask('${id}')">Change</button>
                    <span class="item-del" onclick="deleteTask('${id}')" title="Delete">✕</span>
                </span>`;
        }

        document.addEventListener('keydown', function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                const active = document.activeElement;
                if (active && ['taskTitle', 'taskCategory', 'taskStatus', 'taskDesc'].includes(active.id)) {
                    e.preventDefault();
                    saveTask();
                }
            }
        });

        function deleteTask(id) {
            if (!confirm('Delete this task?')) return;
            const data = getData();
            data.tasks = data.tasks.filter(t => t.id !== id);
            saveData(data);
            if (editingTaskId === id) resetTaskForm();
            syncPlannerTasksToTeachingTodos();
            renderAll();
        }

        function toggleTaskStatus(id) {
            const data = getData();
            const task = data.tasks.find(t => t.id === id);
            if (task) {
                if (task.status === 'done' || task.status === 'cancel') {
                    task.status = 'todo';
                } else {
                    task.status = 'done';
                }
                saveData(data);
                syncPlannerTasksToTeachingTodos();
                renderAll();
            }
        }

        function updateTaskStatus(id, newStatus) {
            const data = getData();
            const task = data.tasks.find(t => t.id === id);
            if (task) {
                task.status = newStatus;
                saveData(data);
                syncPlannerTasksToTeachingTodos();
                renderAll();
            }
        }

        function toggleSubtask(taskId, subtaskId) {
            const data = getData();
            const task = data.tasks.find(t => t.id === taskId);
            if (!task) return;
            const subtask = (task.subtasks || []).find(item => item.id === subtaskId);
            if (!subtask) return;
            subtask.done = !subtask.done;
            const subtasks = task.subtasks || [];
            if (subtasks.length && subtasks.every(item => item.done)) task.status = 'done';
            if (subtasks.length && subtasks.some(item => !item.done) && task.status === 'done') task.status = 'doing';
            saveData(data);
            syncPlannerTasksToTeachingTodos();
            renderAll();
        }

        function renderTasks() {
            const data = getData();
            const statusFilter = document.getElementById('filterStatus').value;
            const categoryFilter = document.getElementById('filterCategory').value;
            const timeFilter = document.getElementById('filterTime').value;
            const dateFilter = document.getElementById('filterDate').value;
            const fromDate = document.getElementById('filterFromDate').value;
            const toDate = document.getElementById('filterToDate').value;
            if (['day', 'week', 'month', 'quarter', 'year'].includes(timeFilter)) {
                focusScope = timeFilter;
                localStorage.setItem('plannerFocusScope', focusScope);
            }

            let list = sortTasks(data.tasks);
            if (statusFilter !== 'all') list = list.filter(t => t.status === statusFilter);
            if (categoryFilter !== 'all') list = list.filter(t => t.category === categoryFilter);
            if (timeFilter === 'day' && dateFilter) list = list.filter(t => t.date === dateFilter);
            if (['week', 'month', 'quarter', 'year'].includes(timeFilter)) list = tasksInScope(list, timeFilter);
            if (timeFilter === 'custom') {
                list = list.filter(t => (!fromDate || String(t.date || '') >= fromDate) && (!toDate || String(t.date || '') <= toDate));
            }

            const settings = getSharedSettings();
            const categories = new Set([...(settings.categories || []), ...data.tasks.map(t => t.category).filter(c => c)]);
            const taskCategory = document.getElementById('taskCategory');
            const currentTaskCategory = taskCategory.value;
            taskCategory.innerHTML = Array.from(categories).map(c => `<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`).join('');
            taskCategory.value = Array.from(taskCategory.options).some(option => option.value === currentTaskCategory)
                ? currentTaskCategory
                : (settings.categories?.[0] || 'Other');
            const catFilter = document.getElementById('filterCategory');
            const currentVal = catFilter.value;
            catFilter.innerHTML = `<option value="all">All categories</option>` +
                Array.from(categories).map(c => `<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`).join('');
            catFilter.value = Array.from(catFilter.options).some(option => option.value === currentVal) ? currentVal : 'all';

            renderFocusPanel(data.tasks);
            renderTaskView(list);
        }

        function getSharedSettings() {
            try {
                return JSON.parse(localStorage.getItem('settingsData')) || { categories: ['Work', 'Study', 'Personal', 'Health', 'Other'] };
            } catch {
                return { categories: ['Work', 'Study', 'Personal', 'Health', 'Other'] };
            }
        }

        function saveSharedSettings(settings) {
            localStorage.setItem('settingsData', JSON.stringify({
                categories: settings.categories || ['Work', 'Study', 'Personal', 'Health', 'Other'],
                categoryColors: settings.categoryColors || {},
                financeTypes: settings.financeTypes || ['Income', 'Expense']
            }));

        function addSharedCategory() {
            const input = document.getElementById('newCategoryInput');
            const name = input.value.trim();
            if (!name) return alert('Enter a category name.');
            const settings = getSharedSettings();
            settings.categories = Array.isArray(settings.categories) ? settings.categories : [];
            if (!settings.categories.includes(name)) settings.categories.push(name);
            saveSharedSettings(settings);
            input.value = '';
            document.getElementById('taskCategory').value = name;
            renderTasks();

        function deleteSharedCategory() {
            const name = document.getElementById('taskCategory').value;
            if (!name || !confirm(`Delete category "${name}" from the shared list? Existing tasks keep their label.`)) return;
            const settings = getSharedSettings();
            settings.categories = (settings.categories || []).filter(c => c !== name);
            if (settings.categoryColors) delete settings.categoryColors[name];
            saveSharedSettings(settings);
            renderTasks();
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0;
                currentYear++; }
            if (currentMonth < 0) { currentMonth = 11;
                currentYear--; }
            renderCalendar();
        }

        function goToToday() {
            const now = new Date();
            currentMonth = now.getMonth();
            currentYear = now.getFullYear();
            const todayStr = todayDate();
            selectedDate = todayStr;
            document.getElementById('filterDate').value = todayStr;
            renderCalendar();
            updateDayTasks(todayStr);
            renderTasks();
        }

        function renderCalendar() {
            const data = getData();
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('monthLabel').textContent = `${monthNames[currentMonth]} ${currentYear}`;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

            const grid = document.getElementById('calendarGrid');
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            let html = dayNames.map(d => `<div class="day-name">${d}</div>`).join('');

            const today = todayDate();
            const startOffset = firstDay;

            // Ngày của tháng trước
            const prevMonthIndex = currentMonth === 0 ? 11 : currentMonth - 1;
            const prevMonth = prevMonthIndex + 1;
            const prevYear = currentMonth === 0 ? currentYear - 1 : currentYear;
            for (let i = startOffset - 1; i >= 0; i--) {
                const d = daysInPrevMonth - i;
                const dateStr = formatDate(prevYear, prevMonth, d);
                html += `<div class="day-cell other-month" data-date="${dateStr}" onclick="selectDate('${dateStr}', ${prevMonthIndex}, ${prevYear})">${d}</div>`;
            }

            // Ngày của tháng hiện tại
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = formatDate(currentYear, currentMonth + 1, d);
                const isToday = dateStr === today ? 'today' : '';
                const isSelected = dateStr === selectedDate ? 'selected' : '';

                const count = data.tasks.filter(t => t.date === dateStr && t.status !== 'cancel').length;
                const dotHtml = count > 0 ? `<span class="day-dot"></span>` : '';

                html += `<div class="day-cell ${isToday} ${isSelected}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">
                        ${d}
                        ${dotHtml}
                    </div>`;
            }

            // Ngày của tháng sau
            const remaining = (7 - ((startOffset + daysInMonth) % 7)) % 7;
            const nextMonthIndex = currentMonth === 11 ? 0 : currentMonth + 1;
            const nextMonth = nextMonthIndex + 1;
            const nextYear = currentMonth === 11 ? currentYear + 1 : currentYear;
            for (let d = 1; d <= remaining; d++) {
                const dateStr = formatDate(nextYear, nextMonth, d);
                html += `<div class="day-cell other-month" data-date="${dateStr}" onclick="selectDate('${dateStr}', ${nextMonthIndex}, ${nextYear})">${d}</div>`;
            }

            grid.innerHTML = html;

            if (selectedDate) {
                updateDayTasks(selectedDate);
            }
        }

        function selectDate(dateStr, monthIndex = currentMonth, year = currentYear) {
            selectedDate = dateStr;
            currentMonth = monthIndex;
            currentYear = year;
            document.getElementById('filterDate').value = dateStr;
            renderCalendar();
            updateDayTasks(dateStr);
            renderTasks();
        }

        function updateDayTasks(dateStr) {
            const data = getData();
            const container = document.getElementById('dayTasksInner');

            const [y, m, d] = dateStr.split('-').map(Number);
            const dateObj = new Date(y, m - 1, d);
            const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

            document.getElementById('dayTasksTitle').textContent = `📅 ${dayNames[dateObj.getDay()]}, ${displayDate(dateStr)}`;

            const tasks = data.tasks.filter(t => t.date === dateStr);

            let html = '';

            if (tasks.length === 0) {
                html = `<div class="no-tasks">No tasks on this day</div>`;
            } else {
                tasks.forEach(t => {
                    const isDone = t.status === 'done' || t.status === 'cancel';
                    const statusMap = {
                        'todo': '⏳ To-do',
                        'doing': '🔄 Doing',
                        'done': '✅ Done',
                        'cancel': '❌ Cancel'
                    };
                    html += `<div class="day-task-item">
                            <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleTaskStatus('${t.id}')" />
                            <div class="day-task-main">
                                <span class="task-title ${isDone ? 'done' : ''}" title="${escapeHTML(t.desc || '')}">${escapeHTML(t.title)} ${subtaskSummary(t) ? `(${subtaskSummary(t)})` : ''}</span>
                                ${t.category ? `<span class="task-category">${escapeHTML(t.category)}</span>` : ''}
                                ${priorityBadge(t.priority)}
                                <span class="task-status ${t.status}">${statusMap[t.status] || t.status}</span>
                            </div>
                            ${taskActions(t.id)}
                        </div>`;
                });
            }

            container.innerHTML = html;
        }

        function setHeatmapRange(range) {
            heatmapRange = range;
            document.querySelectorAll('.heatmap-controls button').forEach(b => b.classList.remove('active'));
            const map = {
                'week': 'hmWeek',
                'month': 'hmMonth',
                'quarter': 'hmQuarter',
                'year': 'hmYear'
            };
            document.getElementById(map[range]).classList.add('active');
            renderHeatmap();
        }

        function renderHeatmap() {
            const data = getData();
            const now = new Date();
            let start = new Date(now);
            let days = 7;

            if (heatmapRange === 'week') {
                start.setDate(now.getDate() - 6);
                days = 7;
            } else if (heatmapRange === 'month') {
                start.setDate(now.getDate() - 29);
                days = 30;
            } else if (heatmapRange === 'quarter') {
                start.setDate(now.getDate() - 89);
                days = 90;
            } else {
                start.setDate(now.getDate() - 364);
                days = 365;
            }

            const grid = document.getElementById('heatmapGrid');
            let html = '';

            const taskCounts = {};
            data.tasks.forEach(t => {
                if (t.date && t.status !== 'cancel') {
                    taskCounts[t.date] = (taskCounts[t.date] || 0) + 1;
                }
            });

            for (let i = 0; i < days; i++) {
                const d = new Date(start);
                d.setDate(start.getDate() + i);
                const dateStr = formatDate(d.getFullYear(), d.getMonth() + 1, d.getDate());
                const count = taskCounts[dateStr] || 0;

                let level = 0;
                if (count >= 4) level = 4;
                else if (count >= 3) level = 3;
                else if (count >= 2) level = 2;
                else if (count >= 1) level = 1;

                const isToday = dateStr === todayDate();
                html += `<div class="heatmap-cell level-${level}" style="${isToday ? 'border:2px solid var(--accent);' : ''}" 
                            onclick="selectDate('${dateStr}')" title="${dateStr}: ${count} tasks"></div>`;
            }

            grid.innerHTML = html;
        }

        // ============================================================
        // MENSTRUAL CYCLE
        // ============================================================
        function updateCycle() {
            const startStr = document.getElementById('cycleStart').value;
            const length = parseInt(document.getElementById('cycleLength').value) || 28;

            if (!startStr) {
                document.getElementById('cycleDayDisplay').textContent = '-';
                return;
            }

            const start = new Date(startStr);
            const now = new Date();
            const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            const day = diff % length + 1;

            document.getElementById('cycleDayDisplay').textContent = day;
        }

        document.getElementById('cycleStart').addEventListener('change', updateCycle);
        document.getElementById('cycleLength').addEventListener('change', updateCycle);

        // ============================================================
        // CSV IMPORT / EXPORT
        // ============================================================
        function exportCSV() {
            const data = getData();
            if (!data.tasks.length) return alert('No tasks to export');
            const headers = ['id', 'title', 'category', 'status', 'date', 'desc', 'priority', 'subtasks'];
            const rows = data.tasks.map(t => headers.map(h => `"${exportTaskField(t, h).replace(/"/g, '""')}"`).join(','));
            downloadCSV(headers.join(',') + '\n' + rows.join('\n'), 'planner');
        }

        function exportTaskField(task, key) {
            if (key === 'subtasks') return (task.subtasks || []).map(item => `${item.done ? '[x]' : '[ ]'} ${item.title}`).join(' | ');
            return String(task[key] || '');
        }

        function exportICS() {
            const data = getData();
            const tasks = data.tasks.filter(t => t.date);
            if (!tasks.length) return alert('No dated tasks to export');
            exportICSData(tasks, 'planner');
        }

        function exportICSData(tasks, name) {
            const datedTasks = tasks.filter(t => formatICSDate(t.date));
            if (!datedTasks.length) return alert('No dated tasks to export');

            const nowStamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            let ics = 'BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Productivity Planner//EN\nCALSCALE:GREGORIAN\n';

            datedTasks.forEach(task => {
                const start = formatICSDate(task.date);
                const endDate = new Date(`${task.date}T00:00:00`);
                endDate.setDate(endDate.getDate() + 1);
                const end = formatDate(endDate.getFullYear(), endDate.getMonth() + 1, endDate.getDate()).replace(/-/g, '');
                const statusLabel = STATUS_META[task.status] || task.status || 'Task';
                const description = `Category: ${task.category || ''}\nStatus: ${statusLabel}\nDescription: ${task.desc || ''}`;

                ics += 'BEGIN:VEVENT\n';
                ics += `UID:${escapeICS(task.id || `${task.title}-${task.date}`)}@planner\n`;
                ics += `DTSTAMP:${nowStamp}\n`;
                ics += `DTSTART;VALUE=DATE:${start}\n`;
                ics += `DTEND;VALUE=DATE:${end}\n`;
                ics += `SUMMARY:${escapeICS(task.title)}\n`;
                ics += `DESCRIPTION:${escapeICS(description)}\n`;
                ics += `CATEGORIES:${escapeICS(task.category || 'Planner')}\n`;
                ics += 'END:VEVENT\n';
            });

            ics += 'END:VCALENDAR';
            downloadICS(ics, name);
        }

        function downloadICS(ics, name) {
            const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${name}_${new Date().toISOString().slice(0,10)}.ics`;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                URL.revokeObjectURL(link.href);
                link.remove();
            }, 0);
        }

        function downloadCSV(csv, name) {
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${name}_${new Date().toISOString().slice(0,10)}.csv`;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                URL.revokeObjectURL(link.href);
                link.remove();
            }, 0);
        }

        function importCSV(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const text = ev.target.result;
                    const rows = parseCSV(text);
                    if (!rows.length) {
                        alert('CSV file is empty.');
                        return;
                    }
                    const headers = rows[0].map(h => h.trim());
                    const data = getData();
                    let imported = 0;
                    for (let i = 1; i < rows.length; i++) {
                        const vals = rows[i].map(v => v.trim());
                        const task = {};
                        headers.forEach((h, idx) => task[h] = vals[idx] || '');
                        task.date = task.date || task.deadline || todayDate();
                        task.category = task.category || 'Other';
                        task.status = ['todo', 'doing', 'done', 'cancel'].includes(task.status) ? task.status : 'todo';
                        if (task.id && task.title) {
                            if (!data.tasks.some(t => t.id === task.id)) {
                                data.tasks.push(task);
                                imported++;
                            }
                        }
                    }
                    saveData(data);
                    renderAll();
                    alert(`Imported ${imported} task(s) successfully!`);
                } catch (err) {
                    alert('Import error: ' + err.message);
                }
            };
            reader.readAsText(file, 'UTF-8');
            e.target.value = '';
        }

        // ============================================================
        // RENDER ALL
        // ============================================================
        function renderAll() {
            renderTasks();
            renderCalendar();
            renderHeatmap();
            updateCycle();

            if (!selectedDate) {
                const today = todayDate();
                selectedDate = today;
                document.getElementById('filterDate').value = today;
                renderCalendar();
                updateDayTasks(today);
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            currentMonth = now.getMonth();
            currentYear = now.getFullYear();
            const todayStr = todayDate();
            selectedDate = todayStr;
            document.getElementById('filterDate').value = todayStr;
            document.getElementById('filterTime').value = focusScope;
            document.getElementById('focusScope').value = focusScope;
            document.getElementById('compactModeToggle').checked = localStorage.getItem('plannerCompactMode') === 'true';
            toggleCompactMode(document.getElementById('compactModeToggle').checked);
            document.getElementById('cycleStart').value = todayStr;
            renderAll();
            updateDayTasks(todayStr);

            document.getElementById('dayTasksBody').classList.add('open');
            document.getElementById('dayTasksArrow').classList.add('open');
            document.getElementById('taskTitle').focus();
        });
    </script>
</body>
