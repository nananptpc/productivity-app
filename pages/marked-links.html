<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links</title>
    <link rel="stylesheet" href="../shared.css" />
    <style>
        /* Link-specific styles only */
        .link-list {
            display: grid;
            gap: 6px;
        }

        .link-item {
            background: var(--light);
            padding: 12px;
            border-bottom: 1px solid var(--border-soft);
        }

        .link-title {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .link-url {
            font-size: 11px;
            opacity: 0.7;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .link-note {
            font-size: 11px;
            opacity: 0.6;
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .link-tag {
            display: inline-block;
            font-size: 10px;
            background: var(--border);
            padding: 2px 5px;
            margin-right: 4px;
            margin-bottom: 6px;
        }

        .link-actions {
            display: flex;
            gap: 8px;
        }

        .link-actions button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 11px;
        }

        .link-actions button:hover {
            text-decoration: underline;
        }

        .search-box {
            margin-bottom: 12px;
        }

        .search-box input {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 Links</h1>
            <div class="nav">
                <a href="../index.html">← Home</a>
                <button onclick="toggleTheme()">🌓</button>
                <a href="../settings.html">⚙️</a>
            </div>
        </header>

        <div class="stats">
            <div class="stat">
                <span class="stat-number" id="total-links">0</span>
                <span>Links</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="total-tags">0</span>
                <span>Tags</span>
            </div>
        </div>

        <div class="card">
            <h2>Save Link</h2>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="link-title" placeholder="Link title">
            </div>
            <div class="form-group">
                <label>URL</label>
                <input type="url" id="link-url" placeholder="https://example.com">
            </div>
            <div class="form-group">
                <label>Tags (comma-separated)</label>
                <input type="text" id="link-tags" placeholder="e.g., learning, javascript, useful">
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="link-note" placeholder="Optional notes about this link..."></textarea>
            </div>
            <button onclick="addLink()" class="primary">Save Link</button>
        </div>

        <div class="card">
            <h2>Saved Links</h2>
            <div class="search-box">
                <input type="text" id="search-box" placeholder="Search links..." onkeyup="filterLinks()">
            </div>
            <div id="link-list" class="link-list">
                <div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">
                    No links saved yet
                </div>
            </div>
        </div>
    </div>

    <script src="../shared-layout.js"></script>
    <script>
        const STORAGE_KEY = 'marked-links';

        function getLinks() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function addLink() {
            const title = document.getElementById('link-title').value.trim();
            const url = document.getElementById('link-url').value.trim();
            const tagsStr = document.getElementById('link-tags').value.trim();
            const note = document.getElementById('link-note').value.trim();

            if (!title || !url) {
                alert('Please enter title and URL');
                return;
            }

            const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()) : [];

            const links = getLinks();
            links.push({
                id: Date.now(),
                title,
                url,
                tags,
                note,
                created: new Date().toISOString()
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
            document.getElementById('link-title').value = '';
            document.getElementById('link-url').value = '';
            document.getElementById('link-tags').value = '';
            document.getElementById('link-note').value = '';
            render();
        }

        function deleteLink(id) {
            if (confirm('Delete this link?')) {
                const links = getLinks().filter(l => l.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
                render();
            }
        }

        function filterLinks() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const items = document.querySelectorAll('.link-item');
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(query) ? 'block' : 'none';
            });
        }

        function render() {
            const links = getLinks();
            const container = document.getElementById('link-list');

            // Calculate stats
            const allTags = new Set();
            links.forEach(l => l.tags.forEach(t => allTags.add(t)));

            document.getElementById('total-links').textContent = links.length;
            document.getElementById('total-tags').textContent = allTags.size;

            if (links.length === 0) {
                container.innerHTML = '<div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">No links saved yet</div>';
                return;
            }

            // Sort by creation date descending
            links.sort((a, b) => new Date(b.created) - new Date(a.created));

            container.innerHTML = links.map(l => `
                <div class="link-item">
                    <div class="link-title">${escapeHtml(l.title)}</div>
                    <a href="${escapeHtml(l.url)}" target="_blank" class="link-url">🔗 ${escapeHtml(l.url)}</a>
                    ${l.tags.length > 0 ? `<div>${l.tags.map(t => `<span class="link-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
                    ${l.note ? `<div class="link-note">📝 ${escapeHtml(l.note)}</div>` : ''}
                    <div class="link-actions">
                        <button onclick="window.open('${escapeHtml(l.url)}', '_blank')">Open</button>
                        <button onclick="copyToClipboard('${escapeHtml(l.url)}')">Copy</button>
                        <button onclick="deleteLink(${l.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
