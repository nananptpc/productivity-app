<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payroll</title>
    <link rel="stylesheet" href="../shared.css" />
    <style>
        .record-list {
            display: grid;
            gap: 8px;
        }

        .record-item {
            background: var(--light);
            padding: 12px;
            border-bottom: 1px solid var(--border-soft);
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .record-name {
            font-weight: bold;
            font-size: 13px;
        }

        .record-amount {
            font-weight: bold;
            color: var(--accent);
        }

        .record-info {
            font-size: 11px;
            opacity: 0.7;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .record-actions button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 11px;
        }

        .record-actions button:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💵 Payroll</h1>
            <div class="nav">
                <a href="../index.html">← Home</a>
                <button onclick="toggleTheme()">🌓</button>
                <a href="../settings.html">⚙️</a>
            </div>
        </header>

        <div class="summary">
            <div class="summary-item">
                <span class="summary-number" id="total-classes">0</span>
                <span>Classes</span>
            </div>
            <div class="summary-item">
                <span class="summary-number" id="total-hours">0</span>
                <span>Hours</span>
            </div>
            <div class="summary-item">
                <span class="summary-number" id="total-salary">$0</span>
                <span>Total</span>
            </div>
        </div>

        <div class="card">
            <h2>Log Class</h2>
            <div class="form-group">
                <label>Class Name</label>
                <input type="text" id="class-name" placeholder="e.g., English 101">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="class-date">
                </div>
                <div class="form-group">
                    <label>Hours</label>
                    <input type="number" id="class-hours" placeholder="1.5" min="0" step="0.5">
                </div>
            </div>
            <div class="form-group">
                <label>Rate per Hour ($)</label>
                <input type="number" id="class-rate" placeholder="50" min="0" step="0.01">
            </div>
            <button onclick="addClass()" class="primary">Log Class</button>
        </div>

        <div class="card">
            <h2>Payroll Records</h2>
            <div id="records-list" class="record-list">
                <div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">
                    No records yet
                </div>
            </div>
        </div>
    </div>

    <script src="../shared-layout.js"></script>
    <script>
        const STORAGE_KEY = 'payroll-records';

        function getRecords() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function addClass() {
            const name = document.getElementById('class-name').value.trim();
            const date = document.getElementById('class-date').value;
            const hours = parseFloat(document.getElementById('class-hours').value);
            const rate = parseFloat(document.getElementById('class-rate').value);

            if (!name || !date || !hours || !rate) {
                alert('Please fill in all fields');
                return;
            }

            const records = getRecords();
            records.push({
                id: Date.now(),
                name,
                date,
                hours,
                rate,
                amount: hours * rate,
                created: new Date().toISOString()
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            document.getElementById('class-name').value = '';
            document.getElementById('class-date').value = '';
            document.getElementById('class-hours').value = '';
            document.getElementById('class-rate').value = '';
            render();
        }

        function deleteRecord(id) {
            if (confirm('Delete this record?')) {
                const records = getRecords().filter(r => r.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                render();
            }
        }

        function render() {
            const records = getRecords();
            const container = document.getElementById('records-list');

            // Calculate totals
            const totalClasses = records.length;
            const totalHours = records.reduce((sum, r) => sum + r.hours, 0);
            const totalAmount = records.reduce((sum, r) => sum + r.amount, 0);

            document.getElementById('total-classes').textContent = totalClasses;
            document.getElementById('total-hours').textContent = totalHours.toFixed(1);
            document.getElementById('total-salary').textContent = '$' + totalAmount.toFixed(2);

            if (records.length === 0) {
                container.innerHTML = '<div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">No records yet</div>';
                return;
            }

            // Sort by date descending
            records.sort((a, b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = records.map(r => `
                <div class="record-item">
                    <div class="record-header">
                        <span class="record-name">${escapeHtml(r.name)}</span>
                        <span class="record-amount">$${r.amount.toFixed(2)}</span>
                    </div>
                    <div class="record-info">
                        📅 ${r.date} · ⏱️ ${r.hours}h @ $${r.rate}/h
                    </div>
                    <div class="record-actions">
                        <button onclick="deleteRecord(${r.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
