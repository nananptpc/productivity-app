<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Formatter - Productivity App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #fff5f7;
            --text: #4a3f44;
            --card: #ffffff;
            --border: #f8d7e0;
            --accent: #f7a1b5;
            --accent2: #fbc4d0;
            --shadow: 0 4px 16px rgba(232, 162, 182, 0.18);
            --font: 'American Typewriter', 'Courier New', monospace;
            --radius: 8px;
        }
        body.dark {
            --bg: #2d2428;
            --text: #f5e6ea;
            --card: #3d3238;
            --border: #5a454c;
            --accent: #d47b92;
            --accent2: #a06275;
            --shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        button, input, select, textarea { font-family: inherit; }
        header {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 12px;
        }
        h1 { font-size: 24px; }
        .nav a, button {
            background: var(--accent2);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            color: var(--text);
            cursor: pointer;
            padding: 8px 13px;
            text-decoration: none;
            font-size: 12px;
        }
        button.primary { background: var(--accent); color: white; font-weight: 800; }
        .layout {
            display: grid;
            gap: 14px;
            grid-template-columns: 1fr 1fr;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
        }
        h2 { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
        textarea {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            min-width: 0;
            padding: 9px 11px;
            width: 100%;
            min-height: 300px;
            resize: vertical;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }
        label {
            display: grid;
            gap: 4px;
            font-size: 11px;
            font-weight: 800;
        }
        input, select {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            padding: 6px 8px;
            min-width: 0;
            font-family: inherit;
        }
        input[type="range"] {
            border: none;
            padding: 0;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .preview-container {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            min-height: 300px;
            overflow: auto;
            resize: both;
        }
        .preview {
            background: white;
            color: #2d2125;
            padding: 20px;
            margin: 0 auto;
            max-width: 800px;
            min-height: 280px;
        }
        .mcq-preview {
            display: grid;
            gap: 14px;
        }
        .question-card {
            background: #fff9fb;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
        }
        .question-text {
            font-weight: 800;
            margin-bottom: 8px;
        }
        .options {
            display: grid;
            gap: 6px;
            grid-template-columns: repeat(2, 1fr);
        }
        .option {
            background: white;
            border: 1px solid #f0c8d8;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 13px;
        }
        .answer-tag {
            background: #dcfce7;
            border: 1px solid #8fd1a7;
            border-radius: 999px;
            color: #166534;
            display: inline-block;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            margin-top: 6px;
        }
        .blank-text {
            line-height: 1.8;
        }
        .blank {
            border-bottom: 2px solid #2d2125;
            padding: 0 4px;
            min-width: 60px;
        }
        .quiz-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .quiz-table th, .quiz-table td {
            border: 1px solid var(--border);
            padding: 6px;
            text-align: left;
        }
        .quiz-table th {
            background: #fff0f5;
            font-weight: 800;
        }
        .quiz-table textarea {
            min-height: 40px;
            resize: vertical;
            font-size: 11px;
        }
        .quiz-table select {
            font-size: 11px;
            min-width: 50px;
        }
        .blank-worksheet {
            display: grid;
            gap: 12px;
        }
        .blank-item {
            background: #fff9fb;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px;
            font-size: 13px;
            line-height: 1.6;
        }
        .stats {
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
            margin-top: 8px;
        }
        .bulk-edit {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .bulk-edit h3 {
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .bulk-controls {
            display: grid;
            gap: 8px;
        }
        .bulk-controls textarea {
            min-height: 60px;
            font-size: 11px;
        }
        @media (max-width: 1024px) {
            .layout { grid-template-columns: 1fr; }
            .controls { grid-template-columns: 1fr; }
        }
        @media print {
            body { background: white; padding: 0; }
            header, .card, .actions { display: none !important; }
            .preview-container { border: 0; padding: 0; background: white; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>✨ Smart Formatter</h1>
            </div>
            <nav class="nav">
                <a href="../index.html">Home</a>
                <button id="themeBtn">Theme</button>
            </nav>
        </header>

        <div class="layout">
            <!-- Input Panel -->
            <div class="card">
                <h2>Paste Content</h2>
                <textarea id="rawInput" placeholder="Paste MCQ or fill-in-the-blank text..."></textarea>

                <div class="controls">
                    <label>Font size
                        <input id="fontSize" type="range" min="12" max="24" value="14" />
                        <span id="fontSizeValue">14px</span>
                    </label>
                    <label>Line height
                        <select id="lineHeight">
                            <option value="1.5">Compact</option>
                            <option value="1.8" selected>Normal</option>
                            <option value="2.2">Spacious</option>
                        </select>
                    </label>
                    <label>View
                        <select id="viewMode">
                            <option value="editor">Editor</option>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                        </select>
                    </label>
                </div>

                <div class="controls">
                    <label>Question type
                        <select id="quizType">
                            <option value="abcd">ABCD</option>
                            <option value="trueFalse">True/False</option>
                        </select>
                    </label>
                    <label>Question limit
                        <input id="quizLimit" type="number" value="20" min="1" />
                    </label>
                    <label style="align-self: end;">
                        <input type="checkbox" id="autoShuffle" checked />
                        Auto-shuffle
                    </label>
                </div>

                <div class="actions">
                    <button class="primary" id="formatBtn">Format</button>
                    <button id="sampleBtn">Sample</button>
                    <button id="clearBtn">Clear</button>
                    <button onclick="document.getElementById('importFile').click()">Import CSV</button>
                    <input type="file" id="importFile" accept=".csv,.tsv" style="display:none" />
                </div>

                <div class="bulk-edit">
                    <h3>Find & Replace</h3>
                    <div class="bulk-controls">
                        <input id="findInput" type="text" placeholder="Find..." style="min-height: auto; padding: 6px 8px;" />
                        <input id="replaceInput" type="text" placeholder="Replace..." style="min-height: auto; padding: 6px 8px;" />
                        <button id="bulkReplaceBtn" style="width: 100%;">Apply</button>
                    </div>
                </div>

                <div class="actions" style="margin-top: 12px;">
                    <button id="copyBtn">Copy for Sheets</button>
                    <button id="exportCsvBtn">Export CSV</button>
                    <button id="downloadHtmlBtn">Download HTML</button>
                    <button id="saveBtn">Save</button>
                </div>

                <div class="stats" id="statsText">Ready to format</div>
            </div>

            <!-- Preview Panel -->
            <div class="card">
                <h2>Preview</h2>
                <div class="preview-container">
                    <div class="preview" id="preview"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        let quizRows = [];
        let blankItems = [];
        let contentType = null;

        document.body.classList.toggle('dark', localStorage.getItem('appTheme') === 'dark');
        $('themeBtn').onclick = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('appTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
        };

        const fontSize = $('fontSize');
        fontSize.addEventListener('input', () => {
            $('fontSizeValue').textContent = fontSize.value + 'px';
            format();
        });

        function escapeHTML(text) {
            return String(text || '').replace(/[&<>"']/g, char => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[char]));
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const output = [];
            let row = [], cell = '', quote = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i], next = text[i + 1];
                if (char === '"' && quote && next === '"') { cell += '"'; i++; }
                else if (char === '"') quote = !quote;
                else if ((char === ',' || char === '\t') && !quote) { row.push(cell); cell = ''; }
                else if ((char === '\n' || char === '\r') && !quote) {
                    if (char === '\r' && next === '\n') i++;
                    row.push(cell);
                    if (row.some(v => v.trim())) output.push(row);
                    row = []; cell = '';
                } else cell += char;
            }
            row.push(cell);
            if (row.some(v => v.trim())) output.push(row);
            return output;
        }

        function detectContent(text) {
            const trimmed = text.trim();
            const lines = trimmed.split('\n').filter(l => l.trim());

            // Check if CSV
            if (lines[0]?.includes(',') || lines[0]?.includes('\t')) {
                const table = parseCSV(trimmed);
                const header = table[0]?.map(h => h.toLowerCase()) || [];
                if (header.some(h => /câu hỏi|question|q|提问/.test(h)) && header.some(h => /đáp án|answer|ans|答/.test(h))) {
                    return { type: 'csv' };
                }
            }

            const hasMCQ = lines.some(line => /^[A-D][\).]\s|answer\s*[:：]/i.test(line));
            const hasBlanks = /_{3,}|^.+\(.+\).+\(/.test(trimmed);

            if (hasMCQ) return { type: 'mcq' };
            if (hasBlanks) return { type: 'blank' };
            return { type: null };
        }

        function buildQuizFromCSV(text) {
            const table = parseCSV(text);
            if (table.length < 2) return [];

            const headers = table[0].map(h => h.toLowerCase().trim());
            const qIdx = headers.findIndex(h => /câu hỏi|question|q|提问|题目/.test(h));
            const aIdx = headers.findIndex(h => /đáp án|answer|ans|答/.test(h));
            const optA = headers.findIndex(h => h === 'a' || h === 'a)');
            const optB = headers.findIndex(h => h === 'b' || h === 'b)');
            const optC = headers.findIndex(h => h === 'c' || h === 'c)');
            const optD = headers.findIndex(h => h === 'd' || h === 'd)');

            if (qIdx < 0) return [];

            const limit = Math.max(1, Number($('quizLimit').value) || 20);
            let rows = table.slice(1).map((row, idx) => ({
                no: idx + 1,
                question: row[qIdx]?.trim() || '',
                a: optA >= 0 ? row[optA]?.trim() || '' : '',
                b: optB >= 0 ? row[optB]?.trim() || '' : '',
                c: optC >= 0 ? row[optC]?.trim() || '' : '',
                d: optD >= 0 ? row[optD]?.trim() || '' : '',
                answer: (row[aIdx]?.trim() || 'A').toUpperCase()[0] || 'A',
                explanation: ''
            })).filter(r => r.question).slice(0, limit);

            if ($('autoShuffle').checked) {
                rows = rows.map(row => {
                    const opts = ['a', 'b', 'c', 'd'].map(k => ({ k, v: row[k] })).filter(x => x.v);
                    const correct = opts.find(x => x.k === row.answer.toLowerCase())?.v;
                    const shuffled = opts.sort(() => Math.random() - 0.5);
                    const newRow = { ...row, a: '', b: '', c: '', d: '' };
                    shuffled.forEach((opt, i) => { newRow['abcd'[i]] = opt.v; });
                    newRow.answer = 'ABCD'.charAt(shuffled.findIndex(x => x.v === correct)) || 'A';
                    return newRow;
                });
            }

            return rows;
        }

        function parseQuestionBlock(block) {
            const lines = String(block || '').split('\n').map(l => l.trim()).filter(Boolean);
            const row = {
                no: 0,
                question: '',
                a: '', b: '', c: '', d: '',
                answer: 'A',
                explanation: ''
            };

            const questionParts = [];
            lines.forEach(line => {
                const opt = line.match(/^([A-D])[\).]\s*(.+)$/i);
                const ans = line.match(/^(answer|ans|correct)\s*[:：-]\s*([A-D])?/i);
                const exp = line.match(/^(explanation|explain|note)\s*[:：-]\s*(.+)$/i);

                if (opt) row[opt[1].toLowerCase()] = opt[2];
                else if (ans) row.answer = (ans[2] || 'A').toUpperCase();
                else if (exp) row.explanation = exp[2];
                else questionParts.push(line);
            });

            row.question = questionParts.join(' ').replace(/^\d+[\).]\s*/, '');
            return row;
        }

        function buildQuiz(text) {
            const blocks = text.split(/\n\s*\n/).filter(b => b.trim());
            const limit = Math.max(1, Number($('quizLimit').value) || 20);

            quizRows = blocks
                .map((block, idx) => ({ ...parseQuestionBlock(block), no: idx + 1 }))
                .filter(r => r.question || r.a)
                .slice(0, limit);

            if ($('autoShuffle').checked) {
                quizRows = quizRows.map(row => {
                    const opts = ['a', 'b', 'c', 'd'].map(k => ({ k, v: row[k] })).filter(x => x.v);
                    const correct = opts.find(x => x.k === row.answer.toLowerCase())?.v;
                    const shuffled = opts.sort(() => Math.random() - 0.5);
                    const newRow = { ...row, a: '', b: '', c: '', d: '' };
                    shuffled.forEach((opt, i) => { newRow['abcd'[i]] = opt.v; });
                    newRow.answer = 'ABCD'.charAt(shuffled.findIndex(x => x.v === correct)) || 'A';
                    return newRow;
                });
            }

            return quizRows;
        }

        function parseBlanks(text) {
            const items = [];
            const lines = text.split('\n').filter(l => l.trim());

            lines.forEach((line, idx) => {
                let processed = line;
                processed = processed.replace(/\(([^)]+)\)/g, '<span class="blank">_____</span>');
                if (!processed.includes('blank')) {
                    processed = processed.replace(/_{3,}/g, '<span class="blank">_____</span>');
                }
                items.push({ no: idx + 1, text: processed });
            });

            return items;
        }

        function renderQuizEditor() {
            if (!quizRows.length) return '<p style="color: #999;">No questions parsed</p>';
            return `<table class="quiz-table"><thead><tr>
                <th>Q</th><th>Question</th><th>A</th><th>B</th><th>C</th><th>D</th><th>Ans</th><th>Note</th>
            </tr></thead><tbody>${quizRows.map((r, i) => `<tr>
                <td>${r.no}</td>
                <td><textarea>${escapeHTML(r.question)}</textarea></td>
                <td><textarea>${escapeHTML(r.a)}</textarea></td>
                <td><textarea>${escapeHTML(r.b)}</textarea></td>
                <td><textarea>${escapeHTML(r.c)}</textarea></td>
                <td><textarea>${escapeHTML(r.d)}</textarea></td>
                <td><select>${'ABCD'.split('').map(x => `<option ${r.answer === x ? 'selected' : ''}>${x}</option>`).join('')}</select></td>
                <td><textarea>${escapeHTML(r.explanation)}</textarea></td>
            </tr>`).join('')}</tbody></table>`;
        }

        function renderQuizCards(showAnswers) {
            if (!quizRows.length) return '<p style="color: #999;">No questions to preview</p>';
            return `<div class="mcq-preview">${quizRows.map(r => `<div class="question-card">
                <div class="question-text">${r.no}. ${escapeHTML(r.question)}</div>
                <div class="options">
                    ${['a','b','c','d'].filter(k => r[k]).map(k => `<div class="option"><strong>${k.toUpperCase()}.</strong> ${escapeHTML(r[k])}</div>`).join('')}
                </div>
                ${showAnswers ? `<div class="answer-tag">Answer: ${r.answer}</div>${r.explanation ? `<div style="font-size:11px; margin-top:4px; color:#666;">${escapeHTML(r.explanation)}</div>` : ''}` : ''}
            </div>`).join('')}</div>`;
        }

        function renderBlanks() {
            if (!blankItems.length) return '<p style="color: #999;">No items to preview</p>';
            return `<div class="blank-worksheet">${blankItems.map(item =>
                `<div class="blank-item">${item.no}. <span class="blank-text">${item.text}</span></div>`
            ).join('')}</div>`;
        }

        function format() {
            const raw = $('rawInput').value.trim();
            if (!raw) {
                $('preview').innerHTML = '<p style="color: #999;">Paste content to start</p>';
                $('statsText').textContent = 'Ready to format';
                return;
            }

            const detected = detectContent(raw);

            if (detected.type === 'csv') {
                contentType = 'mcq';
                quizRows = buildQuizFromCSV(raw);
                if (quizRows.length > 0) {
                    const view = $('viewMode').value;
                    $('preview').innerHTML = view === 'editor' ? renderQuizEditor() : renderQuizCards(view === 'teacher');
                    $('statsText').textContent = `${quizRows.length} question(s) from CSV`;
                } else {
                    $('preview').innerHTML = '<p style="color: #999;">No questions found in CSV</p>';
                    $('statsText').textContent = 'CSV parsing failed';
                }
            } else if (detected.type === 'mcq') {
                contentType = 'mcq';
                buildQuiz(raw);
                const view = $('viewMode').value;
                $('preview').innerHTML = view === 'editor' ? renderQuizEditor() : renderQuizCards(view === 'teacher');
                $('statsText').textContent = `${quizRows.length} question(s)`;
            } else if (detected.type === 'blank') {
                contentType = 'blank';
                blankItems = parseBlanks(raw);
                $('preview').innerHTML = renderBlanks();
                $('statsText').textContent = `${blankItems.length} item(s)`;
            } else {
                $('preview').innerHTML = '<p style="color: #999;">Unable to detect format. Try: CSV, MCQ (A) B) C) D)), or blanks (____)</p>';
                $('statsText').textContent = 'Format not detected';
            }

            $('preview').style.fontSize = $('fontSize').value + 'px';
            $('preview').style.lineHeight = $('lineHeight').value;
        }

        function toTableRows() {
            if (contentType === 'mcq') {
                return [
                    ['Q', 'Question', 'A', 'B', 'C', 'D', 'Answer', 'Explanation'],
                    ...quizRows.map(r => [r.no, r.question, r.a, r.b, r.c, r.d, r.answer, r.explanation])
                ];
            }
            return [['No', 'Content'], ...blankItems.map(item => [item.no, item.text.replace(/<[^>]+>/g, '_____')])];
        }

        function csvCell(value) {
            return `"${String(value || '').replace(/"/g, '""')}"`;
        }

        function copyForSheets() {
            if (!quizRows.length && !blankItems.length) format();
            const tsv = toTableRows().map(row => row.map(cell => String(cell || '').replace(/\t/g, ' ')).join('\t')).join('\n');
            navigator.clipboard?.writeText(tsv).then(() => {
                $('statsText').textContent = '✓ Copied to clipboard';
            }).catch(() => window.prompt('Copy:', tsv));
        }

        function exportData(format) {
            if (!quizRows.length && !blankItems.length) return;
            let content, type, name;

            if (format === 'csv') {
                content = '﻿' + toTableRows().map(r => r.map(csvCell).join(',')).join('\n');
                type = 'text/csv;charset=utf-8;';
                name = contentType === 'mcq' ? 'quiz.csv' : 'blanks.csv';
            } else if (format === 'html') {
                content = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Formatted</title><style>body{font-family:${$('fontSize').value};line-height:${$('lineHeight').value};}</style></head><body>${$('preview').innerHTML}</body></html>`;
                type = 'text/html;charset=utf-8;';
                name = contentType === 'mcq' ? 'quiz.html' : 'blanks.html';
            }

            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([content], { type }));
            link.download = name;
            link.click();
            setTimeout(() => URL.revokeObjectURL(link.href), 0);
        }

        function bulkReplace() {
            const find = $('findInput').value.trim();
            const replace = $('replaceInput').value.trim();
            if (!find || !contentType) return alert('Enter text to find');

            if (contentType === 'mcq') {
                quizRows = quizRows.map(r => ({
                    ...r,
                    question: r.question.replace(new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), replace),
                    a: r.a.replace(new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), replace),
                    b: r.b.replace(new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), replace),
                    c: r.c.replace(new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), replace),
                    d: r.d.replace(new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), replace)
                }));
            } else {
                blankItems = blankItems.map(item => ({
                    ...item,
                    text: item.text.replace(new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), replace)
                }));
            }

            $('findInput').value = '';
            $('replaceInput').value = '';
            format();
        }

        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                format();
            } else if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                const data = JSON.stringify({ contentType, quizRows, blankItems });
                localStorage.setItem('formatterBackup', data);
                $('statsText').textContent = '✓ Saved';
            } else if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                copyForSheets();
            }
        });

        $('formatBtn').onclick = format;
        $('sampleBtn').onclick = () => {
            $('rawInput').value = `1. Which form is correct?\nA) He are going\nB) He is going\nC) He am going\nD) He be going\nAnswer: B\nExplanation: "is" is correct for third person\n\n2. Fill: She _____ a teacher.\nA) are\nB) am\nC) is\nD) be\nAnswer: C`;
            format();
        };
        $('clearBtn').onclick = () => { $('rawInput').value = ''; quizRows = []; blankItems = []; format(); };
        $('copyBtn').onclick = copyForSheets;
        $('exportCsvBtn').onclick = () => exportData('csv');
        $('downloadHtmlBtn').onclick = () => exportData('html');
        $('bulkReplaceBtn').onclick = bulkReplace;
        $('saveBtn').onclick = () => {
            if (!quizRows.length && !blankItems.length) return alert('Nothing to save');
            const data = { contentType, quizRows, blankItems, timestamp: new Date().toISOString() };
            let bank = JSON.parse(localStorage.getItem('formatterBank') || '[]');
            bank.unshift(data);
            localStorage.setItem('formatterBank', JSON.stringify(bank.slice(0, 50)));
            $('statsText').textContent = '✓ Saved to library';
        };
        $('importFile').onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = evt => {
                $('rawInput').value = evt.target.result;
                format();
            };
            reader.readAsText(file);
        };
        $(['rawInput', 'quizType', 'lineHeight', 'viewMode']).forEach(id => {
            $(id)?.addEventListener('change', format);
        });
        $('rawInput')?.addEventListener('input', format);

        format();
    </script>
</body>
</html>
