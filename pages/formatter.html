<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Formatter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #fff5f7;
            --text: #4a3f44;
            --card: #ffffff;
            --border: #f8d7e0;
            --accent: #f7a1b5;
            --accent2: #fbc4d0;
            --shadow: 0 4px 16px rgba(232, 162, 182, 0.18);
            --font: 'American Typewriter', 'Courier New', monospace;
            --radius: 8px;
        }
        body.dark {
            --bg: #2d2428;
            --text: #f5e6ea;
            --card: #3d3238;
            --border: #5a454c;
            --accent: #d47b92;
            --accent2: #a06275;
            --shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        button, input, select, textarea { font-family: inherit; }
        header {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 12px;
        }
        h1 { font-size: 24px; }
        .nav a, button {
            background: var(--accent2);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            color: var(--text);
            cursor: pointer;
            padding: 8px 13px;
            text-decoration: none;
            font-size: 12px;
        }
        button.primary { background: var(--accent); color: white; font-weight: 800; }
        .layout { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
        }
        h2 { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
        textarea {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            padding: 9px 11px;
            width: 100%;
            min-height: 300px;
            resize: vertical;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 12px 0;
        }
        label {
            display: grid;
            gap: 4px;
            font-size: 11px;
            font-weight: 800;
        }
        input, select {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            padding: 6px 8px;
            font-family: inherit;
        }
        input[type="range"] { border: none; padding: 0; }
        .actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .preview-area {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            min-height: 300px;
            overflow: auto;
        }
        .preview {
            background: white;
            color: #2d2125;
            padding: 20px;
            margin: 0 auto;
            max-width: 800px;
        }
        .q-card {
            background: #fff9fb;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 12px;
            page-break-inside: avoid;
        }
        .preview-title {
            font-size: 1.2em;
            font-weight: 800;
            margin-bottom: 16px;
            text-align: center;
        }
        .q-title {
            font-weight: 800;
            margin-bottom: 8px;
            font-size: inherit;
        }
        .q-opts {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }
        .q-opt {
            background: white;
            border: 1px solid #f0c8d8;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: inherit;
        }
        .msg { color: #999; text-align: center; padding: 20px; }
        .val { font-size: 10px; color: var(--accent); font-weight: 800; }
        @media (max-width: 1024px) {
            .layout { grid-template-columns: 1fr; }
            .controls { grid-template-columns: 1fr; }
        }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            header { display: none; }
            .layout { display: block; gap: 0; }
            .layout .card:first-child { display: none; }
            .layout .card { box-shadow: none; border: none; padding: 0; }
            .preview-area { border: none; padding: 0; background: white; min-height: auto; }
            .preview { max-width: 100%; margin: 0; padding: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Smart Formatter</h1>
            <nav class="nav">
                <a href="../index.html">Home</a>
                <button id="themeBtn">Theme</button>
            </nav>
        </header>

        <div class="layout">
            <div class="card">
                <h2>Paste CSV</h2>
                <textarea id="input" placeholder="1, Question?, A, B, C, D, A"></textarea>

                <label>Preview name
                    <input id="title" type="text" value="Quiz" />
                </label>

                <div class="controls">
                    <label>Font size
                        <input id="size" type="range" min="12" max="24" value="14" />
                        <span class="val" id="sizeVal">14px</span>
                    </label>
                    <label>Line height
                        <select id="height">
                            <option value="1.5">Compact</option>
                            <option value="1.8" selected>Normal</option>
                            <option value="2.2">Spacious</option>
                        </select>
                    </label>
                    <label>View
                        <select id="view">
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                        </select>
                    </label>
                </div>

                <div class="actions">
                    <button class="primary" id="fmt">Format</button>
                    <button id="clr">Clear</button>
                </div>

                <div class="actions">
                    <button id="cop">Copy TSV</button>
                    <button id="exp">Export CSV</button>
                    <button id="prn">Print / Save PDF</button>
                </div>

                <p class="msg" id="info">Ready</p>
            </div>

            <div class="card">
                <h2>Preview</h2>
                <div class="preview-area" id="out"></div>
            </div>
        </div>
    </div>

    <script>
        const $ = s => document.getElementById(s);
        let data = [];

        // Theme
        document.body.classList.toggle('dark', localStorage.getItem('theme') === 'dark');
        $('themeBtn').onclick = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        };

        // Font size
        $('size').oninput = () => {
            $('sizeVal').textContent = $('size').value + 'px';
            render();
        };

        // Parse CSV - ultra simple
        function parseCSV(text) {
            return text.trim().split('\n').map(line => {
                return line.split(/[,\t]/).map(c => c.trim()).filter(x => x);
            }).filter(row => row.length >= 2);
        }

        // Load data
        function load(text) {
            const rows = parseCSV(text);
            data = rows.map((row, i) => ({
                no: row[0] || (i + 1),
                q: row[1] || '',
                a: row[2] || '',
                b: row[3] || '',
                c: row[4] || '',
                d: row[5] || '',
                ans: (row[6] || 'A')[0].toUpperCase()
            }));
        }

        // Render preview
        function render() {
            if (!data.length) {
                $('out').innerHTML = '<p class="msg">Paste CSV and click Format</p>';
                return;
            }

            const size = $('size').value;
            const height = $('height').value;
            const view = $('view').value;
            const title = $('title').value || 'Quiz';

            const html = data.map(row => `<div class="q-card">
                <div class="q-title">${row.no}. ${row.q}</div>
                <div class="q-opts">
                    ${row.a ? `<div class="q-opt"><strong>A.</strong> ${row.a}</div>` : ''}
                    ${row.b ? `<div class="q-opt"><strong>B.</strong> ${row.b}</div>` : ''}
                    ${row.c ? `<div class="q-opt"><strong>C.</strong> ${row.c}</div>` : ''}
                    ${row.d ? `<div class="q-opt"><strong>D.</strong> ${row.d}</div>` : ''}
                </div>
                ${view === 'teacher' ? `<div style="font-size:0.85em;font-weight:800;color:#166534;background:#dcfce7;border:1px solid #8fd1a7;border-radius:999px;display:inline-block;padding:3px 8px;margin-top:6px;">Answer: ${row.ans}</div>` : ''}
            </div>`).join('');

            $('out').innerHTML = `<div class="preview" style="font-size:${size}px;line-height:${height};"><div class="preview-title">${title}</div>${html}</div>`;
            $('info').textContent = `${data.length} question(s)`;
        }

        // Format
        function format() {
            load($('input').value);
            render();
        }

        // Export
        function toRows() {
            return [['No', 'Question', 'A', 'B', 'C', 'D', 'Answer'], ...data.map(r => [r.no, r.q, r.a, r.b, r.c, r.d, r.ans])];
        }

        function csv(cell) {
            return `"${String(cell || '').replace(/"/g, '""')}"`;
        }

        $('fmt').onclick = format;
        $('clr').onclick = () => { $('input').value = ''; data = []; render(); };
        $('cop').onclick = () => {
            if (!data.length) format();
            const tsv = toRows().map(r => r.join('\t')).join('\n');
            navigator.clipboard?.writeText(tsv).then(() => $('info').textContent = '✓ Copied');
        };
        $('exp').onclick = () => {
            if (!data.length) format();
            const csv_text = toRows().map(r => r.map(csv).join(',')).join('\n');
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob(['﻿' + csv_text], { type: 'text/csv' }));
            link.download = 'quiz.csv';
            link.click();
        };
        $('prn').onclick = () => {
            if (!data.length) format();
            window.print();
        };

        $('input').addEventListener('input', format);
        $('title').addEventListener('input', render);
        $('size').addEventListener('input', render);
        $('height').addEventListener('change', render);
        $('view').addEventListener('change', render);
    </script>
</body>
</html>
