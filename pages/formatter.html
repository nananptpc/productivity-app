<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Format Studio v2 - Productivity App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #fff5f7;
            --text: #4a3f44;
            --card: #ffffff;
            --border: #f8d7e0;
            --accent: #f7a1b5;
            --accent2: #fbc4d0;
            --shadow: 0 4px 16px rgba(232, 162, 182, 0.18);
            --font: 'American Typewriter', 'Courier New', monospace;
            --radius: 8px;
        }
        body.dark {
            --bg: #2d2428;
            --text: #f5e6ea;
            --card: #3d3238;
            --border: #5a454c;
            --accent: #d47b92;
            --accent2: #a06275;
            --shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 16px; }
        button, input, select, textarea { font-family: inherit; }
        .container { max-width: 1400px; margin: 0 auto; }
        header, .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
        header { display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        h1 { font-size: 28px; }
        h2 { font-size: 16px; margin-bottom: 8px; }
        .hint { color: color-mix(in srgb, var(--text), transparent 32%); font-size: 12px; line-height: 1.45; margin-top: 3px; }
        .nav, .toolbar, .actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .nav a, button { background: var(--accent2); border: 1px solid var(--accent); border-radius: var(--radius); color: var(--text); cursor: pointer; padding: 8px 12px; text-decoration: none; font-size: 13px; }
        button.primary { background: var(--accent); color: white; font-weight: 800; }
        button.active { background: var(--accent); color: white; font-weight: 800; }
        .layout { display: grid; gap: 14px; grid-template-columns: 350px 1fr; }
        .stack { display: grid; gap: 12px; }
        input, select, textarea { background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius); color: var(--text); min-width: 0; padding: 8px 10px; width: 100%; font-size: 13px; }
        textarea { min-height: 200px; resize: vertical; }
        label { display: grid; gap: 4px; font-size: 11px; font-weight: 800; }
        .preset-buttons { display: grid; gap: 6px; margin-top: 8px; }
        .preset-buttons button { padding: 7px 10px; font-size: 12px; }
        .preset-buttons button.active { background: var(--accent); color: white; }
        details { margin-top: 8px; }
        summary { cursor: pointer; font-weight: 800; color: var(--accent); user-select: none; font-size: 13px; }
        .details-content { margin-top: 8px; padding: 10px; background: color-mix(in srgb, var(--bg), white 3%); border-radius: var(--radius); display: grid; gap: 8px; }
        .details-content label { margin-bottom: 2px; }
        .preview-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); min-height: 400px; max-height: 600px; overflow: auto; padding: 16px; }
        .doc-preview { background: white; color: #242124; font-size: 14px; line-height: 1.6; max-width: 700px; margin: 0 auto; padding: 24px; }
        .doc-preview h2 { font-size: 18px; margin-bottom: 12px; text-align: center; }
        .doc-item { margin-bottom: 8px; overflow-wrap: anywhere; }
        .doc-item .num { font-weight: 800; margin-right: 6px; }
        .mcq-item { margin-bottom: 18px; }
        .mcq-item .question { font-weight: 800; margin-bottom: 8px; }
        .mcq-item .options { margin-left: 20px; }
        .mcq-item .option { margin-bottom: 4px; }
        .sheet-preview { border-collapse: collapse; width: 100%; color: #242124; }
        .sheet-preview th { background: #c7d9f7; border: 1px solid #b7c4dc; padding: 8px; text-align: left; font-weight: 800; }
        .sheet-preview td { background: white; border: 1px solid #cfd6e4; padding: 8px; }
        .sheet-preview tr:nth-child(even) td { background: #edf3ff; }
        .stats { font-size: 12px; color: color-mix(in srgb, var(--text), transparent 25%); }
        @media (max-width: 1000px) {
            .layout { grid-template-columns: 1fr; }
        }
        @media print {
            body { background: white; padding: 0; }
            header, .stack, .toolbar { display: none !important; }
            .layout { display: block; grid-template-columns: 1fr; }
            .card { border: 0; box-shadow: none; padding: 0; }
            .preview-wrap { border: 0; padding: 0; background: white; max-height: none; }
            .doc-preview { max-width: none; padding: 0; background: white; }
            .sheet-preview { min-width: auto; }
        }
    </style>
    <link rel="stylesheet" href="./ui-cleanup.css" />
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🧾 Format Studio v2</h1>
                <p class="hint">Paste text, upload CSV for MCQ/worksheet - chuyên 4 phương án</p>
            </div>
            <nav class="nav">
                <a href="../index.html">Home</a>
                <a href="./teaching.html">Teaching</a>
                <button id="themeBtn">Theme</button>
            </nav>
        </header>

        <main class="layout">
            <section class="stack">
                <div class="card">
                    <h2>Input</h2>
                    <textarea id="rawInput" placeholder="Paste text or copy from CSV..."></textarea>
                    <div class="actions" style="margin-top: 8px;">
                        <button class="primary" id="formatBtn">Format</button>
                        <button onclick="document.getElementById('csvFile').click()">Upload CSV</button>
                        <input type="file" id="csvFile" accept=".csv,.tsv" style="display:none" />
                        <button id="sampleBtn">Sample MCQ</button>
                        <button id="clearBtn">Clear</button>
                    </div>
                </div>

                <div class="card">
                    <h2>Mode</h2>
                    <div class="preset-buttons">
                        <button class="preset active" data-mode="doc">Doc</button>
                        <button class="preset" data-mode="mcq">MCQ</button>
                        <button class="preset" data-mode="sheet">Sheet</button>
                    </div>
                </div>

                <div class="card">
                    <h2>Settings</h2>
                    <label>Title
                        <input id="titleInput" value="Practice" />
                    </label>
                    <label style="margin-top: 6px;">Split by
                        <select id="splitMode">
                            <option value="line">Line</option>
                            <option value="numbered">Numbered (1. 2. 3.)</option>
                            <option value="blank">Blank line</option>
                        </select>
                    </label>
                    <label style="margin-top: 6px;">Show numbers
                        <select id="numbering">
                            <option value="yes" selected>Yes</option>
                            <option value="no">No</option>
                        </select>
                    </label>
                </div>

                <details>
                    <summary>More Options ▼</summary>
                    <div class="details-content">
                        <label>Columns
                            <select id="columnCount">
                                <option value="1">1</option>
                                <option value="2" selected>2</option>
                                <option value="3">3</option>
                            </select>
                        </label>
                        <label>Blank length
                            <input id="blankLength" type="number" value="8" style="max-width: 80px;" />
                        </label>
                        <label>Start number
                            <input id="startNumber" type="number" value="1" style="max-width: 80px;" />
                        </label>
                        <label>Font size
                            <select id="fontSize">
                                <option value="12px">Small</option>
                                <option value="14px" selected>Normal</option>
                                <option value="16px">Large</option>
                            </select>
                        </label>
                        <label>Line spacing
                            <select id="lineSpacing">
                                <option value="1.4">Tight</option>
                                <option value="1.6" selected>Normal</option>
                                <option value="2">Roomy</option>
                            </select>
                        </label>
                    </div>
                </details>
            </section>

            <section class="card">
                <div class="toolbar" style="justify-content: space-between; margin-bottom: 10px;">
                    <p class="stats" id="stats">0 items</p>
                    <div class="actions">
                        <button id="copyBtn">Copy</button>
                        <button id="csvExportBtn">Export CSV</button>
                        <button id="printBtn">Print</button>
                    </div>
                </div>
                <div class="preview-wrap" id="preview"></div>
            </section>
        </main>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        let mode = 'doc';
        let rows = [];

        document.body.classList.toggle('dark', localStorage.getItem('appTheme') === 'dark');
        $('themeBtn').onclick = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('appTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
        };

        function escapeHTML(val) {
            return String(val || '').replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        function parseCSV(text) {
            const lines = (text || '').split(/\r?\n/);
            if (!lines.length) return [];

            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentCell += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentCell.trim());
                    currentCell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    currentRow.push(currentCell.trim());
                    if (currentRow.some(cell => cell.length > 0)) {
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    currentCell = '';
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    currentCell += char;
                }
            }

            if (currentCell.length > 0 || currentRow.length > 0) {
                currentRow.push(currentCell.trim());
                if (currentRow.some(cell => cell.length > 0)) {
                    rows.push(currentRow);
                }
            }

            return rows;
        }

        function importCSV(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = event => {
                const table = parseCSV(event.target.result);
                console.log('Parsed table:', table);

                if (table.length < 2) {
                    alert('CSV phải có header row + data rows');
                    return;
                }

                const headers = table[0].map(h => h.toLowerCase());
                console.log('Headers:', headers);

                // Tìm index của Question column
                const qIdx = headers.findIndex(h =>
                    h.includes('question') || h.includes('stem') || h.includes('prompt')
                );
                // Tìm index của A, B, C, D columns
                const aIdx = headers.findIndex(h => h === 'a');
                const bIdx = headers.findIndex(h => h === 'b');
                const cIdx = headers.findIndex(h => h === 'c');
                const dIdx = headers.findIndex(h => h === 'd');

                console.log('Column indices - Q:', qIdx, 'A:', aIdx, 'B:', bIdx, 'C:', cIdx, 'D:', dIdx);

                // Nếu có đủ columns cho MCQ
                if (qIdx >= 0 && aIdx >= 0 && bIdx >= 0 && cIdx >= 0 && dIdx >= 0) {
                    mode = 'mcq';
                    document.querySelectorAll('.preset').forEach(b =>
                        b.classList.toggle('active', b.dataset.mode === 'mcq')
                    );

                    rows = [];
                    table.slice(1).forEach((row, idx) => {
                        const question = row[qIdx] ? row[qIdx].trim() : '';
                        if (question.length === 0) return;

                        rows.push({
                            no: rows.length + 1,
                            text: question,
                            a: row[aIdx] ? row[aIdx].trim() : '',
                            b: row[bIdx] ? row[bIdx].trim() : '',
                            c: row[cIdx] ? row[cIdx].trim() : '',
                            d: row[dIdx] ? row[dIdx].trim() : '',
                            answer: ''
                        });
                    });

                    render();
                    alert(`✓ Imported ${rows.length} MCQ questions`);
                } else {
                    // Nếu không phải MCQ, thì import như worksheet
                    const contentIdx = headers.findIndex(h =>
                        h.includes('content') || h.includes('question') || h.includes('item')
                    );
                    const colIdx = contentIdx >= 0 ? contentIdx : 0;

                    $('splitMode').value = 'line';
                    const content = table.slice(1)
                        .map(row => row[colIdx] ? row[colIdx].trim() : '')
                        .filter(Boolean)
                        .join('\n');

                    $('rawInput').value = content;
                    render();
                    alert(`✓ Imported ${table.length - 1} rows as worksheet`);
                }
            };
            reader.readAsText(file, 'UTF-8');
        }

        function cleanLine(line) {
            return line.replace(/^\s*\d+[\).、:-]\s*/, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function splitText() {
            const raw = $('rawInput').value.trim();
            const splitMode = $('splitMode').value;

            if (!raw) return [];

            if (splitMode === 'blank') {
                return raw.split(/\n\s*\n/).map(cleanLine).filter(Boolean);
            }
            if (splitMode === 'numbered') {
                return raw.split(/\r?\n/).map(cleanLine).filter(Boolean);
            }
            return raw.split(/\r?\n/).map(cleanLine).filter(Boolean);
        }

        function buildRows() {
            if (mode === 'mcq') return;

            const items = splitText();
            const start = Number($('startNumber').value) || 1;
            const blank = '_'.repeat(Math.max(3, Number($('blankLength').value) || 8));

            rows = items.map((text, i) => {
                const num = start + i;
                const hasBlank = /_{3,}/.test(text);
                return {
                    no: num,
                    text: hasBlank ? text : text.replace(/\(([^)]+)\)/, '($1) ' + blank),
                };
            });
        }

        function renderDoc() {
            const title = escapeHTML($('titleInput').value);
            const cols = Number($('columnCount').value) || 1;
            const showNum = $('numbering').value === 'yes';
            const lineH = $('lineSpacing').value;
            const fontSize = $('fontSize').value;

            let html = `<div class="doc-preview" style="line-height: ${lineH}; font-size: ${fontSize};">`;
            html += `<h2>${title}</h2>`;

            const chunks = [];
            for (let i = 0; i < rows.length; i += cols) chunks.push(rows.slice(i, i + cols));

            chunks.forEach(group => {
                html += `<div style="display: grid; grid-template-columns: repeat(${cols}, 1fr); gap: 18px; margin-bottom: 10px;">`;
                group.forEach(row => {
                    html += `<div class="doc-item">
                        ${showNum ? `<span class="num">${row.no}.</span>` : ''}
                        ${escapeHTML(row.text)}
                    </div>`;
                });
                html += `</div>`;
            });

            html += `</div>`;
            $('preview').innerHTML = html;
        }

        function renderMCQ() {
            const title = escapeHTML($('titleInput').value);
            let html = `<div class="doc-preview"><h2>${title}</h2>`;

            rows.forEach(row => {
                html += `<div class="mcq-item">
                    <div class="question">${row.no}. ${escapeHTML(row.text)}</div>
                    <div class="options">
                        <div class="option"><strong>A)</strong> ${escapeHTML(row.a)}</div>
                        <div class="option"><strong>B)</strong> ${escapeHTML(row.b)}</div>
                        <div class="option"><strong>C)</strong> ${escapeHTML(row.c)}</div>
                        <div class="option"><strong>D)</strong> ${escapeHTML(row.d)}</div>
                    </div>
                </div>`;
            });

            html += `</div>`;
            $('preview').innerHTML = html;
        }

        function renderSheet() {
            let html = `<table class="sheet-preview"><thead><tr>
                <th>No</th><th>Content</th><th>Answer</th><th>Note</th>
            </tr></thead><tbody>`;

            rows.forEach(row => {
                html += `<tr><td>${row.no}</td><td>${escapeHTML(row.text)}</td><td></td><td></td></tr>`;
            });

            html += `</tbody></table>`;
            $('preview').innerHTML = html;
        }

        function render() {
            buildRows();
            $('stats').textContent = `${rows.length} items`;

            if (mode === 'doc') renderDoc();
            else if (mode === 'mcq') renderMCQ();
            else renderSheet();
        }

        document.querySelectorAll('.preset').forEach(btn => btn.addEventListener('click', () => {
            mode = btn.dataset.mode;
            document.querySelectorAll('.preset').forEach(b =>
                b.classList.toggle('active', b === btn)
            );
            render();
        }));

        $('formatBtn').onclick = render;
        $('sampleBtn').onclick = () => {
            mode = 'mcq';
            document.querySelectorAll('.preset').forEach(b =>
                b.classList.toggle('active', b.dataset.mode === 'mcq')
            );
            $('rawInput').value = '';
            rows = [
                { no: 1, text: 'What is 2 + 2?', a: '3', b: '4', c: '5', d: '6', answer: 'B' },
                { no: 2, text: 'Capital of France?', a: 'London', b: 'Berlin', c: 'Paris', d: 'Madrid', answer: 'C' }
            ];
            render();
        };
        $('clearBtn').onclick = () => { $('rawInput').value = ''; rows = []; render(); };
        $('csvFile').onchange = e => importCSV(e.target.files[0]);

        $('copyBtn').onclick = () => {
            const el = $('preview');
            const range = document.createRange();
            range.selectNodeContents(el);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            $('stats').textContent = 'Copied!';
            setTimeout(() => $('stats').textContent = `${rows.length} items`, 1500);
        };

        $('csvExportBtn').onclick = () => {
            if (!rows.length) render();
            const headers = mode === 'mcq' ? ['No', 'Question', 'A', 'B', 'C', 'D'] : ['No', 'Content'];
            const lines = [headers.join(',')];

            rows.forEach(row => {
                if (mode === 'mcq') {
                    lines.push(`${row.no},"${row.text.replace(/"/g, '""')}","${row.a.replace(/"/g, '""')}","${row.b.replace(/"/g, '""')}","${row.c.replace(/"/g, '""')}","${row.d.replace(/"/g, '""')}"`);
                } else {
                    lines.push(`${row.no},"${row.text.replace(/"/g, '""')}"`);
                }
            });

            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob(['﻿' + lines.join('\n')], { type: 'text/csv' }));
            link.download = 'formatted.csv';
            link.click();
            setTimeout(() => URL.revokeObjectURL(link.href), 0);
        };

        $('printBtn').onclick = () => window.print();

        ['rawInput', 'titleInput', 'splitMode', 'columnCount', 'numbering', 'blankLength', 'startNumber', 'lineSpacing', 'fontSize'].forEach(id => {
            $(id).addEventListener(id === 'rawInput' ? 'input' : 'change', render);
        });

        render();
    </script>
</body>
</html>
