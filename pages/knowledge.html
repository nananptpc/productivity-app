<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge</title>
    <link rel="stylesheet" href="../shared.css" />
    <style>
        .note-list {
            display: grid;
            gap: 8px;
        }

        .note-item {
            background: var(--light);
            padding: 12px;
            border-bottom: 1px solid var(--border-soft);
            cursor: pointer;
            transition: background 0.2s;
        }

        .note-item:hover {
            background: var(--accent3);
        }

        .note-title {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .note-category {
            display: inline-block;
            font-size: 11px;
            background: var(--border);
            padding: 2px 6px;
            margin-bottom: 6px;
        }

        .note-preview {
            font-size: 11px;
            opacity: 0.7;
            line-height: 1.4;
            max-height: 40px;
            overflow: hidden;
        }

        .note-actions {
            margin-top: 6px;
        }

        .note-actions button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 11px;
            margin-right: 12px;
        }

        .note-actions button:hover {
            text-decoration: underline;
        }

        .search-box {
            margin-bottom: 12px;
        }

        .search-box input {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 Knowledge</h1>
            <div class="nav">
                <a href="../index.html">← Home</a>
                <button onclick="toggleTheme()">🌓</button>
                <a href="../settings.html">⚙️</a>
            </div>
        </header>

        <div class="stats">
            <div class="stat">
                <span class="stat-number" id="total-notes">0</span>
                <span>Notes</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="total-categories">0</span>
                <span>Categories</span>
            </div>
        </div>

        <div class="card">
            <h2>New Note</h2>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="note-title" placeholder="Note title">
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" id="note-category" placeholder="e.g., JavaScript, Python, General">
            </div>
            <div class="form-group">
                <label>Content</label>
                <textarea id="note-content" placeholder="Write your note here..."></textarea>
            </div>
            <button onclick="addNote()" class="primary">Add Note</button>
        </div>

        <div class="card">
            <h2>Notes</h2>
            <div class="search-box">
                <input type="text" id="search-box" placeholder="Search notes..." onkeyup="filterNotes()">
            </div>
            <div id="note-list" class="note-list">
                <div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">
                    No notes yet
                </div>
            </div>
        </div>
    </div>

    <script src="../shared-layout.js"></script>
    <script>
        const STORAGE_KEY = 'knowledge-notes';

        function getNotes() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function addNote() {
            const title = document.getElementById('note-title').value.trim();
            const category = document.getElementById('note-category').value.trim();
            const content = document.getElementById('note-content').value.trim();

            if (!title || !content) {
                alert('Please enter title and content');
                return;
            }

            const notes = getNotes();
            notes.push({
                id: Date.now(),
                title,
                category: category || 'General',
                content,
                created: new Date().toISOString()
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
            document.getElementById('note-title').value = '';
            document.getElementById('note-category').value = '';
            document.getElementById('note-content').value = '';
            render();
        }

        function deleteNote(id) {
            if (confirm('Delete this note?')) {
                const notes = getNotes().filter(n => n.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
                render();
            }
        }

        function filterNotes() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const items = document.querySelectorAll('.note-item');
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(query) ? 'block' : 'none';
            });
        }

        function render() {
            const notes = getNotes();
            const container = document.getElementById('note-list');

            // Calculate stats
            const categories = new Set(notes.map(n => n.category)).size;
            document.getElementById('total-notes').textContent = notes.length;
            document.getElementById('total-categories').textContent = categories;

            if (notes.length === 0) {
                container.innerHTML = '<div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">No notes yet</div>';
                return;
            }

            // Sort by creation date descending
            notes.sort((a, b) => new Date(b.created) - new Date(a.created));

            container.innerHTML = notes.map(n => `
                <div class="note-item">
                    <div class="note-title">${escapeHtml(n.title)}</div>
                    <span class="note-category">${escapeHtml(n.category)}</span>
                    <div class="note-preview">${escapeHtml(n.content)}</div>
                    <div class="note-actions">
                        <button onclick="event.stopPropagation(); alert('${escapeHtml(n.content).replace(/'/g, "\\'").replace(/\n/g, '\\n')}')">Read</button>
                        <button onclick="event.stopPropagation(); deleteNote(${n.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
