<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Studio - Productivity App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #fff5f7;
            --text: #4a3f44;
            --card: #ffffff;
            --border: #f8d7e0;
            --accent: #f7a1b5;
            --accent2: #fbc4d0;
            --shadow: 0 4px 16px rgba(232, 162, 182, 0.18);
            --font: 'American Typewriter', 'Courier New', monospace;
            --radius: 8px;
        }
        body.dark {
            --bg: #2d2428;
            --text: #f5e6ea;
            --card: #3d3238;
            --border: #5a454c;
            --accent: #d47b92;
            --accent2: #a06275;
            --shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            padding: 18px;
        }
        button, input, select, textarea { font-family: inherit; }
        .container { max-width: 1160px; margin: 0 auto; }
        header, .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
        }
        header {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        h1 { font-size: 28px; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .hint {
            color: color-mix(in srgb, var(--text), transparent 32%);
            font-size: 13px;
            line-height: 1.5;
            margin-top: 4px;
        }
        .nav, .row, .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .nav a, button {
            background: var(--accent2);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            color: var(--text);
            cursor: pointer;
            padding: 8px 13px;
            text-decoration: none;
        }
        button.primary { background: var(--accent); color: white; font-weight: 800; }
        button.danger { background: #ef5b7a; color: white; }
        input, select, textarea {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            min-width: 0;
            padding: 9px 11px;
            width: 100%;
        }
        textarea { min-height: 82px; resize: vertical; }
        label {
            display: grid;
            flex: 1 1 180px;
            gap: 5px;
            font-size: 12px;
            font-weight: 800;
        }
        .layout {
            display: grid;
            gap: 16px;
            grid-template-columns: minmax(0, 1fr) 340px;
            align-items: start;
        }
        .stack { display: grid; gap: 16px; }
        .entry-list {
            display: grid;
            gap: 8px;
            margin-top: 12px;
        }
        .entry {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: grid;
            gap: 6px;
            grid-template-columns: minmax(0, 1fr) auto;
            padding: 10px;
        }
        .entry strong {
            display: block;
            font-size: 18px;
            overflow-wrap: anywhere;
        }
        .entry .meta {
            color: color-mix(in srgb, var(--text), transparent 35%);
            font-size: 12px;
            line-height: 1.45;
        }
        .entry-actions {
            display: flex;
            gap: 5px;
        }
        .entry-actions button {
            min-height: 28px;
            padding: 4px 8px;
        }
        .practice-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            min-height: 220px;
            padding: 18px;
        }
        .practice-card .term {
            font-size: 30px;
            font-weight: 800;
            line-height: 1.35;
            margin-bottom: 12px;
            overflow-wrap: anywhere;
        }
        .practice-card .answer {
            border-top: 1px dashed var(--border);
            display: none;
            line-height: 1.6;
            margin-top: 14px;
            padding-top: 14px;
        }
        .practice-card.show-answer .answer { display: block; }
        .empty {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            color: color-mix(in srgb, var(--text), transparent 35%);
            padding: 22px;
            text-align: center;
        }
        @media (max-width: 860px) {
            .layout { grid-template-columns: 1fr; }
        }
    </style>
    <link rel="stylesheet" href="./ui-cleanup.css" />
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🌍 Language Studio</h1>
                <p class="hint">A small study desk for Korean and Spanish: save words, examples, notes, and review with audio.</p>
            </div>
            <nav class="nav">
                <a href="../index.html">Home</a>
                <a href="./planner.html">Planner</a>
                <a href="./teaching.html">Teaching</a>
                <button id="themeBtn">Theme</button>
                <details class="actions-menu">
                    <summary>More</summary>
                    <div class="actions-menu-list">
                        <a href="../zhongguo-wenhua-yaolue/index.html">Chinese Culture</a>
                        <a href="./daily-log.html">Daily Log</a>
                        <a href="./knowledge.html">Knowledge</a>
                        <a href="../settings.html">Settings</a>
                    </div>
                </details>
            </nav>
        </header>

        <main class="layout">
            <section class="stack">
                <div class="card">
                    <h2 id="formTitle">Add Study Item</h2>
                    <div class="row">
                        <label>Language
                            <select id="languageInput">
                                <option value="Korean">Korean</option>
                                <option value="Spanish">Spanish</option>
                            </select>
                        </label>
                        <label>Type
                            <select id="typeInput">
                                <option>Word</option>
                                <option>Phrase</option>
                                <option>Sentence</option>
                                <option>Grammar</option>
                            </select>
                        </label>
                        <label>Category
                            <input id="categoryInput" placeholder="Travel, food, daily life..." />
                        </label>
                    </div>
                    <div class="row" style="margin-top:8px;">
                        <label>Target language
                            <input id="termInput" placeholder="안녕하세요 / buenos días" />
                        </label>
                        <label>Meaning
                            <input id="meaningInput" placeholder="Hello / good morning" />
                        </label>
                    </div>
                    <label style="margin-top:8px;">Example / note
                        <textarea id="noteInput" placeholder="Example sentence, pronunciation note, mistake to remember..."></textarea>
                    </label>
                    <div class="actions" style="margin-top:10px;">
                        <button class="primary" id="saveBtn">Save</button>
                        <button id="cancelBtn" style="display:none;">Cancel</button>
                    </div>
                </div>

                <div class="card">
                    <div class="row" style="justify-content:space-between;align-items:center;">
                        <h2 style="margin:0;">Library</h2>
                        <details class="actions-menu">
                            <summary>More</summary>
                            <div class="actions-menu-list">
                                <button id="exportBtn">Export CSV</button>
                                <button onclick="document.getElementById('importCSV').click()">Import CSV/TSV</button>
                                <button class="danger" id="clearBtn">Clear All</button>
                            </div>
                        </details>
                        <input type="file" id="importCSV" accept=".csv,.tsv,text/csv,text/tab-separated-values" style="display:none" />
                    </div>
                    <div class="row" style="margin-top:10px;">
                        <select id="languageFilter">
                            <option value="All">All languages</option>
                            <option value="Korean">Korean</option>
                            <option value="Spanish">Spanish</option>
                        </select>
                        <select id="typeFilter">
                            <option value="All">All types</option>
                            <option>Word</option>
                            <option>Phrase</option>
                            <option>Sentence</option>
                            <option>Grammar</option>
                        </select>
                        <input id="searchInput" placeholder="Search term, meaning, note..." />
                    </div>
                    <div class="entry-list" id="entryList"></div>
                </div>
            </section>

            <aside class="card">
                <h2>Review</h2>
                <div class="practice-card" id="practiceCard">
                    <div class="term" id="practiceTerm">No item yet</div>
                    <div class="meta" id="practiceMeta">Add a Korean or Spanish item to begin.</div>
                    <div class="answer" id="practiceAnswer"></div>
                </div>
                <div class="actions" style="margin-top:10px;">
                    <button class="primary" id="newCardBtn">New Card</button>
                    <button id="showAnswerBtn">Show Answer</button>
                    <button id="speakBtn">Speak</button>
                </div>
            </aside>
        </main>
    </div>

    <script>
        const storeKey = 'languageStudioData_v1';
        const $ = id => document.getElementById(id);
        let editingId = null;
        let currentCard = null;

        document.body.classList.toggle('dark', localStorage.getItem('appTheme') === 'dark');
        $('themeBtn').onclick = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('appTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
        };

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[char]));
        }

        function loadItems() {
            try { return JSON.parse(localStorage.getItem(storeKey) || '[]'); }
            catch { return []; }
        }

        function saveItems(items) {
            localStorage.setItem(storeKey, JSON.stringify(items));
        }

        function filteredItems() {
            const language = $('languageFilter').value;
            const type = $('typeFilter').value;
            const search = $('searchInput').value.toLowerCase();
            return loadItems().filter(item => {
                const matchLanguage = language === 'All' || item.language === language;
                const matchType = type === 'All' || item.type === type;
                const matchSearch = [item.term, item.meaning, item.note, item.category].join(' ').toLowerCase().includes(search);
                return matchLanguage && matchType && matchSearch;
            });
        }

        function resetForm() {
            editingId = null;
            $('formTitle').textContent = 'Add Study Item';
            $('saveBtn').textContent = 'Save';
            $('cancelBtn').style.display = 'none';
            ['termInput', 'meaningInput', 'categoryInput', 'noteInput'].forEach(id => $(id).value = '');
        }

        function saveEntry() {
            const term = $('termInput').value.trim();
            const meaning = $('meaningInput').value.trim();
            if (!term || !meaning) return alert('Add both target language and meaning.');
            const items = loadItems();
            const payload = {
                language: $('languageInput').value,
                type: $('typeInput').value,
                category: $('categoryInput').value.trim(),
                term,
                meaning,
                note: $('noteInput').value.trim(),
                updatedAt: new Date().toISOString()
            };
            if (editingId) {
                const item = items.find(entry => entry.id === editingId);
                if (item) Object.assign(item, payload);
            } else {
                items.unshift({ id: Date.now() + '_' + Math.random().toString(16).slice(2), createdAt: new Date().toISOString(), ...payload });
            }
            saveItems(items);
            resetForm();
            render();
        }

        function editEntry(id) {
            const item = loadItems().find(entry => entry.id === id);
            if (!item) return;
            editingId = id;
            $('formTitle').textContent = 'Edit Study Item';
            $('saveBtn').textContent = 'Save Changes';
            $('cancelBtn').style.display = 'inline-block';
            $('languageInput').value = item.language;
            $('typeInput').value = item.type;
            $('categoryInput').value = item.category || '';
            $('termInput').value = item.term || '';
            $('meaningInput').value = item.meaning || '';
            $('noteInput').value = item.note || '';
            $('termInput').focus();
        }

        function deleteEntry(id) {
            if (!confirm('Delete this study item?')) return;
            saveItems(loadItems().filter(item => item.id !== id));
            if (editingId === id) resetForm();
            render();
        }

        function render() {
            const items = filteredItems();
            $('entryList').innerHTML = items.length ? items.map(item => `
                <article class="entry">
                    <div>
                        <strong>${escapeHTML(item.term)}</strong>
                        <div>${escapeHTML(item.meaning)}</div>
                        <div class="meta">${escapeHTML(item.language)} · ${escapeHTML(item.type)}${item.category ? ' · ' + escapeHTML(item.category) : ''}${item.note ? '<br>' + escapeHTML(item.note) : ''}</div>
                    </div>
                    <div class="entry-actions">
                        <button onclick="speakItem('${item.id}')">Speak</button>
                        <button onclick="editEntry('${item.id}')">Edit</button>
                        <button class="danger" onclick="deleteEntry('${item.id}')">×</button>
                    </div>
                </article>
            `).join('') : '<div class="empty">No study items match these filters.</div>';
            if (!currentCard || !loadItems().some(item => item.id === currentCard.id)) pickCard(false);
        }

        function pickCard(showAlert = true) {
            const items = filteredItems();
            if (!items.length) {
                currentCard = null;
                $('practiceTerm').textContent = 'No item yet';
                $('practiceMeta').textContent = showAlert ? 'No study items match these filters.' : 'Add a Korean or Spanish item to begin.';
                $('practiceAnswer').textContent = '';
                $('practiceCard').classList.remove('show-answer');
                return;
            }
            currentCard = items[Math.floor(Math.random() * items.length)];
            $('practiceTerm').textContent = currentCard.term;
            $('practiceMeta').textContent = `${currentCard.language} · ${currentCard.type}`;
            $('practiceAnswer').innerHTML = `<strong>${escapeHTML(currentCard.meaning)}</strong>${currentCard.note ? '<br>' + escapeHTML(currentCard.note) : ''}`;
            $('practiceCard').classList.remove('show-answer');
        }

        function voiceLang(language) {
            return language === 'Korean' ? 'ko-KR' : 'es-ES';
        }

        function speak(text, language) {
            if (!('speechSynthesis' in window)) return alert('Speech is not available in this browser.');
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = voiceLang(language);
            utterance.rate = 0.9;
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(voice => voice.lang.startsWith(utterance.lang.slice(0, 2))) || null;
            window.speechSynthesis.speak(utterance);
        }

        function speakItem(id) {
            const item = loadItems().find(entry => entry.id === id);
            if (item) speak(item.term, item.language);
        }

        function exportCSV() {
            const headers = ['language', 'type', 'category', 'term', 'meaning', 'note'];
            const csv = [headers.join(',')].concat(loadItems().map(item => headers.map(key => `"${String(item[key] || '').replace(/"/g, '""')}"`).join(','))).join('\n');
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `language_studio_${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
            setTimeout(() => URL.revokeObjectURL(link.href), 0);
        }

        function parseDelimited(text) {
            const first = String(text || '').split(/\r?\n/)[0] || '';
            if (first.includes('\t')) return String(text || '').split(/\r?\n/).filter(Boolean).map(line => line.split('\t'));
            const rows = [];
            let row = [], cell = '', quoted = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i], next = text[i + 1];
                if (char === '"' && quoted && next === '"') { cell += '"'; i++; }
                else if (char === '"') quoted = !quoted;
                else if (char === ',' && !quoted) { row.push(cell); cell = ''; }
                else if ((char === '\n' || char === '\r') && !quoted) {
                    if (cell || row.length) rows.push([...row, cell]);
                    row = []; cell = '';
                    if (char === '\r' && next === '\n') i++;
                } else cell += char;
            }
            if (cell || row.length) rows.push([...row, cell]);
            return rows;
        }

        function importFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = event => {
                const table = parseDelimited(event.target.result);
                const headers = (table.shift() || []).map(h => h.replace(/^\uFEFF/, '').trim().toLowerCase());
                const items = loadItems();
                table.forEach(row => {
                    const item = {};
                    headers.forEach((header, index) => item[header] = row[index] || '');
                    if (!item.term && !item.word && !item.phrase) return;
                    items.push({
                        id: Date.now() + '_' + Math.random().toString(16).slice(2),
                        language: item.language || 'Korean',
                        type: item.type || 'Word',
                        category: item.category || '',
                        term: item.term || item.word || item.phrase || '',
                        meaning: item.meaning || item.translation || '',
                        note: item.note || item.example || '',
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    });
                });
                saveItems(items);
                render();
                alert('Import finished.');
            };
            reader.readAsText(file, 'UTF-8');
        }

        $('saveBtn').onclick = saveEntry;
        $('cancelBtn').onclick = resetForm;
        $('newCardBtn').onclick = () => pickCard();
        $('showAnswerBtn').onclick = () => $('practiceCard').classList.toggle('show-answer');
        $('speakBtn').onclick = () => currentCard && speak(currentCard.term, currentCard.language);
        $('exportBtn').onclick = exportCSV;
        $('importCSV').onchange = event => importFile(event.target.files[0]);
        $('clearBtn').onclick = () => {
            if (!confirm('Clear all language study items?')) return;
            saveItems([]);
            resetForm();
            render();
        };
        ['languageFilter', 'typeFilter'].forEach(id => $(id).addEventListener('change', () => { render(); pickCard(false); }));
        $('searchInput').addEventListener('input', () => { render(); pickCard(false); });
        window.speechSynthesis?.addEventListener?.('voiceschanged', () => {});
        render();
    </script>
</body>
</html>
