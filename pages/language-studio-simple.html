<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Studio - Productivity App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #fff5f7;
            --text: #4a3f44;
            --card: #ffffff;
            --border: #f8d7e0;
            --accent: #f7a1b5;
            --accent2: #fbc4d0;
            --shadow: 0 4px 16px rgba(232, 162, 182, 0.18);
            --font: 'American Typewriter', 'Yuanti SC', '圆体', 'STYuanti', 'Huninn', 'jf open 粉圓', 'Noto Sans SC', 'Courier New', monospace;
            --radius: 8px;
        }
        body.dark {
            --bg: #2d2428;
            --text: #f5e6ea;
            --card: #3d3238;
            --border: #5a454c;
            --accent: #d47b92;
            --accent2: #a06275;
            --shadow: 0 4px 18px rgba(0,0,0,0.35);
        }
        body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 18px; }
        button, input, select, textarea { font-family: inherit; }
        .container { max-width: 1160px; margin: 0 auto; }
        header, .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
        header { display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        h1 { font-size: 28px; }
        h2 { font-size: 18px; margin-bottom: 10px; }
        .hint { color: color-mix(in srgb, var(--text), transparent 32%); font-size: 13px; line-height: 1.5; margin-top: 4px; }
        .nav, .row, .actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .nav a, button { background: var(--accent2); border: 1px solid var(--accent); border-radius: var(--radius); color: var(--text); cursor: pointer; padding: 8px 13px; text-decoration: none; }
        button.primary { background: var(--accent); color: white; font-weight: 800; }
        button.danger { background: #ef5b7a; color: white; }
        input, select, textarea { background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius); color: var(--text); min-width: 0; padding: 9px 11px; width: 100%; }
        textarea { min-height: 82px; resize: vertical; }
        label { display: grid; flex: 1 1 160px; gap: 5px; font-size: 12px; font-weight: 800; }
        .layout { display: grid; gap: 16px; grid-template-columns: minmax(0, 1fr) 340px; align-items: start; }
        .stack { display: grid; gap: 16px; }
        .entry-list { display: grid; gap: 8px; margin-top: 12px; }
        .entry { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); display: grid; gap: 6px; grid-template-columns: minmax(0, 1fr) auto; padding: 10px; }
        .entry strong { display: block; font-size: 18px; overflow-wrap: anywhere; }
        .entry .meta { color: color-mix(in srgb, var(--text), transparent 35%); font-size: 12px; line-height: 1.45; }
        .entry-actions { display: flex; gap: 5px; }
        .entry-actions button { min-height: 28px; padding: 4px 8px; font-size: 12px; }
        .practice-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); min-height: 220px; padding: 18px; }
        .practice-card .term { font-size: 28px; font-weight: 800; margin-bottom: 12px; overflow-wrap: anywhere; }
        .practice-card .answer { border-top: 1px dashed var(--border); display: none; line-height: 1.6; margin-top: 14px; padding-top: 14px; }
        .practice-card.show-answer .answer { display: block; }
        .review-stats { color: color-mix(in srgb, var(--text), transparent 30%); font-size: 13px; margin-bottom: 10px; }
        .rating-actions { display: none; gap: 8px; grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top: 14px; }
        .practice-card.show-answer .rating-actions { display: grid; }
        .rating-actions button { padding: 9px 10px; }
        .rating-actions .again { background: #ffd4dc; }
        .rating-actions .hard { background: #ffe3c7; }
        .rating-actions .good { background: #d7f4df; }
        .rating-actions .easy { background: #dbeafe; }
        .empty { border: 2px dashed var(--border); border-radius: var(--radius); color: color-mix(in srgb, var(--text), transparent 35%); padding: 22px; text-align: center; }
        details { margin-top: 10px; }
        summary { cursor: pointer; font-weight: 800; color: var(--accent); user-select: none; }
        .details-content { margin-top: 10px; padding: 10px; background: color-mix(in srgb, var(--bg), white 5%); border-radius: var(--radius); }
        @media (max-width: 860px) {
            .layout { grid-template-columns: 1fr; }
        }
    </style>
    <link rel="stylesheet" href="./ui-cleanup.css" />
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🌍 Language Studio</h1>
                <p class="hint">Save Korean & Spanish words, then review with spaced repetition.</p>
            </div>
            <nav class="nav">
                <a href="../index.html">Home</a>
                <a href="./planner.html">Planner</a>
                <button id="themeBtn">Theme</button>
                <details class="actions-menu">
                    <summary>More</summary>
                    <div class="actions-menu-list">
                        <a href="./teaching.html">Teaching</a>
                        <a href="./daily-log.html">Daily Log</a>
                        <a href="./knowledge.html">Knowledge</a>
                        <a href="../settings.html">Settings</a>
                    </div>
                </details>
            </nav>
        </header>

        <main class="layout">
            <section class="stack">
                <div class="card">
                    <h2>Add Item</h2>
                    <div class="row">
                        <label style="flex: 1 1 120px;">Language
                            <select id="languageInput">
                                <option>Korean</option>
                                <option>Spanish</option>
                            </select>
                        </label>
                        <label style="flex: 1 1 120px;">Type
                            <select id="typeInput">
                                <option>Word</option>
                                <option>Phrase</option>
                                <option>Sentence</option>
                            </select>
                        </label>
                    </div>
                    <div class="row" style="margin-top:8px;">
                        <label>Word/Phrase
                            <input id="termInput" placeholder="안녕 / hola" />
                        </label>
                        <label>Meaning
                            <input id="meaningInput" placeholder="hi / hello" />
                        </label>
                    </div>
                    <label style="margin-top:8px;">Example / Note
                        <textarea id="noteInput" placeholder="Optional example or note..."></textarea>
                    </label>
                    <div class="actions" style="margin-top:10px;">
                        <button class="primary" id="saveBtn">Save</button>
                        <button id="cancelBtn" style="display:none;">Cancel</button>
                    </div>

                    <details style="margin-top:12px;">
                        <summary>More options ▼</summary>
                        <div class="details-content">
                            <label>Category
                                <input id="categoryInput" placeholder="Travel, food, work..." />
                            </label>
                        </div>
                    </details>
                </div>

                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2 style="margin:0;">Library</h2>
                        <details class="actions-menu">
                            <summary>More ⋯</summary>
                            <div class="actions-menu-list">
                                <button id="exportBtn">Export CSV</button>
                                <button onclick="document.getElementById('importCSV').click()">Import CSV/TSV</button>
                                <button class="danger" id="clearBtn">Clear All</button>
                            </div>
                        </details>
                        <input type="file" id="importCSV" accept=".csv,.tsv,text/csv,text/tab-separated-values" style="display:none" />
                    </div>
                    <div class="row" style="margin-top:10px; gap: 6px;">
                        <select id="languageFilter" style="flex: 1 1 120px;">
                            <option value="All">All</option>
                            <option value="Korean">Korean</option>
                            <option value="Spanish">Spanish</option>
                        </select>
                        <input id="searchInput" placeholder="Search..." style="flex: 2 1 200px;" />
                    </div>
                    <div class="entry-list" id="entryList"></div>
                </div>
            </section>

            <aside class="card">
                <h2>Review</h2>
                <div class="review-stats" id="reviewStats">0 due today</div>
                <div class="practice-card" id="practiceCard">
                    <div class="term" id="practiceTerm">Start</div>
                    <div class="meta" id="practiceMeta">Add a word to begin</div>
                    <div class="answer" id="practiceAnswer"></div>
                    <div class="rating-actions" id="ratingActions">
                        <button class="again" data-quality="1">Again</button>
                        <button class="hard" data-quality="3">Hard</button>
                        <button class="good" data-quality="4">Good</button>
                        <button class="easy" data-quality="5">Easy</button>
                    </div>
                </div>
                <div class="actions" style="margin-top:10px;">
                    <button class="primary" id="newCardBtn">Next Due</button>
                    <button id="showAnswerBtn">Show Answer</button>
                    <button id="speakBtn">Speak</button>
                </div>
            </aside>
        </main>
    </div>

    <script>
        const storeKey = 'languageStudioData_v1';
        const $ = id => document.getElementById(id);
        let editingId = null;
        let currentCard = null;
        let audioPlayer = null;

        document.body.classList.toggle('dark', localStorage.getItem('appTheme') === 'dark');
        $('themeBtn').onclick = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('appTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
        };

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
        }

        function srsDefaults() {
            return { lastReviewed: null, interval: 0, easinessFactor: 2.5, repetitions: 0 };
        }

        function normalizeItem(item) {
            const defaults = srsDefaults();
            return {
                id: item.id || Date.now() + '_' + Math.random().toString(16).slice(2),
                language: item.language || 'Korean',
                type: item.type || 'Word',
                category: item.category || '',
                term: item.term || '',
                meaning: item.meaning || '',
                note: item.note || '',
                createdAt: item.createdAt || new Date().toISOString(),
                updatedAt: item.updatedAt || new Date().toISOString(),
                lastReviewed: item.lastReviewed || defaults.lastReviewed,
                interval: Math.max(0, Number(item.interval) || 0),
                easinessFactor: Math.max(1.3, Number(item.easinessFactor) || defaults.easinessFactor),
                repetitions: Math.max(0, Number(item.repetitions) || 0)
            };
        }

        function loadItems() {
            try {
                const items = JSON.parse(localStorage.getItem(storeKey) || '[]');
                const normalized = Array.isArray(items) ? items.map(normalizeItem) : [];
                localStorage.setItem(storeKey, JSON.stringify(normalized));
                return normalized;
            } catch { return []; }
        }

        function saveItems(items) {
            localStorage.setItem(storeKey, JSON.stringify(items.map(normalizeItem)));
        }

        function filteredItems() {
            const language = $('languageFilter').value;
            const search = $('searchInput').value.toLowerCase();
            return loadItems().filter(item => {
                const matchLang = language === 'All' || item.language === language;
                const matchSearch = [item.term, item.meaning, item.note, item.category].join(' ').toLowerCase().includes(search);
                return matchLang && matchSearch;
            });
        }

        function nextDueDate(item) {
            if (!item.lastReviewed) return new Date(0);
            const due = new Date(item.lastReviewed);
            due.setDate(due.getDate() + (item.interval || 0));
            return due;
        }

        function isDue(item) {
            return nextDueDate(item) <= new Date();
        }

        function dueItems() {
            return filteredItems().filter(isDue).sort((a, b) => nextDueDate(a) - nextDueDate(b));
        }

        function scheduleReview(item, quality) {
            const now = new Date().toISOString();
            let { easinessFactor, repetitions, interval } = item;
            if (quality < 3) {
                repetitions = 0;
                interval = 0;
            } else {
                repetitions += 1;
                if (repetitions === 1) interval = 1;
                else if (repetitions === 2) interval = quality === 3 ? 3 : 6;
                else interval = Math.round(interval * easinessFactor);
                if (quality === 3) interval = Math.round(interval * 0.65);
                if (quality === 5) interval = Math.round(interval * 1.25);
            }
            easinessFactor += 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02);
            easinessFactor = Math.max(1.3, Number(easinessFactor.toFixed(2)));
            return { ...item, lastReviewed: now, interval, easinessFactor, repetitions, updatedAt: now };
        }

        function resetForm() {
            editingId = null;
            ['termInput', 'meaningInput', 'categoryInput', 'noteInput'].forEach(id => $(id).value = '');
            $('saveBtn').textContent = 'Save';
            $('cancelBtn').style.display = 'none';
        }

        function saveEntry() {
            const term = $('termInput').value.trim();
            const meaning = $('meaningInput').value.trim();
            if (!term || !meaning) return alert('Add both word and meaning.');
            const items = loadItems();
            const payload = {
                language: $('languageInput').value,
                type: $('typeInput').value,
                category: $('categoryInput').value.trim(),
                term,
                meaning,
                note: $('noteInput').value.trim(),
                updatedAt: new Date().toISOString()
            };
            if (editingId) {
                const item = items.find(e => e.id === editingId);
                if (item) Object.assign(item, payload);
            } else {
                items.unshift(normalizeItem({ createdAt: new Date().toISOString(), ...payload }));
            }
            saveItems(items);
            resetForm();
            render();
            pickCard(false);
        }

        function editEntry(id) {
            const item = loadItems().find(e => e.id === id);
            if (!item) return;
            editingId = id;
            $('languageInput').value = item.language;
            $('typeInput').value = item.type;
            $('categoryInput').value = item.category || '';
            $('termInput').value = item.term;
            $('meaningInput').value = item.meaning;
            $('noteInput').value = item.note || '';
            $('saveBtn').textContent = 'Update';
            $('cancelBtn').style.display = 'inline-block';
            $('termInput').focus();
        }

        function deleteEntry(id) {
            if (!confirm('Delete this item?')) return;
            saveItems(loadItems().filter(e => e.id !== id));
            if (editingId === id) resetForm();
            render();
            pickCard(false);
        }

        function render() {
            const items = filteredItems();
            const due = dueItems().length;
            const total = items.length;
            $('reviewStats').textContent = `${due} due · ${total} total`;
            $('entryList').innerHTML = items.length ? items.map(item => `
                <article class="entry">
                    <div>
                        <strong>${escapeHTML(item.term)}</strong>
                        <div>${escapeHTML(item.meaning)}</div>
                        <div class="meta">${item.language} · ${item.type}${item.category ? ' · ' + escapeHTML(item.category) : ''}${item.note ? '<br>' + escapeHTML(item.note) : ''}</div>
                    </div>
                    <div class="entry-actions">
                        <button onclick="editEntry('${item.id}')">✎</button>
                        <button class="danger" onclick="deleteEntry('${item.id}')">×</button>
                    </div>
                </article>
            `).join('') : '<div class="empty">No items yet</div>';
        }

        function pickCard(showAlert = true) {
            const items = dueItems();
            if (!items.length) {
                const total = filteredItems().length;
                const msg = total ? 'All caught up for today!' : 'Add words to start';
                $('practiceTerm').textContent = '✓';
                $('practiceMeta').textContent = msg;
                $('practiceAnswer').textContent = '';
                $('practiceCard').classList.remove('show-answer');
                $('showAnswerBtn').disabled = true;
                $('speakBtn').disabled = true;
                currentCard = null;
                return;
            }
            currentCard = items[0];
            $('practiceTerm').textContent = currentCard.term;
            $('practiceMeta').textContent = `${currentCard.language} · ${currentCard.type}`;
            $('practiceAnswer').innerHTML = `<strong>${escapeHTML(currentCard.meaning)}</strong>${currentCard.note ? '<br>' + escapeHTML(currentCard.note) : ''}`;
            $('practiceCard').classList.remove('show-answer');
            $('showAnswerBtn').disabled = false;
            $('speakBtn').disabled = false;
        }

        function rateCurrentCard(quality) {
            if (!currentCard) return;
            const items = loadItems().map(item => item.id === currentCard.id ? scheduleReview(item, quality) : item);
            saveItems(items);
            render();
            pickCard(false);
        }

        function parseCSV(text) {
            const firstLine = (text || '').split(/\r?\n/)[0] || '';
            if (firstLine.includes('\t')) {
                return (text || '').split(/\r?\n/).filter(Boolean).map(line => line.split('\t').map(c => c.trim()));
            }
            const output = [];
            let row = [], cell = '', quote = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i], next = text[i + 1];
                if (char === '"' && quote && next === '"') { cell += '"'; i++; }
                else if (char === '"') quote = !quote;
                else if (char === ',' && !quote) { row.push(cell); cell = ''; }
                else if ((char === '\n' || char === '\r') && !quote) {
                    if (char === '\r' && next === '\n') i++;
                    row.push(cell);
                    if (row.some(v => v.trim())) output.push(row);
                    row = []; cell = '';
                } else cell += char;
            }
            row.push(cell);
            if (row.some(v => v.trim())) output.push(row);
            return output;
        }

        function importFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = event => {
                const table = parseCSV(event.target.result);
                const headers = (table.shift() || []).map(h => h.replace(/^﻿/, '').trim());
                const lookup = headers.map(h => h.toLowerCase());
                const items = loadItems();
                table.forEach(row => {
                    const obj = {};
                    lookup.forEach((h, i) => obj[h] = row[i] || '');
                    if (!obj.term && !obj.word) return;
                    items.push(normalizeItem({
                        language: obj.language || 'Korean',
                        type: obj.type || 'Word',
                        category: obj.category || '',
                        term: obj.term || obj.word || '',
                        meaning: obj.meaning || obj.translation || '',
                        note: obj.note || obj.example || '',
                        createdAt: new Date().toISOString()
                    }));
                });
                saveItems(items);
                render();
                pickCard(false);
                alert('Imported ' + (table.length) + ' items');
            };
            reader.readAsText(file, 'UTF-8');
        }

        function exportCSV() {
            const headers = ['language', 'type', 'term', 'meaning', 'category', 'note'];
            const csv = [headers.join(',')].concat(loadItems().map(item => headers.map(k => `"${String(item[k] || '').replace(/"/g, '""')}"`).join(','))).join('\n');
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `language_${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
            setTimeout(() => URL.revokeObjectURL(link.href), 0);
        }

        $('saveBtn').onclick = saveEntry;
        $('cancelBtn').onclick = resetForm;
        $('newCardBtn').onclick = () => pickCard();
        $('showAnswerBtn').onclick = () => $('practiceCard').classList.add('show-answer');
        $('speakBtn').onclick = () => currentCard && alert('TTS: ' + currentCard.term);
        $('exportBtn').onclick = exportCSV;
        $('importCSV').onchange = event => importFile(event.target.files[0]);
        $('clearBtn').onclick = () => {
            if (!confirm('Delete everything?')) return;
            saveItems([]);
            resetForm();
            render();
            pickCard(false);
        };
        $('ratingActions').addEventListener('click', event => {
            const btn = event.target.closest('button[data-quality]');
            if (btn) rateCurrentCard(Number(btn.dataset.quality));
        });
        $('languageFilter').onchange = () => { render(); pickCard(false); };
        $('searchInput').oninput = () => { render(); pickCard(false); };
        render();
        pickCard(false);
    </script>
</body>
</html>
