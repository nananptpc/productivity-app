<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance</title>
    <link rel="stylesheet" href="../shared.css" />
    <style>
        .summary-item.income .summary-number {
            color: #2e8b57;
        }

        .summary-item.expense .summary-number {
            color: #d9534f;
        }

        .transaction-list {
            display: grid;
            gap: 6px;
        }

        .transaction-item {
            display: grid;
            grid-template-columns: 1fr 80px auto;
            gap: 10px;
            align-items: center;
            padding: 10px;
            background: var(--light);
            border-bottom: 1px solid var(--border-soft);
        }

        .transaction-name {
            font-weight: normal;
            font-size: 13px;
        }

        .transaction-date {
            font-size: 11px;
            opacity: 0.6;
        }

        .transaction-amount {
            font-weight: bold;
            text-align: right;
            min-width: 80px;
        }

        .transaction-amount.income {
            color: #2e8b57;
        }

        .transaction-amount.expense {
            color: #d9534f;
        }

        .transaction-delete {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
        }

        .transaction-delete:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Finance</h1>
            <div class="nav">
                <a href="../index.html">← Home</a>
                <button onclick="toggleTheme()">🌓</button>
                <a href="../settings.html">⚙️</a>
            </div>
        </header>

        <div class="summary">
            <div class="summary-item income">
                <span class="summary-number" id="total-income">$0</span>
                <span>Income</span>
            </div>
            <div class="summary-item expense">
                <span class="summary-number" id="total-expense">$0</span>
                <span>Expense</span>
            </div>
            <div class="summary-item">
                <span class="summary-number" id="total-balance">$0</span>
                <span>Balance</span>
            </div>
        </div>

        <div class="tabs">
            <button class="active" onclick="switchTab('add')">Add</button>
            <button onclick="switchTab('view')">All</button>
        </div>

        <div id="add" class="tab-content active">
            <div class="card">
                <h2>New Transaction</h2>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="trans-desc" placeholder="e.g., Grocery shopping">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Amount ($)</label>
                        <input type="number" id="trans-amount" placeholder="0.00" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="trans-date">
                    </div>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="trans-type">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                </div>
                <button onclick="addTransaction()" class="primary">Add Transaction</button>
            </div>
        </div>

        <div id="view" class="tab-content">
            <div class="card">
                <h2>Transactions</h2>
                <div id="transaction-list" class="transaction-list">
                    <div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">
                        No transactions yet
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../shared-layout.js"></script>
    <script>
        const STORAGE_KEY = 'finance-transactions';

        function getTransactions() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function addTransaction() {
            const desc = document.getElementById('trans-desc').value.trim();
            const amount = parseFloat(document.getElementById('trans-amount').value);
            const date = document.getElementById('trans-date').value;
            const type = document.getElementById('trans-type').value;

            if (!desc || !amount || !date) {
                alert('Please fill in all fields');
                return;
            }

            const transactions = getTransactions();
            transactions.push({
                id: Date.now(),
                desc,
                amount,
                date,
                type,
                created: new Date().toISOString()
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
            document.getElementById('trans-desc').value = '';
            document.getElementById('trans-amount').value = '';
            document.getElementById('trans-date').value = '';
            render();
            switchTab('view');
        }

        function deleteTransaction(id) {
            if (confirm('Delete this transaction?')) {
                const transactions = getTransactions().filter(t => t.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
                render();
            }
        }

        function render() {
            const transactions = getTransactions();
            const container = document.getElementById('transaction-list');

            // Calculate totals
            const income = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const balance = income - expense;

            document.getElementById('total-income').textContent = '$' + income.toFixed(2);
            document.getElementById('total-expense').textContent = '$' + expense.toFixed(2);
            document.getElementById('total-balance').textContent = '$' + balance.toFixed(2);

            if (transactions.length === 0) {
                container.innerHTML = '<div style="padding: 16px; text-align: center; opacity: 0.6; font-size: 12px;">No transactions yet</div>';
                return;
            }

            // Sort by date descending
            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = transactions.map(t => `
                <div class="transaction-item">
                    <div>
                        <div class="transaction-name">${escapeHtml(t.desc)}</div>
                        <div class="transaction-date">${t.date}</div>
                    </div>
                    <div class="transaction-amount ${t.type}">
                        ${t.type === 'income' ? '+' : '-'}$${t.amount.toFixed(2)}
                    </div>
                    <button class="transaction-delete" onclick="deleteTransaction(${t.id})">✕</button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Set today's date by default
        document.getElementById('trans-date').valueAsDate = new Date();

        // Initialize
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
