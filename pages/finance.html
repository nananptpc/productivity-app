<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance - Money Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #fff5f7;
            --text: #4a3f44;
            --card: #ffffff;
            --shadow: 0 4px 16px rgba(232, 162, 182, 0.2);
            --border: #f8d7e0;
            --accent: #f7a1b5;
            --accent2: #fbc4d0;
            --font: 'American Typewriter', 'Yuanti SC', '圆体', 'STYuanti', 'Huninn', 'jf open 粉圓', 'Noto Sans SC', 'Courier New', monospace;
            --radius: 8px;
            --transition: 0.3s ease;
        }
        body.dark {
            --bg: #2d2428;
            --text: #f5e6ea;
            --card: #3d3238;
            --shadow: 0 4px 16px rgba(0,0,0,0.4);
            --border: #5a454c;
            --accent: #d47b92;
            --accent2: #a06275;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px 20px 110px;
            transition: background var(--transition), color var(--transition);
        }
        * {
            font-family: var(--font);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px 24px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            transition: background var(--transition);
        }
        header h1 {
            font-size: 26px;
            letter-spacing: 1px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-actions button,
        .header-actions a,
        .header-actions select {
            padding: 8px 18px;
            border: none;
            border-radius: 40px;
            background: var(--accent2);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            cursor: pointer;
            transition: background var(--transition), transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .header-actions select {
            border: 2px solid var(--border);
            min-width: 170px;
        }
        .header-actions button:hover,
        .header-actions a:hover {
            background: var(--accent);
            transform: scale(1.02);
        }
        .theme-toggle {
            background: transparent;
            border: 2px solid var(--accent);
            border-radius: 40px;
            padding: 6px 16px;
            font-family: var(--font);
            cursor: pointer;
            color: var(--text);
            transition: 0.3s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
        }

        /* CALCULATOR POPUP */
        .calc-overlay {
            display: none;
            position: fixed;
            top: 120px;
            right: 24px;
            width: auto;
            height: auto;
            background: transparent;
            z-index: 1000;
            justify-content: flex-end;
            align-items: flex-start;
        }
        .calc-overlay.show {
            display: flex;
        }
        .calc-popup {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 360px;
            max-width: 95%;
            position: relative;
        }
        .calc-popup .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
            opacity: 0.6;
        }
        .calc-popup .close-btn:hover {
            opacity: 1;
        }
        .calc-popup .calc-display {
            background: var(--bg);
            padding: 12px 14px 10px;
            border-radius: var(--radius);
            text-align: right;
            min-height: 76px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
            overflow-wrap: anywhere;
        }
        .calc-display-main {
            font-size: clamp(22px, 4vw, 30px);
            font-weight: bold;
            line-height: 1.12;
        }
        .calc-display-sub {
            font-size: 12px;
            line-height: 1.35;
            margin-top: 6px;
            opacity: 0.65;
        }
        .calc-unit-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .calc-unit-row select {
            flex: 1;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 8px 10px;
        }
        .calc-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .calc-actions button {
            flex: 1;
            padding: 7px 10px;
            border: none;
            border-radius: 8px;
            background: var(--accent2);
            color: var(--text);
            font-family: var(--font);
            cursor: pointer;
        }
        .calc-actions button:hover {
            background: var(--accent);
            color: #fff;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .calc-grid button {
            width: auto;
            height: 58px;
            padding: 0;
            border: 2px solid var(--border);
            border-radius: 50%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .floating-calc {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 74px;
            height: 74px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            box-shadow: 0 10px 28px rgba(232, 70, 120, 0.35);
            font-size: 28px;
            cursor: pointer;
            z-index: 900;
            transition: transform 0.2s, opacity 0.2s;
        }
        .floating-calc:hover {
            transform: translateY(-2px) scale(1.03);
            opacity: 0.92;
        }
        .calc-grid button:hover {
            background: var(--accent2);
        }
        .calc-grid button.operator {
            background: var(--accent2);
            border-color: var(--accent);
        }
        .calc-grid button.operator:hover {
            background: var(--accent);
            color: #fff;
        }
        .calc-grid button.equals {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .calc-grid button.equals:hover {
            opacity: 0.85;
        }
        .calc-grid button.clear {
            background: #e74c6f;
            color: #fff;
            border-color: #e74c6f;
        }
        .calc-grid button.clear:hover {
            background: #c0392b;
        }

        /* MAIN LAYOUT */
        .main-layout {
            display: grid;
            grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
            gap: 24px;
        }
        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* LEFT PANEL */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }
        .right-panel,
        .section,
        .dropdown-content,
        .dropdown-inner {
            min-width: 0;
        }

        /* CALENDAR */
        .calendar-section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            transition: background var(--transition);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .calendar-header button {
            padding: 4px 12px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 16px;
            cursor: pointer;
        }
        .calendar-header button:hover {
            background: var(--accent2);
        }
        .calendar-header .month-label {
            font-weight: bold;
            font-size: 18px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-grid .day-name {
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
            padding: 4px 0;
        }
        .calendar-grid .day-cell {
            text-align: center;
            padding: 6px 2px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            border: 2px solid transparent;
            min-height: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .calendar-grid .day-cell:hover {
            background: var(--accent2);
        }
        .calendar-grid .day-cell.today {
            border-color: var(--accent);
            background: var(--accent2);
        }
        .calendar-grid .day-cell.selected {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .calendar-grid .day-cell.other-month {
            opacity: 0.3;
        }
        .calendar-grid .day-cell .day-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: 2px;
        }

        /* DAY DETAIL */
        .day-detail {
            margin-top: 12px;
            padding: 12px 14px;
            background: var(--bg);
            border-radius: var(--radius);
            min-height: 50px;
        }
        .day-detail .detail-date {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .day-detail .detail-summary {
            font-size: 13px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .day-detail .detail-summary .income {
            color: #2ecc71;
        }
        .day-detail .detail-summary .expense {
            color: #e74c6f;
        }
        .day-detail .detail-summary .net {
            font-weight: bold;
        }
        .day-detail .detail-tx {
            font-size: 12px;
            padding: 3px 8px;
            background: var(--card);
            border-radius: 6px;
            margin: 2px 0;
            display: flex;
            justify-content: space-between;
            border-left: 3px solid var(--accent);
        }
        .day-detail .detail-tx .tx-amount {
            font-weight: bold;
        }
        .day-detail .detail-tx .tx-amount.income {
            color: #2ecc71;
        }
        .day-detail .detail-tx .tx-amount.expense {
            color: #e74c6f;
        }

        /* BALANCE */
        .balance-wrapper {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px 20px;
            transition: background var(--transition);
        }
        .balance-wrapper .total {
            font-size: 28px;
            font-weight: bold;
        }
        .balance-wrapper .total .sub {
            font-size: 16px;
            font-weight: normal;
            opacity: 0.6;
            margin-left: 12px;
        }
        .balance-sources {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .balance-source {
            background: var(--bg);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .balance-source.credit-source {
            border-style: dashed;
            opacity: 0.9;
        }
        .balance-source .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .source-kind-badge {
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 2px 6px;
            font-size: 11px;
            opacity: 0.75;
        }

        .section {
            background: var(--card);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            transition: background var(--transition);
        }
        .section h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }
        .dropdown-section {
            padding: 0;
            overflow: hidden;
        }
        .dropdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
        }
        .dropdown-header:hover {
            background: var(--accent2);
        }
        .dropdown-header h3 {
            margin-bottom: 0;
        }
        .dropdown-arrow {
            opacity: 0.55;
            transition: transform 0.25s;
        }
        .dropdown-arrow.open {
            transform: rotate(180deg);
        }
        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .dropdown-content.open {
            max-height: 900px;
        }
        .dropdown-inner {
            padding: 0 20px 20px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .form-row input,
        .form-row select,
        .form-row textarea {
            padding: 8px 14px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            flex: 1 1 140px;
            transition: border 0.3s;
        }
        .form-row input:focus,
        .form-row select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-row button {
            padding: 8px 24px;
            border: none;
            border-radius: 40px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font);
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .form-row button:hover {
            opacity: 0.85;
        }
        .form-row .calc-btn {
            background: var(--accent2);
            color: var(--text);
            padding: 8px 16px;
        }
        .form-row .calc-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tag-item {
            background: var(--bg);
            padding: 6px 10px;
            border-radius: 12px;
            border: 2px solid var(--border);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .tag-item .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }
        .tag-item .del {
            cursor: pointer;
            color: #e74c6f;
            font-weight: bold;
            font-size: 12px;
            line-height: 1;
        }
        .mini-btn,
        .form-row button.mini-btn {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            padding: 4px 9px;
            font-size: 12px;
            font-family: var(--font);
            cursor: pointer;
        }
        .form-row button.cancel-btn {
            display: none;
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
        }
        .form-row button.cancel-btn.show {
            display: inline-flex;
            align-items: center;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }
        .filter-bar select,
        .filter-bar input {
            padding: 6px 14px;
            border: 2px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
        }
        .filter-bar .bulk-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-left: auto;
        }
        .filter-bar .bulk-actions button {
            padding: 6px 14px;
            border: none;
            border-radius: 40px;
            background: var(--accent2);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-bar .bulk-actions button:hover {
            background: var(--accent);
        }
        .filter-bar .bulk-actions .danger {
            background: #e74c6f;
            color: #fff;
        }
        .filter-bar .bulk-actions .danger:hover {
            background: #c0392b;
        }
        .filter-bar .bulk-actions .success {
            background: #2ecc71;
            color: #fff;
        }
        .filter-bar .bulk-actions .success:hover {
            background: #27ae60;
        }

        .table-wrap {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--card);
            max-width: 100%;
            width: 100%;
            min-height: 220px;
            max-height: min(52vh, 560px);
            overflow: auto;
            resize: both;
        }
        table {
            min-width: 760px;
            width: max-content;
            border-collapse: collapse;
            font-size: 14px;
            table-layout: fixed;
        }
        th,
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            min-width: 110px;
            max-width: 280px;
            overflow: auto;
            resize: horizontal;
            overflow-wrap: anywhere;
        }
        th {
            background: var(--bg);
            font-weight: normal;
            opacity: 0.8;
            white-space: nowrap;
        }
        td .del {
            color: #e74c6f;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            line-height: 1;
        }
        input[type="checkbox"] {
            accent-color: var(--accent);
            width: 10px;
            height: 10px;
            min-width: 10px;
            padding: 0;
            margin: 0 4px 0 0;
            cursor: pointer;
        }
        td input[type="checkbox"] {
            accent-color: var(--accent);
            width: 10px;
            height: 10px;
            min-width: 10px;
            padding: 0;
            cursor: pointer;
        }
        th:first-child,
        td:first-child {
            min-width: 34px;
            width: 34px;
            max-width: 42px;
            text-align: center;
            resize: none;
        }

        .two-col {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }
        @media (max-width: 800px) {
            .two-col {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                justify-content: center;
            }
            .form-row {
                flex-direction: column;
            }
            .form-row input,
            .form-row select {
                flex: 1 1 auto;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-bar .bulk-actions {
                margin-left: 0;
            }
            table {
                font-size: 12px;
            }
            th,
            td {
                padding: 6px 8px;
            }
            .calc-popup {
                width: min(340px, calc(100vw - 24px));
                margin: 10px;
            }
            .calc-grid button {
                width: auto;
                height: 50px;
            }
            .calc-overlay {
                top: auto;
                right: 12px;
                bottom: 92px;
            }
            .floating-calc {
                right: 18px;
                bottom: 18px;
                width: 66px;
                height: 66px;
            }
        }
    </style>
    <link rel="stylesheet" href="./ui-cleanup.css" />
</head>
<body>
    <div class="container">

        <header>
            <h1>💰 Finance</h1>
            <div class="header-actions">
                <input type="file" id="importCSV" accept=".csv,.tsv,text/csv,text/tab-separated-values" style="display:none" onchange="importCSV(event)" />
                <a href="../index.html">🏠 Home</a>
                <a href="../settings.html">⚙️ Settings</a>
                <button class="theme-toggle" onclick="toggleTheme()">🌓 Theme</button>
                <details class="actions-menu">
                    <summary>More</summary>
                    <div class="actions-menu-list">
                        <button onclick="exportCSV()">📥 Export CSV</button>
                        <button onclick="document.getElementById('importCSV').click()">📤 Import CSV/TSV</button>
                    </div>
                </details>
            </div>
        </header>

        <!-- CALCULATOR POPUP -->
        <div class="calc-overlay" id="calcOverlay" onclick="if(event.target===this)closeCalculator()">
            <div class="calc-popup">
                <button class="close-btn" onclick="closeCalculator()">✕</button>
                <div class="calc-display" id="calcDisplay">
                    <div class="calc-display-main" id="calcDisplayMain">0</div>
                    <div class="calc-display-sub" id="calcDisplaySub">0 VND</div>
                </div>
                <div class="calc-actions">
                    <button onclick="useCalcResult()">Use amount</button>
                    <button onclick="copyCalcResult()">Copy</button>
                </div>
                <div class="calc-grid">
                    <button class="clear" onclick="calcClear()">C</button>
                    <button onclick="calcInput('(')">(</button>
                    <button onclick="calcInput(')')">)</button>
                    <button class="operator" onclick="calcInput('/')">:</button>
                    <button onclick="calcInput('7')">7</button>
                    <button onclick="calcInput('8')">8</button>
                    <button onclick="calcInput('9')">9</button>
                    <button class="operator" onclick="calcInput('*')">×</button>
                    <button onclick="calcInput('4')">4</button>
                    <button onclick="calcInput('5')">5</button>
                    <button onclick="calcInput('6')">6</button>
                    <button class="operator" onclick="calcInput('-')">−</button>
                    <button onclick="calcInput('1')">1</button>
                    <button onclick="calcInput('2')">2</button>
                    <button onclick="calcInput('3')">3</button>
                    <button class="operator" onclick="calcInput('+')">+</button>
                    <button onclick="calcInput('0')">0</button>
                    <button onclick="calcInput('.')">.</button>
                    <button onclick="calcBackspace()">⌫</button>
                    <button class="equals" onclick="calcResult()">=</button>
                </div>
            </div>
        </div>

        <button class="floating-calc" onclick="openCalculator()" title="Calculator">🧮</button>

        <!-- MAIN LAYOUT -->
        <div class="main-layout">
            <!-- LEFT PANEL -->
            <div class="left-panel">
                <!-- CALENDAR -->
                <div class="calendar-section dropdown-section">
                    <div class="dropdown-header" onclick="toggleDropdown('calendarDrop')">
                        <h3>📅 Calendar</h3>
                        <span class="dropdown-arrow open" id="calendarDropArrow">▼</span>
                    </div>
                    <div class="dropdown-content open" id="calendarDrop">
                        <div class="dropdown-inner">
                            <div class="calendar-header">
                                <button onclick="changeMonth(-1)">◀</button>
                                <span class="month-label" id="monthLabel"></span>

                    <div class="section dropdown-section" style="margin-bottom:0;">
                        <div class="dropdown-header" onclick="toggleDropdown('chartDrop')">
                            <h3>📊 Chart</h3>
                            <span class="dropdown-arrow" id="chartDropArrow">▼</span>
                        </div>
                        <div class="dropdown-content" id="chartDrop">
                            <div class="dropdown-inner">
                                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
                                    <select id="chartRange" onchange="renderChart()" style="padding:4px 12px;border:2px solid var(--border);border-radius:8px;background:var(--bg);font-family:var(--font);font-size:12px;">
                                        <option value="day">Day</option><option value="week">Week</option><option value="month" selected>Month</option><option value="quarter">Quarter</option><option value="year">Year</option>
                                    </select>
                                    <button onclick="renderChart()" style="padding:4px 14px;border:none;border-radius:8px;background:var(--accent2);font-family:var(--font);font-size:12px;cursor:pointer;">🔄</button>

                                <canvas id="financeChart" height="120"></canvas>

    </div>

    <script>
        // ============================================================
        // THEME
        // ============================================================
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('financeTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('financeTheme') === 'dark') document.body.classList.add('dark');

        // ============================================================
        // DATA
        // ============================================================
        function getData() {
            try {
                return normalizeData(JSON.parse(localStorage.getItem('financeData')));
            } catch { return normalizeData(null); }
        }

        function saveData(d) {
            localStorage.setItem('financeData', JSON.stringify(normalizeData(d)));
        }

        function inferSourceKind(name) {
            return /cake|vp\s*bank|vpbank|credit|card|pay later/i.test(String(name || '')) ? 'credit' : 'cash';
        }

        function normalizeData(data) {
            const fallbackCategories = ['Food', 'Transport', 'Shopping', 'Bills', 'Entertainment', 'Health', 'Education', 'Other'];
            return {
                sources: Array.isArray(data?.sources) ? data.sources.map(s => ({
                    id: s.id || Date.now() + '_src',
                    name: s.name || 'Source',
                    balance: Number(s.balance) || 0,
                    color: /^#[0-9a-f]{6}$/i.test(s.color || '') ? s.color : '#f7a1b5',
                    kind: ['cash', 'credit'].includes(s.kind) ? s.kind : inferSourceKind(s.name)
                })) : [],
                transactions: Array.isArray(data?.transactions) ? data.transactions.map(t => ({
                    id: t.id || Date.now() + '_tx',
                    date: t.date || todayDate(),
                    type: t.type === 'income' ? 'income' : 'expense',
                    category: t.category || 'Other',
                    desc: t.desc || '',
                    amount: Math.abs(Number(t.amount) || 0),
                    sourceId: t.sourceId || ''
                })).filter(t => t.amount > 0) : [],
                cashflows: Array.isArray(data?.cashflows) ? data.cashflows.map(c => ({
                    id: c.id || Date.now() + '_cf',
                    date: c.date || todayDate(),
                    sourceId: c.sourceId || '',
                    amount: Math.abs(Number(c.amount) || 0),
                    type: c.type === 'remove' ? 'remove' : 'add',
                    desc: c.desc || ''
                })).filter(c => c.amount > 0) : [],
                funds: Array.isArray(data?.funds) ? data.funds : [],
                categories: Array.isArray(data?.categories) && data.categories.length ? data.categories : fallbackCategories
            };
        }

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function todayDate() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function parseCSV(text) {
            const firstLine = String(text || '').split(/\r?\n/)[0] || '';
            if (firstLine.includes('\t')) {
                return String(text || '').replace(/^\uFEFF/, '').split(/\r?\n/).filter(line => line.trim()).map(line => line.split('\t').map(cell => cell.trim()));
            }
            const rows = [];
            let row = [];
            let cell = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const next = text[i + 1];
                if (char === '"' && inQuotes && next === '"') {
                    cell += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    row.push(cell);
                    cell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && next === '\n') i++;
                    row.push(cell);
                    if (row.some(value => value.trim())) rows.push(row);
                    row = [];
                    cell = '';
                } else {
                    cell += char;
                }
            }
            row.push(cell);
            if (row.some(value => value.trim())) rows.push(row);
            return rows;
        }

        let calDate = new Date();
        let selectedDate = null;
        let editingSourceId = null;
        let editingTransactionId = null;

        function formatFullVND(n) {
            return formatNum(n) + ' VND';
        }

        // ============================================================
        // CALCULATOR
        // ============================================================
        let calcExpression = '';
        let lastAmountInputId = 'txAmount';
        let calcShowingResult = false;

        function openCalculator() {
            const active = document.activeElement;
            if (active && ['txAmount', 'cfAmount'].includes(active.id)) {
                lastAmountInputId = active.id;
            }
            document.getElementById('calcOverlay').classList.add('show');
            updateCalcDisplay();
        }

        function closeCalculator() {
            document.getElementById('calcOverlay').classList.remove('show');
        }

        function calcInput(val) {
            if (calcExpression === 'Error' || (calcShowingResult && /[0-9.]/.test(val))) calcExpression = '';
            calcShowingResult = false;
            calcExpression += val;
            updateCalcDisplay();
        }

        function calcClear() {
            calcExpression = '';
            calcShowingResult = false;
            updateCalcDisplay();
        }

        function calcBackspace() {
            calcExpression = calcExpression.slice(0, -1);
            calcShowingResult = false;
            updateCalcDisplay();
        }

        function calcResult() {
            try {
                if (!/^[0-9+\-*/().\s]+$/.test(calcExpression)) throw new Error('Invalid expression');
                const result = Function('"use strict"; return (' + calcExpression + ')')();
                if (!Number.isFinite(Number(result))) throw new Error('Invalid result');
                calcExpression = String(Math.round(Number(result) * 100) / 100);
                calcShowingResult = true;
                updateCalcDisplay();
            } catch (e) {
                calcExpression = 'Error';
                calcShowingResult = false;
                updateCalcDisplay();
            }
        }

        function updateCalcDisplay() {
            const main = document.getElementById('calcDisplayMain');
            const sub = document.getElementById('calcDisplaySub');
            if (!main || !sub) return;
            const raw = calcExpression || '0';
            if (raw === 'Error') {
                main.textContent = 'Error';
                sub.textContent = 'Please check the calculation';
                return;
            }
            const numeric = Number(raw);
            if (calcShowingResult && Number.isFinite(numeric)) {
                main.textContent = formatFullVND(numeric).replace(' VND', '');
                sub.textContent = `${formatFullVND(numeric)} · raw amount`;
            } else {
                main.textContent = raw;
                sub.textContent = Number.isFinite(numeric) ? formatFullVND(numeric) : 'Expression';
            }
        }

        function useCalcResult() {
            if (!calcExpression || Number.isNaN(Number(calcExpression))) return;
            const input = document.getElementById(lastAmountInputId) || document.getElementById('txAmount');
            input.value = String(Number(calcExpression));
            input.focus();
            closeCalculator();
        }

        function copyCalcResult() {
            if (!calcExpression || Number.isNaN(Number(calcExpression))) return;
            if (navigator.clipboard?.writeText) {
                navigator.clipboard.writeText(String(Number(calcExpression)));
            }
        }

        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('calcOverlay').classList.contains('show')) return;
            const key = e.key;
            if (key >= '0' && key <= '9') calcInput(key);
            else if (key === '.') calcInput('.');
            else if (key === '+') calcInput('+');
            else if (key === '-') calcInput('-');
            else if (key === '*') calcInput('*');
            else if (key === '/' || key === ':') calcInput('/');
            else if (key === 'Enter') calcResult();
            else if (key === 'Backspace') calcBackspace();
            else if (key === 'Escape') closeCalculator();
            else if (key === 'c' || key === 'C') calcClear();
        });

        function toggleDropdown(id) {
            const content = document.getElementById(id);
            const arrow = document.getElementById(id + 'Arrow');
            if (!content) return;
            content.classList.toggle('open');
            if (arrow) arrow.classList.toggle('open');
            if (id === 'chartDrop' && content.classList.contains('open')) {
                setTimeout(renderChart, 250);
            }
        }

        // ============================================================
        // BALANCE
        // ============================================================
        function renderBalance() {
            const data = getData();
            const realSources = data.sources.filter(s => s.kind !== 'credit');
            const creditSources = data.sources.filter(s => s.kind === 'credit');
            const availableTotal = realSources.reduce((sum, s) => sum + s.balance, 0);
            const creditTotal = creditSources.reduce((sum, s) => sum + s.balance, 0);
            const totalIncome = data.transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const totalExpense = data.transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const netIncome = totalIncome - totalExpense;

            document.getElementById('totalBalance').innerHTML =
                `${formatNum(availableTotal)} <span class="sub">Credit / pay later: ${formatNum(creditTotal)} · Net: ${netIncome >= 0 ? '📈' : '📉'} ${formatNum(Math.abs(netIncome))}</span>`;

            const container = document.getElementById('balanceSources');
            container.innerHTML = data.sources.map(s =>
                `<span class="balance-source ${s.kind === 'credit' ? 'credit-source' : ''}"><span class="dot" style="background:${escapeHTML(s.color)}"></span>${escapeHTML(s.name)}: ${formatNum(s.balance)} <span class="source-kind-badge">${s.kind === 'credit' ? 'Credit' : 'Cash'}</span></span>`
            ).join('');
        }

        // ============================================================
        // SOURCES
        // ============================================================
        function addSource() {
            const name = document.getElementById('sourceName').value.trim();
            const balance = parseFloat(document.getElementById('sourceBalance').value) || 0;
            const kind = document.getElementById('sourceKind').value === 'credit' ? 'credit' : 'cash';
            const color = document.getElementById('sourceColor').value;
            if (!name) return alert('Please enter source name');
            const data = getData();
            if (editingSourceId) {
                const source = data.sources.find(s => s.id === editingSourceId);
                if (!source) return cancelSourceEdit();
                Object.assign(source, { name, balance, color, kind });
            } else {
                data.sources.push({ id: Date.now() + '_src', name, balance, color, kind });
            }
            saveData(data);
            resetSourceForm();
            renderAll();
        }

        function resetSourceForm() {
            editingSourceId = null;
            document.getElementById('sourceName').value = '';
            document.getElementById('sourceBalance').value = '';
            document.getElementById('sourceKind').value = 'cash';
            document.getElementById('sourceColor').value = '#f7a1b5';
            document.getElementById('sourceSubmitBtn').textContent = '➕ Add';
            document.getElementById('sourceCancelBtn').classList.remove('show');
        }

        function editSource(id) {
            const source = getData().sources.find(s => s.id === id);
            if (!source) return;
            editingSourceId = id;
            document.getElementById('sourceName').value = source.name;
            document.getElementById('sourceBalance').value = source.balance;
            document.getElementById('sourceKind').value = source.kind === 'credit' ? 'credit' : 'cash';
            document.getElementById('sourceColor').value = source.color || '#f7a1b5';
            document.getElementById('sourceSubmitBtn').textContent = '💾 Save';
            document.getElementById('sourceCancelBtn').classList.add('show');
            document.getElementById('sourceName').focus();
        }

        function cancelSourceEdit() {
            resetSourceForm();
        }

        function deleteSource(id) {
            if (!confirm('Delete this source?')) return;
            const data = getData();
            const hasTransactions = data.transactions.some(t => t.sourceId === id);
            const hasCashflows = data.cashflows.some(c => c.sourceId === id);
            if ((hasTransactions || hasCashflows) && !confirm('This source has related records. Delete the source and keep those records as uncategorized?')) return;
            data.sources = data.sources.filter(s => s.id !== id);
            saveData(data);
            renderAll();
        }

        function renderSources() {
            const data = getData();
            const container = document.getElementById('sourceList');
            container.innerHTML = data.sources.length ? data.sources.map(s =>
                `<span class="tag-item"><span class="color-dot" style="background:${escapeHTML(s.color)}"></span>${escapeHTML(s.name)} (${formatNum(s.balance)}) <span class="source-kind-badge">${s.kind === 'credit' ? 'Credit' : 'Cash'}</span> <button class="mini-btn" onclick="editSource('${s.id}')">Change</button><span class="del" onclick="deleteSource('${s.id}')">✕</span></span>`
            ).join('') : `<span style="font-size:13px;opacity:0.6;">Add a source before recording transactions.</span>`;

            const txSrc = document.getElementById('txSource');
            const filterSrc = document.getElementById('filterSource');
            const cfSrc = document.getElementById('cfSource');
            const currentTxSource = txSrc.value;
            const currentFilterSource = filterSrc.value;
            const currentCfSource = cfSrc.value;
            const opts = data.sources.map(s => `<option value="${s.id}">${escapeHTML(s.name)}${s.kind === 'credit' ? ' · Credit' : ''}</option>`).join('');
            txSrc.innerHTML = `<option value="">Select source</option>` + opts;
            filterSrc.innerHTML = `<option value="all">All sources</option>` + opts;
            cfSrc.innerHTML = `<option value="">Select source</option>` + opts;
            txSrc.value = currentTxSource && [...txSrc.options].some(option => option.value === currentTxSource) ? currentTxSource : (data.sources[0]?.id || '');
            filterSrc.value = [...filterSrc.options].some(option => option.value === currentFilterSource) ? currentFilterSource : 'all';
            cfSrc.value = currentCfSource && [...cfSrc.options].some(option => option.value === currentCfSource) ? currentCfSource : (data.sources[0]?.id || '');

            const settings = getSettings();
            const catSel = document.getElementById('txCategory');
            const currentCategory = catSel.value;
            catSel.innerHTML = settings.categories.map(c => `<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`).join('');
            catSel.value = [...catSel.options].some(option => option.value === currentCategory) ? currentCategory : (settings.categories[0] || '');
        }

        function getSettings() {
            try {
                return JSON.parse(localStorage.getItem('settingsData')) || {
                    categories: ['Work', 'Study', 'Personal', 'Health', 'Other'],
                    financeTypes: ['Income', 'Expense']
                };
            } catch { return { categories: ['Work', 'Study', 'Personal', 'Health', 'Other'], financeTypes: [
                    'Income', 'Expense'
                ] }; }
        }

        function saveSharedSettings(settings) {
            localStorage.setItem('settingsData', JSON.stringify({
                categories: settings.categories || ['Work', 'Study', 'Personal', 'Health', 'Other'],
                categoryColors: settings.categoryColors || {},
                financeTypes: settings.financeTypes || ['Income', 'Expense']
            }));
        }

        function addSharedCategory() {
            const input = document.getElementById('newCategoryInput');
            const name = input.value.trim();
            if (!name) return alert('Enter a category name.');
            const settings = getSettings();
            settings.categories = Array.isArray(settings.categories) ? settings.categories : [];
            if (!settings.categories.includes(name)) settings.categories.push(name);
            saveSharedSettings(settings);
            input.value = '';
            renderAll();
            document.getElementById('txCategory').value = name;
        }

        function deleteSharedCategory() {
            const name = document.getElementById('txCategory').value;
            if (!name || !confirm(`Delete category "${name}" from the shared list? Existing transactions keep their label.`)) return;
            const settings = getSettings();
            settings.categories = (settings.categories || []).filter(c => c !== name);
            if (settings.categoryColors) delete settings.categoryColors[name];
            saveSharedSettings(settings);
            renderAll();
        }

        // ============================================================
        // TRANSACTIONS
        // ============================================================
        function transactionDelta(tx) {
            return tx.type === 'income' ? tx.amount : -tx.amount;
        }

        function applyTransactionToSource(data, tx, multiplier) {
            const src = data.sources.find(s => s.id === tx.sourceId);
            if (src) src.balance += transactionDelta(tx) * multiplier;
        }

        function addTransaction() {
            const date = document.getElementById('txDate').value;
            const type = document.getElementById('txType').value;
            const category = document.getElementById('txCategory').value;
            const desc = document.getElementById('txDesc').value.trim();
            const amount = parseFloat(document.getElementById('txAmount').value);
            const sourceId = document.getElementById('txSource').value;
            if (!date || !Number.isFinite(amount) || amount <= 0 || !sourceId) return alert('Please fill in date, positive amount, and source');
            const data = getData();
            const nextTx = { id: editingTransactionId || Date.now() + '_tx', date, type, category, desc, amount: Math.abs(amount), sourceId };
            if (editingTransactionId) {
                const existing = data.transactions.find(t => t.id === editingTransactionId);
                if (!existing) return cancelTransactionEdit();
                applyTransactionToSource(data, existing, -1);
                Object.assign(existing, nextTx);
                applyTransactionToSource(data, existing, 1);
            } else {
                data.transactions.push(nextTx);
                applyTransactionToSource(data, nextTx, 1);
            }
            saveData(data);
            resetTransactionForm();
            selectedDate = date;
            renderAll();
        }

        function resetTransactionForm() {
            editingTransactionId = null;
            document.getElementById('txDesc').value = '';
            document.getElementById('txAmount').value = '';
            document.getElementById('txSubmitBtn').textContent = '➕ Add';
            document.getElementById('txCancelBtn').classList.remove('show');
        }

        function editTransaction(id) {
            const tx = getData().transactions.find(t => t.id === id);
            if (!tx) return;
            editingTransactionId = id;
            document.getElementById('txDate').value = tx.date;
            document.getElementById('txType').value = tx.type;
            document.getElementById('txCategory').value = tx.category || 'Other';
            document.getElementById('txDesc').value = tx.desc || '';
            document.getElementById('txAmount').value = tx.amount;
            document.getElementById('txSource').value = tx.sourceId;
            document.getElementById('txSubmitBtn').textContent = '💾 Save';
            document.getElementById('txCancelBtn').classList.add('show');
            document.getElementById('txDesc').focus();
        }

        function cancelTransactionEdit() {
            resetTransactionForm();
        }

        function deleteTransaction(id) {
            if (!confirm('Delete this transaction?')) return;
            const data = getData();
            const tx = data.transactions.find(t => t.id === id);
            if (tx) applyTransactionToSource(data, tx, -1);
            data.transactions = data.transactions.filter(t => t.id !== id);
            if (editingTransactionId === id) resetTransactionForm();
            saveData(data);
            renderAll();
        }

        function renderTransactions() {
            const data = getData();
            const typeFilter = document.getElementById('filterType').value;
            const sourceFilter = document.getElementById('filterSource').value;
            const timeFilter = document.getElementById('filterTime').value;
            const dateFilter = document.getElementById('filterDate').value;
            const fromDate = document.getElementById('filterFromDate').value;
            const toDate = document.getElementById('filterToDate').value;

            let list = [...data.transactions];
            if (typeFilter !== 'all') list = list.filter(t => t.type === typeFilter);
            if (sourceFilter !== 'all') list = list.filter(t => t.sourceId === sourceFilter);
            if (timeFilter === 'day' && dateFilter) list = list.filter(t => t.date === dateFilter);
            if (timeFilter === 'custom') {
                list = list.filter(t => (!fromDate || String(t.date || '') >= fromDate) && (!toDate || String(t.date || '') <= toDate));
            }
            list.sort((a, b) => b.date.localeCompare(a.date) || a.id.localeCompare(b.id));

            const srcMap = Object.fromEntries(data.sources.map(s => [s.id, s]));

            const tbody = document.getElementById('txTableBody');
            tbody.innerHTML = list.length ? list.map(t => `
                    <tr>
                        <td><input type="checkbox" class="tx-check" value="${t.id}" /></td>
                        <td>${escapeHTML(t.date)}</td>
                        <td>${t.type === 'income' ? '📈 Income' : '📉 Expense'}</td>
                        <td>${escapeHTML(t.category || '')}</td>
                        <td>${escapeHTML(t.desc || '')}</td>
                        <td style="color:${t.type === 'income' ? '#2ecc71' : '#e74c6f'}">${formatNum(t.amount)}</td>
                        <td>${escapeHTML(srcMap[t.sourceId]?.name || 'No source')}${srcMap[t.sourceId]?.kind === 'credit' ? ' <span class="source-kind-badge">Credit</span>' : ''}</td>
                        <td><button class="mini-btn" onclick="editTransaction('${t.id}')">Change</button> <span class="del" onclick="deleteTransaction('${t.id}')">✕</span></td>
                    </tr>
                `).join('') : `<tr><td colspan="8" style="text-align:center;opacity:0.55;padding:24px;">No transactions match these filters</td></tr>`;
            document.getElementById('selectAll').checked = false;
            document.getElementById('selectAllHead').checked = false;
            document.getElementById('bulkSumDisplay').style.display = 'none';
        }

        // ============================================================
        // CASHFLOW
        // ============================================================
        function addCashflow() {
            const date = document.getElementById('cfDate').value;
            const sourceId = document.getElementById('cfSource').value;
            const amount = parseFloat(document.getElementById('cfAmount').value);
            const type = document.getElementById('cfType').value;
            const desc = document.getElementById('cfDesc').value.trim() || 'Balance adjustment';

            if (!date || !Number.isFinite(amount) || amount <= 0 || !sourceId) return alert('Please fill in date, positive amount, and source');

            const data = getData();
            const cf = { id: Date.now() + '_cf', date, sourceId, amount: Math.abs(amount), type, desc };
            data.cashflows.push(cf);

            const src = data.sources.find(s => s.id === sourceId);
            if (src) {
                src.balance += (type === 'add' ? cf.amount : -cf.amount);
            }

            saveData(data);
            document.getElementById('cfAmount').value = '';
            document.getElementById('cfDesc').value = '';
            renderAll();
        }

        function deleteCashflow(id) {
            if (!confirm('Delete this adjustment?')) return;
            const data = getData();
            const cf = data.cashflows.find(c => c.id === id);
            if (cf) {
                const src = data.sources.find(s => s.id === cf.sourceId);
                if (src) {
                    src.balance -= (cf.type === 'add' ? cf.amount : -cf.amount);
                }
            }
            data.cashflows = data.cashflows.filter(c => c.id !== id);
            saveData(data);
            renderAll();
        }

        function renderCashflows() {
            const data = getData();
            let list = [...data.cashflows];
            list.sort((a, b) => b.date.localeCompare(a.date) || a.id.localeCompare(b.id));

            const srcMap = Object.fromEntries(data.sources.map(s => [s.id, s.name]));

            const tbody = document.getElementById('cfTableBody');
            tbody.innerHTML = list.length ? list.slice(0, 10).map(c => `
                    <tr>
                        <td style="font-size:12px;">${escapeHTML(c.date)}</td>
                        <td style="font-size:12px;">${c.type === 'add' ? '➕' : '➖'}</td>
                        <td style="font-size:12px;color:${c.type === 'add' ? '#2ecc71' : '#e74c6f'}">${formatNum(c.amount)}</td>
                    </tr>
                `).join('') : `<tr><td colspan="3" style="text-align:center;opacity:0.55;padding:16px;">No cashflow yet</td></tr>`;
        }

        // ============================================================
        // BULK ACTIONS
        // ============================================================
        function toggleAllCheckboxes(source) {
            const checked = source ? source.checked : document.getElementById('selectAll').checked;
            document.querySelectorAll('.tx-check').forEach(cb => cb.checked = checked);
            document.getElementById('selectAll').checked = checked;
            document.getElementById('selectAllHead').checked = checked;
        }

        function getSelectedTxIds() {
            return Array.from(document.querySelectorAll('.tx-check:checked')).map(cb => cb.value);
        }

        function getSelectedTxData() {
            const data = getData();
            const ids = getSelectedTxIds();
            return data.transactions.filter(t => ids.includes(t.id));
        }

        function bulkDelete() {
            const ids = getSelectedTxIds();
            if (!ids.length) return alert('Select at least one transaction');
            if (!confirm(`Delete ${ids.length} transaction(s)?`)) return;
            const data = getData();
            ids.forEach(id => {
                const tx = data.transactions.find(t => t.id === id);
                if (tx) {
                    const src = data.sources.find(s => s.id === tx.sourceId);
                    if (src) {
                        src.balance -= (tx.type === 'income' ? tx.amount : -tx.amount);
                    }
                }
            });
            data.transactions = data.transactions.filter(t => !ids.includes(t.id));
            saveData(data);
            renderAll();
        }

        function bulkExport() {
            const list = getSelectedTxData();
            if (!list.length) return alert('Select at least one transaction');
            exportCSVData(list);
        }

        function bulkSum() {
            const list = getSelectedTxData();
            if (!list.length) return alert('Select at least one transaction');

            const total = list.reduce((sum, t) => sum + (t.type === 'income' ? t.amount : -t.amount), 0);
            const income = list.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expense = list.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);

            const display = document.getElementById('bulkSumDisplay');
            display.innerHTML = `
                    <span style="color:#2ecc71;">📈 Income: ${formatNum(income)}</span>
                    <span style="color:#e74c6f;margin-left:16px;">📉 Expense: ${formatNum(expense)}</span>
                    <span style="margin-left:16px;font-weight:bold;">💰 Net: ${formatNum(total)}</span>
                    <span style="margin-left:16px;opacity:0.5;">(${list.length} items)</span>
                `;
            display.style.display = 'block';
        }

        // ============================================================
        // CSV IMPORT / EXPORT
        // ============================================================
        function exportCSV() {
            const data = getData();
            exportCSVData(data.transactions);
        }

        function exportCSVData(list) {
            if (!list.length) return alert('No data to export');
            const headers = ['id', 'date', 'type', 'category', 'desc', 'amount', 'sourceId'];
            const rows = list.map(t => headers.map(h => `"${(t[h] || '').toString().replace(/"/g, '""')}"`).join(','));
            const csv = headers.join(',') + '\n' + rows.join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `finance_${new Date().toISOString().slice(0,10)}.csv`;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                URL.revokeObjectURL(link.href);
                link.remove();
            }, 0);
        }

        function importCSV(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const text = ev.target.result;
                    const rows = parseCSV(text);
                    if (!rows.length) {
                        alert('CSV file is empty.');
                        return;
                    }
                    const headers = rows[0].map(h => h.trim());
                    const data = getData();
                    let imported = 0;
                    for (let i = 1; i < rows.length; i++) {
                        const vals = rows[i].map(v => v.trim());
                        const tx = {};
                        headers.forEach((h, idx) => tx[h] = vals[idx] || '');
                        tx.id = tx.id || Date.now() + '_' + i + '_tx';
                        tx.type = tx.type === 'income' ? 'income' : 'expense';
                        tx.category = tx.category || 'Other';
                        tx.desc = tx.desc || '';
                        tx.amount = Math.abs(parseFloat(tx.amount) || 0);
                        if (tx.id && tx.date && tx.amount > 0) {
                            if (!data.transactions.some(t => t.id === tx.id)) {
                                data.transactions.push(tx);
                                const src = data.sources.find(s => s.id === tx.sourceId);
                                if (src) {
                                    src.balance += (tx.type === 'income' ? tx.amount : -tx.amount);
                                }
                                imported++;
                            }
                        }
                    }
                    saveData(data);
                    renderAll();
                    alert(`Imported ${imported} transaction(s) successfully!`);
                } catch (err) {
                    alert('Import error: ' + err.message);
                }
            };
            reader.readAsText(file, 'UTF-8');
            e.target.value = '';
        }

        // ============================================================
        // CALENDAR
        // ============================================================
        function changeMonth(delta) {
            calDate.setMonth(calDate.getMonth() + delta);
            renderCalendar();
        }

        function goToToday() {
            calDate = new Date();
            const todayStr = todayDate();
            selectedDate = todayStr;
            document.getElementById('filterDate').value = todayStr;
            renderCalendar();
            updateDayDetail(todayStr);
            renderTransactions();
        }

        function renderCalendar() {
            const data = getData();
            const y = calDate.getFullYear();
            const m = calDate.getMonth();
            const first = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const today = todayDate();

            const txDates = new Set();
            data.transactions.forEach(t => { if (t.date) txDates.add(t.date); });

            document.getElementById('monthLabel').textContent = `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]} ${y}`;
            const grid = document.getElementById('calendarGrid');
            let html = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d =>
                `<div class="day-name">${d}</div>`).join('');
            for (let i = 0; i < first; i++) html += `<div class="day-cell other-month"></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = dateStr === today ? 'today' : '';
                const isSelected = dateStr === selectedDate ? 'selected' : '';
                const hasTx = txDates.has(dateStr) ? '<span class="day-dot"></span>' : '';
                html += `<div class="day-cell ${isToday} ${isSelected}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">
                        ${d}
                        ${hasTx}
                    </div>`;
            }
            grid.innerHTML = html;

            if (selectedDate) {
                updateDayDetail(selectedDate);
            }
        }

        function selectDate(dateStr) {
            if (!dateStr) {
                selectedDate = null;
                document.getElementById('filterDate').value = '';
                renderCalendar();
                renderTransactions();
                return;
            }
            selectedDate = dateStr;
            document.getElementById('filterDate').value = dateStr;
            renderCalendar();
            updateDayDetail(dateStr);
            renderTransactions();
        }

        function updateDayDetail(dateStr) {
            const data = getData();
            const container = document.getElementById('dayDetail');

            const [year, month, day] = dateStr.split('-').map(Number);
            const dateObj = new Date(year, month - 1, day);
            const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

            const txs = data.transactions.filter(t => t.date === dateStr);
            const income = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const expense = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const net = income - expense;

            let html = `<div class="detail-date">📅 ${dayNames[dateObj.getDay()]}, ${dateStr}</div>`;

            if (txs.length === 0) {
                html += `<div class="detail-summary" style="font-size:13px;opacity:0.6;">No transactions on this day</div>`;
            } else {
                html += `<div class="detail-summary">
                        <span class="income">📈 ${formatNum(income)}</span>
                        <span class="expense">📉 ${formatNum(expense)}</span>
                        <span class="net">💰 ${net >= 0 ? '📈' : '📉'} ${formatNum(Math.abs(net))}</span>
                        <span style="opacity:0.5;font-size:12px;">${txs.length} tx</span>
                    </div>`;
                const srcMap = Object.fromEntries(data.sources.map(s => [s.id, s.name]));
                txs.slice(0, 5).forEach(t => {
                    html += `<div class="detail-tx">
                            <span>${escapeHTML(t.desc || t.category || 'No description')}</span>
                            <span class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'} ${formatNum(t.amount)}</span>
                        </div>`;
                });
                if (txs.length > 5) {
                    html += `<div style="font-size:11px;opacity:0.5;margin-top:4px;">+ ${txs.length - 5} more</div>`;
                }
            }

            container.innerHTML = html;
        }

        // ============================================================
        // CHART
        // ============================================================
        function renderChart() {
            const data = getData();
            const range = document.getElementById('chartRange').value;
            const now = new Date();
            let start = new Date(now);
            let labelFormat = (d) => d.toISOString().slice(0, 10);
            let step = 1;

            if (range === 'day') {
                start.setDate(now.getDate() - 30);
                labelFormat = (d) => d.toISOString().slice(5, 10);
                step = 1;
            } else if (range === 'week') {
                start.setDate(now.getDate() - 90);
                labelFormat = (d) => `W${Math.ceil(d.getDate()/7)}`;
                step = 7;
            } else if (range === 'month') {
                start.setMonth(now.getMonth() - 12);
                labelFormat = (d) => d.toISOString().slice(0, 7);
                step = 30;
            } else if (range === 'quarter') {
                start.setMonth(now.getMonth() - 24);
                labelFormat = (d) => `Q${Math.floor(d.getMonth()/3)+1}`;
                step = 90;
            } else {
                start.setFullYear(now.getFullYear() - 5);
                labelFormat = (d) => d.getFullYear().toString();
                step = 365;
            }

            const points = [];
            let cur = new Date(start);
            while (cur <= now) {
                const key = labelFormat(cur);
                const end = new Date(cur);
                end.setDate(end.getDate() + step);
                const sum = data.transactions
                    .filter(t => t.date >= cur.toISOString().slice(0, 10) && t.date < end.toISOString().slice(0, 10))
                    .reduce((s, t) => s + (t.type === 'income' ? t.amount : -t.amount), 0);
                points.push({ label: key, value: sum });
                cur.setDate(cur.getDate() + step);
            }

            const canvas = document.getElementById('financeChart');
            const ctx = canvas.getContext('2d');
            const W = canvas.width = canvas.parentElement.clientWidth - 40 || 400;
            const H = canvas.height = 120;
            ctx.clearRect(0, 0, W, H);

            const maxVal = Math.max(1, ...points.map(p => Math.abs(p.value)));
            const pad = 20;
            const chartW = W - pad * 2;
            const chartH = H - pad * 2;
            const barW = Math.min(16, chartW / points.length * 0.6);

            ctx.font = '8px "American Typewriter", monospace';
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text') || '#4a3f44';

            points.forEach((p, i) => {
                const x = pad + (i / points.length) * chartW;
                const barH = (Math.abs(p.value) / maxVal) * chartH;
                const y = p.value >= 0 ? pad + chartH - barH : pad + chartH;
                ctx.fillStyle = p.value >= 0 ? '#2ecc71' : '#e74c6f';
                ctx.fillRect(x - barW / 2, y, barW, barH);
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text') || '#4a3f44';
                ctx.textAlign = 'center';
                ctx.fillText(p.label, x, pad + chartH + 12);
            });
        }

        // ============================================================
        // UTILITY
        // ============================================================
        function formatNum(n) {
            return Number(n || 0).toLocaleString('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            });
        }

        // ============================================================
        // RENDER ALL
        // ============================================================
        function renderAll() {
            renderSources();
            renderBalance();
            renderTransactions();
            renderCashflows();
            renderChart();
            renderCalendar();
            if (!document.getElementById('txDate').value) {
                document.getElementById('txDate').value = todayDate();
            }
            if (!document.getElementById('cfDate').value) {
                document.getElementById('cfDate').value = todayDate();
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const data = getData();
            const settings = getSettings();
            if (!data.categories || !data.categories.length) {
                data.categories = settings.categories;
                saveData(data);
            }
            if (!data.cashflows) {
                data.cashflows = [];
                saveData(data);
            }

            const today = todayDate();
            selectedDate = today;
            document.getElementById('filterDate').value = today;
            ['txAmount', 'cfAmount'].forEach(id => {
                document.getElementById(id).addEventListener('focus', () => {
                    lastAmountInputId = id;
                });
            });
            renderAll();
            updateDayDetail(today);

            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(renderChart, 300);
            });
        });
    </script>
